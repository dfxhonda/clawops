<!DOCTYPE html>
<html lang="ja">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>マスタ管理 | ClawOps</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --radius:8px;
  --nav-h:58px;
  --white:#fff;--btn-min-h:44px;--badge-fs:12px;--space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:24px;--danger-bg:#5a3a3a;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h)+env(safe-area-inset-bottom))}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header-title{font-size:18px;font-weight:700;letter-spacing:.5px;flex:1}
.header-badge{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:20px}

.tabs{display:flex;gap:4px;margin-bottom:8px;align-items:center}
.tab-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;padding:6px 8px;cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:var(--white)}
.tab-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;padding:6px 4px;cursor:pointer}

.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:14px}

main{padding:var(--space-lg)}

.filter-row{display:flex;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap}
.filter-row select{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;cursor:pointer}
.filter-row select:focus{border-color:var(--accent)}

.btn-add{background:var(--accent);border:none;border-radius:8px;color:var(--white);font-size:13px;font-weight:700;padding:8px 16px;min-height:var(--btn-min-h);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s}
.btn-add:hover{background:var(--accent2)}

.table-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,106,255,.06)}

.th-sort{cursor:pointer;user-select:none;transition:color .15s}
.th-sort:hover{color:var(--text)}
.sort-arrow{margin-left:4px;font-size:10px}

.badge{display:inline-block;font-size:var(--badge-fs);padding:3px 10px;border-radius:20px;font-weight:600}
.badge-green{background:rgba(46,204,113,.15);color:var(--green)}
.badge-yellow{background:rgba(243,156,18,.15);color:var(--yellow)}
.badge-blue{background:rgba(124,106,255,.15);color:var(--accent)}
.badge-cyan{background:rgba(0,180,216,.15);color:var(--cyan)}
.badge-red{background:rgba(231,76,60,.15);color:var(--red)}

.btn-edit{border:1px solid var(--border);border-radius:6px;font-size:11px;padding:4px 8px;min-height:var(--btn-min-h);cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--text2);white-space:nowrap}
.btn-edit:hover{border-color:var(--accent);color:var(--accent)}
.btn-del-modal{width:100%;background:transparent;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;padding:9px;min-height:var(--btn-min-h);cursor:pointer;margin-top:8px;transition:all .15s}
.btn-del-modal:hover{background:var(--red);color:var(--white)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:var(--space-md)}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-lg)}
.btn-save{flex:1;background:var(--accent);border:none;border-radius:8px;color:var(--white);font-size:14px;font-weight:700;padding:11px;min-height:var(--btn-min-h);cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent2)}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;padding:11px;cursor:pointer}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}

.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)}
.count-text{font-size:12px;color:var(--text2)}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}

nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100;min-height:48px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);text-decoration:none;font-size:10px;padding:4px 8px;border-radius:8px;cursor:pointer;transition:color .15s;background:none;border:none;min-height:48px}
.nav-item.active,.nav-item:hover{color:var(--accent)}
.nav-icon{font-size:20px}

.spinner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

input[type="number"],input[type="text"],input[type="tel"],input[type="date"],select,textarea{font-size:16px!important}
.stepper{display:flex;align-items:center;gap:0}
.stepper input{text-align:center;border-radius:0;-moz-appearance:textfield;font-size:16px}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper-btn{width:44px;height:44px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:background .15s}
.stepper-btn:active{background:var(--accent)}
.stepper-btn.minus{border-radius:var(--radius) 0 0 var(--radius)}
.stepper-btn.plus{border-radius:0 var(--radius) var(--radius) 0}

@media(min-width:768px){
  main{max-width:960px;margin:0 auto}
  .modal{max-width:520px}
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:16px;border:1px solid var(--border);text-decoration:none;flex-shrink:0">🏠</a>
    <span class="header-title">マスタ管理</span>
    <span class="header-badge" id="headerBadge">読込中…</span>
    <button onclick="doLogout()" style="background:none;border:1px solid var(--danger-bg);color:#e74c3c;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer">ログアウト</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('stores')">🏪店舗</button>
    <button class="tab-btn" onclick="switchTab('machines')">🎮機械</button>
    <button class="tab-btn" onclick="switchTab('booths')">🎯ブース</button>
    <button class="tab-btn" onclick="switchTab('suppliers')">🚚仕入先</button>
    <select class="tab-select" onchange="if(this.value){switchTab(this.value)}" id="settingsSelect">
      <option value="">⚙️設定▼</option>
      <option value="machine_types">🏷️ タイプ</option>
      <option value="categories">📂 カテゴリ</option>
      <option value="ownership">📋 所有形態</option>
      <option value="transfers">🔄 移管タイプ</option>
      <option value="patrols">🔍 巡回ステータス</option>
    </select>
    <button class="tab-btn" onclick="switchTab('tools')">🔧ツール</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="検索..." autocomplete="off" oninput="searchQ=this.value;render()">
  </div>
</header>

<main id="mainContent"><div class="empty">⏳ 読み込み中...</div></main>

<div id="spinnerOverlay" style="display:none" class="spinner-overlay"><div class="spinner"></div></div>
<div id="toastEl" style="display:none" class="toast"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></a>
  <a class="nav-item" href="prizes.html"><div class="nav-icon">🏆</div><div>景品</div></a>
  <a class="nav-item" href="orders.html"><div class="nav-icon">📋</div><div>発注</div></a>
  <a class="nav-item" href="inventory.html"><div class="nav-icon">📦</div><div>在庫</div></a>
  <a class="nav-item" href="announcements.html"><div class="nav-icon">📬</div><div>案内</div></a>
  <a class="nav-item active"><div class="nav-icon">⚙️</div><div>管理</div></a>
</nav>

<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModalBg(event)">
  <div class="modal" id="modalBody"></div>
</div>

<script>
function stepVal(inputId, delta) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const min = el.hasAttribute('min') ? parseInt(el.min) : -Infinity;
  const max = el.hasAttribute('max') ? parseInt(el.max) : Infinity;
  const cur = parseInt(el.value) || 0;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.value = next;
  el.dispatchEvent(new Event('input', {bubbles:true}));
}
function doLogout(){if(typeof isDirty!=='undefined'&&isDirty){if(!confirm('未保存の変更があります。ログアウトしますか？'))return}else{if(!confirm('ログアウトしますか？'))return}sessionStorage.clear();location.href='index.html'}


// ─── STATE ────────────────────────────────────────────────────────────────────
let stores=[], machines=[], booths=[];
let machineTypes=[], machineCategories=[], suppliers=[], ownershipTypes=[], transferTypes=[], patrolStatuses=[];
let currentTab='stores';
let filterStore='', filterMachine='';
let searchQ='';
let storeSort={col:null,dir:'desc'};
let machineSort={col:null,dir:'desc'};
let boothSort={col:null,dir:'desc'};
let _loadingCount=0, _toastTimer=null;

// ─── LOADING / TOAST ─────────────────────────────────────────────────────────
function showLoading(){_loadingCount++;document.getElementById('spinnerOverlay').style.display='flex';}
function hideLoading(){_loadingCount=Math.max(0,_loadingCount-1);if(!_loadingCount)document.getElementById('spinnerOverlay').style.display='none';}
function showToast(msg,ok=true){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.className='toast '+(ok?'ok':'err');el.style.display='block';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.style.display='none',3000);
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  showLoading();
  document.getElementById('mainContent').innerHTML='<div class="empty">⏳ 読み込み中...</div>';
  try{
    const [s,m,b,mt,mc,sup,ot,tt,ps]=await Promise.all([
      sbGet('stores','select=store_code,store_name,brand_name,region,is_active,opened_at,notes&order=store_code.asc'),
      sbGet('machines','select=machine_code,store_code,machine_name,play_price,floor,zone,is_active,notes&order=machine_code.asc'),
      sbGet('booths','select=booth_code,machine_code,store_code,booth_number,payout_setting,current_phase,is_active,notes&order=booth_code.asc'),
      sbGet('machine_types','select=*&order=type_id.asc'),
      sbGet('machine_categories','select=*&order=sort_order.asc'),
      sbGet('suppliers','select=*&order=supplier_id.asc'),
      sbGet('ownership_types','select=*&order=sort_order.asc'),
      sbGet('transfer_types','select=*&order=sort_order.asc'),
      sbGet('patrol_statuses','select=*&order=sort_order.asc')
    ]);
    stores=s; machines=m; booths=b;
    machineTypes=mt; machineCategories=mc; suppliers=sup; ownershipTypes=ot; transferTypes=tt; patrolStatuses=ps;
    render();
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      '<div class="empty">❌ 読み込みエラー<br><small style="word-break:break-all;font-size:10px">'+esc(e.message)+'</small></div>';
    document.getElementById('headerBadge').textContent='エラー';
    console.error(e);
  }finally{hideLoading();}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function storeName(code){const s=stores.find(x=>x.store_code===code);return s?s.store_name:code||'—';}
function machineName(code){const m=machines.find(x=>x.machine_code===code);return m?m.machine_name:code||'—';}
function machineStore(code){const m=machines.find(x=>x.machine_code===code);return m?m.store_code:'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function genId(prefix){return prefix+Date.now().toString(36).toUpperCase();}
function regionBadge(r){
  const map={'熊本':'badge-green','鹿児島':'badge-blue','長崎':'badge-cyan','宮崎':'badge-yellow','福岡':'badge-blue'};
  return'<span class="badge '+(map[r]||'badge-blue')+'">'+esc(r||'—')+'</span>';
}
function activeBadge(v){
  return(v===false||v==='false')
    ?'<span class="badge badge-red">停止</span>'
    :'<span class="badge badge-green">稼働</span>';
}
function matchSearch(text){
  if(!searchQ)return true;
  return String(text||'').toLowerCase().includes(searchQ.toLowerCase());
}

// ─── SORT ─────────────────────────────────────────────────────────────────────
function toggleSort(tab,col){
  const s=tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col===col)s.dir=s.dir==='desc'?'asc':'desc';
  else{s.col=col;s.dir='desc';}
  render();
}
function sortArrow(tab,col){
  const s=tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col!==col)return'<span class="sort-arrow" style="opacity:.3">⇅</span>';
  return s.dir==='desc'
    ?'<span class="sort-arrow" style="color:var(--accent)">↓</span>'
    :'<span class="sort-arrow" style="color:var(--accent)">↑</span>';
}
function cmp(av,bv,dir){
  if(av==null)av='';if(bv==null)bv='';
  const r=(typeof av==='number'&&typeof bv==='number')?av-bv:String(av).localeCompare(String(bv),'ja');
  return dir==='desc'?-r:r;
}
function applySortStores(list){
  const s=storeSort;
  if(!s.col)return list.slice().sort((a,b)=>String(a.store_code||'').localeCompare(String(b.store_code||'')));
  return list.slice().sort((a,b)=>{
    if(s.col==='machine_count')return cmp(machines.filter(m=>m.store_code===a.store_code).length,machines.filter(m=>m.store_code===b.store_code).length,s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortMachines(list){
  const s=machineSort;
  if(!s.col)return list.slice().sort((a,b)=>String(a.machine_code||'').localeCompare(String(b.machine_code||'')));
  return list.slice().sort((a,b)=>{
    if(s.col==='booth_count')return cmp(booths.filter(x=>x.machine_code===a.machine_code).length,booths.filter(x=>x.machine_code===b.machine_code).length,s.dir);
    if(s.col==='store_name')return cmp(storeName(a.store_code),storeName(b.store_code),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortBooths(list){
  const s=boothSort;
  if(!s.col)return list.slice().sort((a,b)=>String(a.booth_code||'').localeCompare(String(b.booth_code||'')));
  return list.slice().sort((a,b)=>{
    if(s.col==='store_name')return cmp(storeName(a.store_code||machineStore(a.machine_code)),storeName(b.store_code||machineStore(b.machine_code)),s.dir);
    if(s.col==='machine_name')return cmp(machineName(a.machine_code),machineName(b.machine_code),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('mainContent');
  if(currentTab==='stores')el.innerHTML=renderStores();
  else if(currentTab==='machines')el.innerHTML=renderMachines();
  else if(currentTab==='booths')el.innerHTML=renderBooths();
  else if(currentTab==='machine_types')el.innerHTML=renderSimpleList('マシンタイプ',machineTypes,'type_id',['type_id','type_name','category'],'machine_types','type_id');
  else if(currentTab==='categories')el.innerHTML=renderSimpleList('カテゴリ',machineCategories,'category_id',['category_id','category_name','sort_order'],'machine_categories','category_id');
  else if(currentTab==='suppliers')el.innerHTML=renderSimpleList('仕入先',suppliers,'supplier_id',['supplier_id','supplier_name','supplier_type','is_active'],'suppliers','supplier_id');
  else if(currentTab==='ownership')el.innerHTML=renderSimpleList('所有形態',ownershipTypes,'type_id',['type_id','type_name','sort_order'],'ownership_types','type_id');
  else if(currentTab==='transfers')el.innerHTML=renderSimpleList('移管タイプ',transferTypes,'type_id',['type_id','type_name','sort_order'],'transfer_types','type_id');
  else if(currentTab==='patrols')el.innerHTML=renderSimpleList('巡回ステータス',patrolStatuses,'status_id',['status_id','status_name','color','sort_order'],'patrol_statuses','status_id');
  else if(currentTab==='tools') el.innerHTML=renderTools();
}
function th(tab,col,label){
  return'<th class="th-sort" onclick="toggleSort(\''+tab+'\',\''+col+'\')">'+label+sortArrow(tab,col)+'</th>';
}

function renderStores(){
  let list=stores;
  if(searchQ)list=list.filter(s=>matchSearch(s.store_name)||matchSearch(s.store_code)||matchSearch(s.region)||matchSearch(s.notes));
  const sorted=applySortStores(list);
  document.getElementById('headerBadge').textContent=stores.length+'店舗';
  const rows=sorted.map(s=>{
    const mc=machines.filter(m=>m.store_code===s.store_code).length;
    return'<tr>'
      +'<td><strong>'+esc(s.store_name)+'</strong></td>'
      +'<td>'+regionBadge(s.region)+'</td>'
      +'<td><code style="font-size:11px;color:var(--text2)">'+esc(s.store_code)+'</code></td>'
      +'<td style="font-size:12px;color:var(--text2)">'+esc(s.opened_at||'—')+'</td>'
      +'<td>'+activeBadge(s.is_active)+'</td>'
      +'<td>'+mc+'台</td>'
      +'<td><button class="btn-edit" onclick="editStore(\''+esc(s.store_code)+'\')">編集</button></td>'
      +'</tr>';
  }).join('');
  return'<div class="count-row"><span class="count-text">'+sorted.length+'/'+stores.length+'店舗</span>'
    +'<button class="btn-add" onclick="addStore()">＋ 店舗追加</button></div>'
    +'<div class="table-wrap"><table>'
    +'<colgroup><col style="width:22%"><col style="width:12%"><col style="width:12%"><col style="width:17%"><col style="width:9%"><col style="width:9%"><col style="width:19%"></colgroup>'

function getSimpleData(tableName) {
  const map = {machine_types:machineTypes, machine_categories:machineCategories, suppliers:suppliers, ownership_types:ownershipTypes, transfer_types:transferTypes, patrol_statuses:patrolStatuses};
  return map[tableName] || [];
}

function getSimpleFields(tableName) {
  const map = {
    machine_types: [{key:'type_id',label:'タイプID',required:true},{key:'type_name',label:'タイプ名',required:true},{key:'category',label:'カテゴリ'}],
    machine_categories: [{key:'category_id',label:'カテゴリID',required:true},{key:'category_name',label:'カテゴリ名',required:true},{key:'sort_order',label:'表示順',type:'number'}],
    suppliers: [{key:'supplier_id',label:'仕入先ID',required:true},{key:'supplier_name',label:'仕入先名',required:true},{key:'supplier_type',label:'タイプ'},{key:'is_active',label:'有効',type:'bool'}],
    ownership_types: [{key:'type_id',label:'タイプID',required:true},{key:'type_name',label:'タイプ名',required:true},{key:'sort_order',label:'表示順',type:'number'}],
    transfer_types: [{key:'type_id',label:'タイプID',required:true},{key:'type_name',label:'タイプ名',required:true},{key:'sort_order',label:'表示順',type:'number'}],
    patrol_statuses: [{key:'status_id',label:'ステータスID',required:true},{key:'status_name',label:'ステータス名',required:true},{key:'color',label:'色コード'},{key:'sort_order',label:'表示順',type:'number'}]
  };
  return map[tableName] || [];
}

function addSimple(tableName, pkCol) {
  const fields = getSimpleFields(tableName);
  const formHtml = fields.map(f => {
    if (f.type === 'bool') return '<div class="form-group"><label>' + f.label + '</label><select id="sf_' + f.key + '"><option value="true">はい</option><option value="false">いいえ</option></select></div>';
    return '<div class="form-group"><label>' + f.label + (f.required ? ' *' : '') + '</label><input id="sf_' + f.key + '"' + (f.type === 'number' ? ' type="number"' : '') + '></div>';
  }).join('');
  showModal('<div class="modal-title">追加</div>' + formHtml
    + '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveSimple(\'' + esc(tableName) + '\',\'' + esc(pkCol) + '\',true)">追加</button></div>');
}

function editSimple(tableName, pkCol, pkVal) {
  const data = getSimpleData(tableName);
  const item = data.find(x => String(x[pkCol]) === String(pkVal));
  if (!item) return;
  const fields = getSimpleFields(tableName);
  const formHtml = fields.map(f => {
    const val = item[f.key];
    if (f.type === 'bool') return '<div class="form-group"><label>' + f.label + '</label><select id="sf_' + f.key + '"><option value="true"' + (val !== false ? ' selected' : '') + '>はい</option><option value="false"' + (val === false ? ' selected' : '') + '>いいえ</option></select></div>';
    return '<div class="form-group"><label>' + f.label + (f.required ? ' *' : '') + '</label><input id="sf_' + f.key + '" value="' + esc(val != null ? val : '') + '"' + (f.type === 'number' ? ' type="number"' : '') + (f.key === pkCol ? ' disabled style="opacity:.5"' : '') + '></div>';
  }).join('');
  showModal('<div class="modal-title">編集</div>' + formHtml
    + '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveSimple(\'' + esc(tableName) + '\',\'' + esc(pkCol) + '\',false,\'' + esc(pkVal) + '\')">保存</button></div>'
    + '<button class="btn-del-modal" onclick="delSimple(\'' + esc(tableName) + '\',\'' + esc(pkCol) + '\',\'' + esc(pkVal) + '\')">削除</button>');
}

async function saveSimple(tableName, pkCol, isNew, pkVal) {
  const fields = getSimpleFields(tableName);
  const payload = {};
  for (const f of fields) {
    const el = document.getElementById('sf_' + f.key);
    if (!el) continue;
    if (!isNew && f.key === pkCol) continue;
    let v = el.value;
    if (f.type === 'number') { payload[f.key] = v !== '' ? Number(v) : null; }
    else if (f.type === 'bool') { payload[f.key] = v === 'true'; }
    else { payload[f.key] = v.trim() || null; }
  }
  if (isNew) {
    const pkEl = document.getElementById('sf_' + pkCol);
    if (pkEl) payload[pkCol] = pkEl.value.trim();
    if (!payload[pkCol]) { alert('IDは必須です'); return; }
  }
  closeModal(); showLoading();
  try {
    if (isNew) { await sbPost(tableName, payload); showToast('追加しました'); }
    else { await sbPatch(tableName, pkVal, pkCol, payload); showToast('保存しました'); }
    await loadAll();
  } catch(e) { showToast('エラー: ' + e.message, false); }
  finally { hideLoading(); }
}

async function delSimple(tableName, pkCol, pkVal) {
  if (!confirm('削除しますか？')) return;
  closeModal(); showLoading();
  try {
    await sbDelete(tableName, pkCol, pkVal);
    showToast('削除しました');
    await loadAll();
  } catch(e) { showToast('エラー: ' + e.message, false); }
  finally { hideLoading(); }
}

      headers = {stock_id:'在庫ID',prize_id:'景品ID',prize_name:'景品名',owner_type:'場所種別',owner_id:'場所ID',quantity:'数量',tags:'タグ',updated_at:'更新日',updated_by:'更新者',last_counted_at:'最終棚卸し'};

      headers = {movement_id:'移動ID',prize_id:'景品ID',movement_type:'種別',from_owner_type:'移動元種別',from_owner_id:'移動元ID',to_owner_type:'移動先種別',to_owner_id:'移動先ID',quantity:'数量',note:'メモ',reason:'理由',adjustment_reason:'調整理由',created_at:'日時',created_by:'操作者'};
      data = raw; fileName = `ClawOps_在庫移動_${today}`;
    }
    else if (type === 'suppliers') {
      const raw = await sbGet('suppliers','select=supplier_id,supplier_name,supplier_type,contact_method,order_method,lead_time_days,payment_terms,is_active,notes&order=supplier_name');
      headers = {supplier_id:'仕入先ID',supplier_name:'仕入先名',supplier_type:'タイプ',contact_method:'連絡方法',order_method:'発注方法',lead_time_days:'リードタイム(日)',payment_terms:'支払条件',is_active:'有効',notes:'メモ'};
      data = raw; fileName = `ClawOps_仕入先_${today}`;
    }
    else if (type === 'readings') {
      const raw = await sbGet('meter_readings','select=reading_id,booth_id,full_booth_code,read_time,in_meter,out_meter,prize_restock_count,prize_stock_count,prize_name,set_a,set_c,set_l,set_r,set_o,note,source,created_at&order=read_time.desc');

      data = raw; fileName = `ClawOps_メーター読取_${today}`;

    // ヘッダーキー順でデータを整形
    const keys = Object.keys(headers);
    const rows = data.map(row => keys.map(k => row[k] ?? ''));
    const ws = XLSX.utils.aoa_to_sheet([keys.map(k => headers[k]), ...rows]);
    // 列幅自動調整
    ws['!cols'] = keys.map(k => ({wch: Math.max(headers[k].length * 2, 12)}));
    const wb = XLSX.utils.book_new();

function switchTab(tab){
  currentTab=tab;filterStore='';filterMachine='';searchQ='';
  document.getElementById('searchInput').value='';
  // タブボタンのactive制御
  const settingsTabs=['machine_types','categories','ownership','transfers','patrols'];
  const isSettings=settingsTabs.includes(tab);
  document.querySelectorAll('.tab-btn').forEach(b => {
    const tabName = b.getAttribute('onclick')?.match(/switchTab\('(.+?)'\)/)?.[1];
    b.classList.toggle('active', tabName === tab);
  });
  // 設定ドロップダウンの選択制御
  const sel=document.getElementById('settingsSelect');
  if(sel){
    sel.value=isSettings?tab:'';
    sel.style.borderColor=isSettings?'var(--accent)':'var(--border)';
    sel.style.color=isSettings?'var(--accent)':'var(--text2)';
  }
  render();
}
