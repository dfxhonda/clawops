<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景品案内 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:8px;
  --nav-h:58px;
  --header-h:56px;
  --toolbar-h:52px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px}

header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-spacer{flex:1}
.btn-add{padding:8px 16px;border-radius:var(--radius);background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:var(--accent2)}

.toolbar{
  position:fixed;top:var(--header-h);left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:99;overflow-x:auto;
}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.filter-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px}
.search-input{flex:1;min-width:100px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
.search-input::placeholder{color:var(--text2)}
.btn-clear{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}

.main{
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;bottom:var(--nav-h);
  display:flex;overflow:hidden;
}
.list-pane{flex:3;min-width:300px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.detail-pane{flex:2;min-width:280px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:1}
th{background:var(--surface);padding:8px;text-align:left;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;font-size:12px;border-bottom:1px solid var(--border)}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
td{padding:6px 8px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--surface2)}
tr.sel{background:rgba(124,106,255,.06);border-left:3px solid var(--accent)}
.td-r{text-align:right;font-variant-numeric:tabular-nums}
.empty-pane{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-unread{background:rgba(124,106,255,.15);color:var(--accent)}
.b-read{background:rgba(144,144,168,.15);color:var(--text2)}
.b-interested{background:rgba(243,156,18,.15);color:var(--yellow)}
.b-ordered{background:rgba(46,204,113,.15);color:var(--green)}
.supplier-tag{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.sup-SGP{background:rgba(0,180,216,.15);color:var(--cyan)}
.sup-PCH{background:rgba(243,156,18,.15);color:var(--yellow)}
.sup-SDY{background:rgba(46,204,113,.15);color:var(--green)}
.sup-INF{background:rgba(231,76,60,.15);color:var(--red)}
.sup-AXS{background:rgba(124,106,255,.15);color:var(--accent)}

/* Detail */
.detail-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-header h3{font-size:15px;color:var(--accent)}
.field{padding:8px 16px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px}
.field textarea{min-height:60px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);outline:none}
.detail-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}
.btn{border:none;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-warn{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* Toast */
.toast{position:fixed;top:calc(var(--header-h)+var(--toolbar-h)+8px);right:16px;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:0;max-width:480px;width:100%;max-height:85vh;overflow-y:auto}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-header h3{flex:1;font-size:15px;color:var(--accent)}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;z-index:150;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;
  transition:color .15s;text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* Mobile */
.mobile-list{display:none;position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.mobile-detail{position:fixed;top:0;bottom:0;left:0;right:0;z-index:160;background:var(--bg);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mobile-detail.open{transform:translateX(0)}
.mc-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.mc-item:active{background:var(--surface2)}
.mc-body{flex:1;min-width:0}
.mc-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-meta{display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap;margin-top:2px}
.mc-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.fab{display:none;position:fixed;right:20px;bottom:calc(var(--nav-h)+16px);width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;z-index:110;box-shadow:0 4px 12px rgba(0,0,0,.4)}

/* Image */
.detail-img{width:100%;max-height:300px;object-fit:contain;border-radius:var(--radius);background:var(--surface2);margin-bottom:12px}

@media(max-width:768px){
  .main{display:none}
  .btn-add{display:none!important}
  .mobile-list{display:block;top:calc(var(--header-h) + var(--toolbar-h))}
  .fab{display:block}
}
</style>
</head>
<body>

<header>
  <div class="header-title">📬 景品案内</div>
  <div class="header-count" id="countBadge">読込中...</div>
  <div class="header-spacer"></div>
  <button class="btn-add" onclick="openAddModal()">+ 案内を追加</button>
</header>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="景品名で検索...">
  <div class="tb-sep"></div>
  <select class="filter-select" id="supplierFilter" onchange="render()">
    <option value="">仕入先：全て</option>
  </select>
  <select class="filter-select" id="statusFilter" onchange="render()">
    <option value="">状態：全て</option>
    <option value="unread">未読</option>
    <option value="interested">興味あり</option>
    <option value="ordered">発注済</option>
    <option value="read">既読</option>
  </select>
  <button class="btn-clear" onclick="clearFilters()">クリア</button>
</div>

<div class="main">
  <div class="list-pane" id="listPane">
    <div class="empty-pane"><div class="empty-icon">⏳</div>読み込み中...</div>
  </div>
  <div class="detail-pane" id="detailPane">
    <div class="empty-pane"><div class="empty-icon">👈</div>左のリストから選択</div>
  </div>
</div>

<!-- Mobile -->
<div class="mobile-list" id="mobileList"></div>
<div class="mobile-detail" id="mobileDetail"></div>
<button class="fab" onclick="openAddModal()" aria-label="案内を追加">＋</button>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">案内を追加</h3><button class="modal-close" onclick="closeAddModal()">&times;</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Order Modal -->
<div class="modal-bg" id="orderModal">
  <div class="modal">
    <div class="modal-header"><h3>発注に回す</h3><button class="modal-close" onclick="closeOrderModal()">&times;</button></div>
    <div id="orderBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<nav class="bottom-nav">
  <a class="nav-item" href="prizes.html"><div class="nav-icon">🏆</div><div>景品</div></a>
  <a class="nav-item" href="orders.html"><div class="nav-icon">📋</div><div>発注</div></a>
  <a class="nav-item" href="inventory.html"><div class="nav-icon">📦</div><div>在庫</div></a>
  <a class="nav-item active"><div class="nav-icon">📬</div><div>案内</div></a>
  <a class="nav-item" href="admin.html"><div class="nav-icon">⚙️</div><div>管理</div></a>
</nav>

<script>
const SB_URL='https://gedxzunoyzmvbqgwjalx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZHh6dW5veXptdmJxZ3dqYWx4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE0ODA1OCwiZXhwIjoyMDg5NzI0MDU4fQ.ATjGmg5kdm-cs_663ddOUvwTZ8vbn24aSjz6uUYm4Fs';
const SB_STORAGE=SB_URL+'/storage/v1/object/public/announcements/';

const SUP_NAME={SGP:'景品フォーム',PCH:'ピーチトイ',SDY:'エスディーワイ',INF:'インフィニティ',AXS:'アクシズ'};
const SUP_IDS=Object.keys(SUP_NAME);
const STATUS_LABEL={unread:'未読',read:'既読',interested:'興味あり',ordered:'発注済',skipped:'スキップ'};

async function sbGet(t,p=''){let all=[],offset=0;const PAGE=1000;while(true){const r=await fetch(`${SB_URL}/rest/v1/${t}?${p}&limit=${PAGE}&offset=${offset}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(await r.text());const d=await r.json();all=all.concat(d);if(d.length<PAGE)break;offset+=PAGE;}return all;}
async function sbPost(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbPatch(t,id,b){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text())}
async function sbDelete(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(await r.text())}

// ─── STATE ───
function getStaffId(){try{const s=JSON.parse(sessionStorage.getItem('clawops_staff'));return s?.staff_id||null}catch{return null}}

let ITEMS=[];
let selId=null;
let editId=null;
let sortKey='created_at';
let sortDir='desc';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return n!=null?Number(n).toLocaleString():'—'}
function fmtDate(d){if(!d)return'—';const p=String(d).split('T')[0].split('-');return p[0].slice(2)+'.'+p[1]+'.'+p[2]}
function supName(id){return SUP_NAME[id]||id||'—'}

let _tt;
function showToast(msg,ok=true){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(ok?'toast-ok':'toast-err');el.style.display='block';if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.style.display='none',3000)}
function showLoading(){document.getElementById('loadingOverlay').classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

// ─── LOAD ───
async function loadAll(){
  showLoading();
  try{
    ITEMS=await sbGet('prize_announcements','select=*&order=created_at.desc&limit=2000');
    populateFilters();
    render();
    if(selId)renderDetail();
  }catch(e){
    document.getElementById('listPane').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
  }finally{hideLoading()}
}

function populateFilters(){
  const sf=document.getElementById('supplierFilter');
  const cur=sf.value;
  sf.innerHTML='<option value="">仕入先：全て</option>'+SUP_IDS.map(s=>`<option value="${s}">${supName(s)}</option>`).join('');
  sf.value=cur;
}

// ─── FILTER ───
function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  const sup=document.getElementById('supplierFilter')?.value||'';
  const stat=document.getElementById('statusFilter')?.value||'';
  let list=ITEMS.filter(it=>{
    if(sup&&it.supplier_id!==sup)return false;
    if(stat&&it.status!==stat)return false;
    if(q&&!(it.prize_name||'').toLowerCase().includes(q))return false;
    if((it.status==='read'||it.status==='skipped')&&it.expires_at&&new Date(it.expires_at)<new Date())return false;
    return true;
  });
  const dir=sortDir==='asc'?1:-1;
  list.sort((a,b)=>{
    let av,bv;
    if(sortKey==='prize_name'){av=a.prize_name||'';bv=b.prize_name||'';return dir*av.localeCompare(bv,'ja')}
    if(sortKey==='unit_cost'){av=Number(a.unit_cost)||0;bv=Number(b.unit_cost)||0;return dir*(av-bv)}
    if(sortKey==='case_quantity'){av=Number(a.case_quantity)||0;bv=Number(b.case_quantity)||0;return dir*(av-bv)}
    if(sortKey==='supplier_id'){av=supName(a.supplier_id);bv=supName(b.supplier_id);return dir*av.localeCompare(bv,'ja')}
    if(sortKey==='status'){av=a.status||'';bv=b.status||'';return dir*av.localeCompare(bv)}
    if(sortKey==='created_at'){av=a.created_at||'';bv=b.created_at||'';return dir*av.localeCompare(bv)}
    return 0;
  });
  return list;
}
function setSort(key){if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=key;sortDir=key==='created_at'?'desc':'asc'}render()}
function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('supplierFilter').value='';
  document.getElementById('statusFilter').value='';
  render();
}
document.getElementById('searchInput')?.addEventListener('input',()=>render());

// ─── RENDER TABLE ───
function render(){
  const list=getFiltered();
  document.getElementById('countBadge').textContent=list.length+'件';
  renderTable(list);
  renderMobileList(list);
}

function renderTable(list){
  const pane=document.getElementById('listPane');
  if(!list.length){pane.innerHTML='<div class="empty-pane"><div class="empty-icon">📬</div>案内がありません</div>';return}
  pane.innerHTML=`
<table>
<thead><tr>
  <th style="width:5%"></th>
  <th style="width:30%" class="${sortKey==='prize_name'?'sorted':''}" onclick="setSort('prize_name')">景品名${sortKey==='prize_name'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
  <th style="width:12%" class="${sortKey==='supplier_id'?'sorted':''}" onclick="setSort('supplier_id')">仕入先${sortKey==='supplier_id'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
  <th style="width:10%;text-align:right" class="${sortKey==='unit_cost'?'sorted':''}" onclick="setSort('unit_cost')">単価${sortKey==='unit_cost'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
  <th style="width:8%;text-align:right" class="${sortKey==='case_quantity'?'sorted':''}" onclick="setSort('case_quantity')">入り数${sortKey==='case_quantity'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
  <th style="width:12%" class="${sortKey==='status'?'sorted':''}" onclick="setSort('status')">状態${sortKey==='status'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
  <th style="width:10%" class="${sortKey==='created_at'?'sorted':''}" onclick="setSort('created_at')">登録日${sortKey==='created_at'?(sortDir==='asc'?' ↑':' ↓'):''}</th>
</tr></thead>
<tbody>
${list.map(it=>{
  const sel=it.id===selId;
  const hasImg=!!it.image_url;
  return`<tr class="${sel?'sel':''}" onclick="selectItem(${it.id})">
  <td>${hasImg?`<img src="${esc(it.image_url)}" style="width:32px;height:32px;border-radius:4px;object-fit:cover">`:'<div style="width:32px;height:32px;border-radius:4px;background:var(--surface2)"></div>'}</td>
  <td style="font-weight:600">${esc(it.prize_name)}</td>
  <td><span class="supplier-tag sup-${it.supplier_id||''}">${supName(it.supplier_id)}</span></td>
  <td class="td-r">${it.unit_cost?fmt(it.unit_cost):'—'}</td>
  <td class="td-r">${it.case_quantity||'—'}</td>
  <td><span class="badge b-${it.status}">${STATUS_LABEL[it.status]||it.status}</span></td>
  <td style="font-size:11px;color:var(--text2)">${fmtDate(it.created_at)}</td>
</tr>`}).join('')}
</tbody></table>`;
}

// ─── DETAIL (右パネル常時表示) ───
function selectItem(id){
  selId=id;
  renderDetail();
  render();
}

function renderDetail(){
  const pane=document.getElementById('detailPane');
  const it=ITEMS.find(x=>x.id===selId);
  if(!it){pane.innerHTML='<div class="empty-pane"><div class="empty-icon">👈</div>左のリストから選択</div>';return}

  pane.innerHTML=`
  <div class="detail-header"><h3>${esc(it.prize_name)}</h3></div>
  <div style="padding:16px">
    ${it.image_url?`<img src="${esc(it.image_url)}" class="detail-img" onerror="this.style.display='none'">`:''}
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <span class="supplier-tag sup-${it.supplier_id||''}">${supName(it.supplier_id)}</span>
      <span class="badge b-${it.status}">${STATUS_LABEL[it.status]||it.status}</span>
    </div>
    <div style="display:flex;gap:20px;margin-bottom:16px">
      <div><div style="font-size:11px;color:var(--text2)">単価</div><div style="font-size:18px;font-weight:700">${it.unit_cost?fmt(it.unit_cost):'—'}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">入り数</div><div style="font-size:18px;font-weight:700">${it.case_quantity||'—'}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">箱単価</div><div style="font-size:18px;font-weight:700">${it.case_cost?fmt(it.case_cost):'—'}</div></div>
    </div>
    ${it.release_date?`<div style="margin-bottom:6px;font-size:13px"><span style="color:var(--text2)">発売日:</span> ${fmtDate(it.release_date)}</div>`:''}
    ${it.notes?`<div style="margin-bottom:12px;font-size:13px;padding:8px;background:var(--surface2);border-radius:6px">${esc(it.notes)}</div>`:''}
    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">登録: ${fmtDate(it.created_at)} | 期限: ${fmtDate(it.expires_at)}</div>
    ${it.order_id?`<div style="font-size:12px;color:var(--green);margin-top:4px">発注ID: ${esc(it.order_id)}</div>`:''}
  </div>
  <div class="detail-actions">
    ${it.status!=='ordered'?`<button class="btn btn-green" style="flex:1" onclick="openOrderModal(${it.id})">発注に回す</button>`:''}
    ${it.status==='unread'?`<button class="btn btn-orange" style="flex:1" onclick="setStatus(${it.id},'interested')">興味あり</button>`:''}
    ${it.status==='unread'||it.status==='interested'?`<button class="btn btn-ghost" style="flex:1" onclick="setStatus(${it.id},'read')">既読</button>`:''}
    <button class="btn btn-primary" style="flex:1" onclick="openEditModal(${it.id})">編集</button>
    ${it.status!=='ordered'?`<button class="btn btn-warn" style="flex:1" onclick="deleteItem(${it.id})">削除</button>`:''}
  </div>`;
}

// ─── MOBILE LIST ───
function renderMobileList(list){
  const el=document.getElementById('mobileList');
  if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty-pane"><div class="empty-icon">📬</div>案内がありません</div>';return}
  el.innerHTML=list.map(it=>`<div class="mc-item" onclick="openMobileDetail(${it.id})">
  ${it.image_url?`<img class="mc-thumb" src="${esc(it.image_url)}" onerror="this.style.display='none'">`:''}
  <div class="mc-body">
    <div class="mc-name">${esc(it.prize_name)}</div>
    <div class="mc-meta">
      <span class="supplier-tag sup-${it.supplier_id||''}" style="font-size:10px">${supName(it.supplier_id)}</span>
      ${it.unit_cost?`<span>${fmt(it.unit_cost)}</span>`:''}
      ${it.case_quantity?`<span>${it.case_quantity}入</span>`:''}
      <span class="badge b-${it.status}" style="font-size:10px">${STATUS_LABEL[it.status]||it.status}</span>
    </div>
  </div>
  <div style="color:var(--text2);font-size:18px">›</div>
</div>`).join('');
}

// ─── MOBILE DETAIL (スライドイン) ───
function openMobileDetail(id){
  selId=id;
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  const el=document.getElementById('mobileDetail');
  el.innerHTML=`
  <header style="position:sticky;top:0;background:var(--surface);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;z-index:1">
    <button onclick="closeMobileDetail()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer">←</button>
    <h3 style="font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.prize_name)}</h3>
  </header>
  <div style="padding:16px">
    ${it.image_url?`<img src="${esc(it.image_url)}" style="width:100%;max-height:300px;object-fit:contain;border-radius:var(--radius);background:var(--surface2);margin-bottom:16px" onerror="this.style.display='none'">`:''}
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <span class="supplier-tag sup-${it.supplier_id||''}">${supName(it.supplier_id)}</span>
      <span class="badge b-${it.status}">${STATUS_LABEL[it.status]||it.status}</span>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:20px;font-weight:700">${it.unit_cost?fmt(it.unit_cost):'—'}</div>
        <div style="font-size:11px;color:var(--text2)">単価</div>
      </div>
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:20px;font-weight:700">${it.case_quantity||'—'}</div>
        <div style="font-size:11px;color:var(--text2)">入り数</div>
      </div>
      <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center">
        <div style="font-size:20px;font-weight:700">${it.case_cost?fmt(it.case_cost):'—'}</div>
        <div style="font-size:11px;color:var(--text2)">箱単価</div>
      </div>
    </div>
    ${it.release_date?`<div style="margin-bottom:8px;font-size:13px"><span style="color:var(--text2)">発売日:</span> ${fmtDate(it.release_date)}</div>`:''}
    ${it.notes?`<div style="margin-bottom:12px;font-size:13px;padding:10px;background:var(--surface2);border-radius:6px">${esc(it.notes)}</div>`:''}
    <div style="font-size:11px;color:var(--text2);margin-bottom:16px">登録: ${fmtDate(it.created_at)} | 期限: ${fmtDate(it.expires_at)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${it.status!=='ordered'?`<button class="btn btn-green" style="flex:1" onclick="openOrderModal(${it.id})">発注に回す</button>`:''}
      ${it.status==='unread'?`<button class="btn btn-orange" style="flex:1" onclick="setStatus(${it.id},'interested');closeMobileDetail()">興味あり</button>`:''}
      ${it.status==='unread'||it.status==='interested'?`<button class="btn btn-ghost" style="flex:1" onclick="setStatus(${it.id},'read');closeMobileDetail()">既読</button>`:''}
      <button class="btn btn-primary" style="flex:1" onclick="openEditModal(${it.id})">編集</button>
    </div>
  </div>`;
  requestAnimationFrame(()=>el.classList.add('open'));
}
function closeMobileDetail(){document.getElementById('mobileDetail').classList.remove('open')}

// ─── ADD / EDIT MODAL ───
function openAddModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='案内を追加';
  document.getElementById('modalBody').innerHTML=buildForm({});
  document.getElementById('addModal').classList.add('open');
}
function openEditModal(id){
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  editId=id;
  document.getElementById('modalTitle').textContent='案内を編集';
  document.getElementById('modalBody').innerHTML=buildForm(it);
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');editId=null}

function buildForm(it){
  return`
  <div class="field"><label>景品名 <span style="color:var(--red)">*</span></label><input id="fName" value="${esc(it.prize_name||'')}"></div>
  <div class="field"><label>仕入先</label><select id="fSup">${'<option value="">選択</option>'+SUP_IDS.map(s=>`<option value="${s}" ${it.supplier_id===s?'selected':''}>${supName(s)}</option>`).join('')}</select></div>
  <div class="field"><label>個別単価</label><input type="number" id="fCost" value="${it.unit_cost||''}"></div>
  <div style="display:flex;gap:8px">
    <div class="field" style="flex:1"><label>入り数</label><input type="number" id="fCaseQty" value="${it.case_quantity||''}"></div>
    <div class="field" style="flex:1"><label>箱単価</label><input type="number" id="fCaseCost" value="${it.case_cost||''}"></div>
  </div>
  <div class="field"><label>発売日</label><input type="date" id="fRelease" value="${it.release_date||''}"></div>
  <div class="field"><label>画像URL</label><input id="fImage" value="${esc(it.image_url||'')}" placeholder="https://..."></div>
  <div class="field"><label>メモ</label><textarea id="fNotes">${esc(it.notes||'')}</textarea></div>
  <div style="padding:12px 16px;display:flex;gap:8px">
    <button class="btn btn-ghost" onclick="closeAddModal()" style="flex:1">キャンセル</button>
    <button class="btn btn-primary" onclick="saveForm()" style="flex:1">保存</button>
  </div>
  <div id="formErr" style="padding:0 16px 12px;font-size:12px;color:var(--red)"></div>`;
}

async function saveForm(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('formErr').textContent='景品名を入力してください';return}
  const body={
    prize_name:name,
    supplier_id:document.getElementById('fSup').value||null,
    unit_cost:Number(document.getElementById('fCost').value)||null,
    case_quantity:Number(document.getElementById('fCaseQty').value)||null,
    case_cost:Number(document.getElementById('fCaseCost').value)||null,
    release_date:document.getElementById('fRelease').value||null,
    image_url:document.getElementById('fImage').value.trim()||null,
    notes:document.getElementById('fNotes').value.trim()||null,
    source_type:'manual',
    updated_by:getStaffId(),
  };
  showLoading();
  try{
    if(editId){
      await sbPatch('prize_announcements',editId,body);
      showToast('更新しました');
    }else{
      body.status='unread';
      await sbPost('prize_announcements',body);
      showToast('追加しました');
    }
    closeAddModal();closeMobileDetail();
    await loadAll();
  }catch(e){document.getElementById('formErr').textContent='エラー: '+e.message}finally{hideLoading()}
}

// ─── STATUS ───
async function setStatus(id,status){
  showLoading();
  try{
    await sbPatch('prize_announcements',id,{status,updated_by:getStaffId()});
    const it=ITEMS.find(x=>x.id===id);if(it)it.status=status;
    showToast(STATUS_LABEL[status]+'にしました');
    render();renderDetail();
  }catch(e){showToast('エラー: '+e.message,false)}finally{hideLoading()}
}

// ─── DELETE ───
async function deleteItem(id){
  if(!confirm('この案内を削除しますか？'))return;
  showLoading();
  try{
    await sbDelete('prize_announcements',id);
    ITEMS=ITEMS.filter(x=>x.id!==id);
    if(selId===id)selId=null;
    showToast('削除しました');render();renderDetail();
  }catch(e){showToast('エラー: '+e.message,false)}finally{hideLoading()}
}

// ─── ORDER MODAL ───
function openOrderModal(id){
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('orderBody').innerHTML=`
  <div style="padding:12px 16px">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">${esc(it.prize_name)}</div>
    <div style="display:flex;gap:12px;margin-bottom:16px;font-size:13px;color:var(--text2)">
      <span>${supName(it.supplier_id)}</span>
      ${it.unit_cost?`<span>${fmt(it.unit_cost)}</span>`:''}
    </div>
    <div class="field"><label>発注数量 <span style="color:var(--red)">*</span></label><input type="number" id="ordQty" min="1" value="${it.case_quantity||''}" placeholder="個数"></div>
    <div class="field"><label>発注日</label><input type="date" id="ordDate" value="${today}"></div>
    <div class="field"><label>入荷先</label><input id="ordDest" placeholder="例: 久留米倉庫"></div>
    <div style="display:flex;gap:8px;padding:12px 0">
      <button class="btn btn-ghost" onclick="closeOrderModal()" style="flex:1">キャンセル</button>
      <button class="btn btn-green" onclick="submitOrder(${it.id})" style="flex:1">発注に登録</button>
    </div>
    <div id="ordErr" style="font-size:12px;color:var(--red)"></div>
  </div>`;
  document.getElementById('orderModal').classList.add('open');
}
function closeOrderModal(){document.getElementById('orderModal').classList.remove('open')}

async function submitOrder(annId){
  const it=ITEMS.find(x=>x.id===annId);if(!it)return;
  const qty=parseInt(document.getElementById('ordQty').value);
  const ordDate=document.getElementById('ordDate').value;
  const dest=document.getElementById('ordDest').value.trim();
  if(!qty||qty<1){document.getElementById('ordErr').textContent='数量を入力してください';return}
  showLoading();
  try{
    const orderId='ORD-'+String(Date.now()).slice(-6)+'-'+Math.random().toString(36).slice(2,5).toUpperCase();
    await sbPost('prize_orders',{
      order_id:orderId,prize_id:null,supplier_id:it.supplier_id||null,
      order_date:ordDate||new Date().toISOString().split('T')[0],
      quantity:qty,unit_cost:it.unit_cost||null,
      case_quantity:it.case_quantity||null,case_cost:it.case_cost||null,
      status:'ordered',prize_name_raw:it.prize_name,
      destination:dest||null,created_at:new Date().toISOString(),updated_by:getStaffId(),
    });
    await sbPatch('prize_announcements',annId,{status:'ordered',ordered_at:new Date().toISOString(),order_id:orderId,updated_by:getStaffId()});
    closeOrderModal();closeMobileDetail();
    showToast('発注に登録しました: '+orderId);
    await loadAll();
  }catch(e){document.getElementById('ordErr').textContent='エラー: '+e.message}finally{hideLoading()}
}

// ─── INIT ───
loadAll();
</script>
</body>
</html>
