<!DOCTYPE html>
<html lang="ja">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>景品案内 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:8px;
  --nav-h:58px;
  --header-h:56px;
  --toolbar-h:52px;
  --white:#fff;--btn-min-h:44px;--badge-fs:12px;--space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:24px;--danger-bg:#5a3a3a;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px}

header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-spacer{flex:1}
.btn-add{padding:8px 16px;border-radius:var(--radius);background:var(--accent);color:var(--white);border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:var(--btn-min-h)}
.btn-add:hover{background:var(--accent2)}

.toolbar{
  position:fixed;top:var(--header-h);left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:99;overflow-x:auto;
}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.filter-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px}
.search-input{flex:1;min-width:100px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
.search-input::placeholder{color:var(--text2)}
.btn-clear{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}

.main{
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;bottom:var(--nav-h);
  display:flex;overflow:hidden;
}
.list-pane{flex:3;min-width:300px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.detail-pane{flex:2;min-width:280px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:1}
th{background:var(--surface);padding:8px;text-align:left;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;font-size:12px;border-bottom:1px solid var(--border)}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
td{padding:6px 8px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--surface2)}
tr.sel{background:rgba(124,106,255,.06);border-left:3px solid var(--accent)}
.td-r{text-align:right;font-variant-numeric:tabular-nums}
.empty-pane{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:var(--badge-fs);font-weight:600}
.b-unread{background:rgba(124,106,255,.15);color:var(--accent)}
.b-read{background:rgba(144,144,168,.15);color:var(--text2)}
.b-interested{background:rgba(243,156,18,.15);color:var(--yellow)}
.b-ordered{background:rgba(46,204,113,.15);color:var(--green)}
.supplier-tag{padding:3px 8px;border-radius:4px;font-size:var(--badge-fs);font-weight:600}
.sup-SGP{background:rgba(0,180,216,.15);color:var(--cyan)}
.sup-PCH{background:rgba(243,156,18,.15);color:var(--yellow)}
.sup-SDY{background:rgba(46,204,113,.15);color:var(--green)}
.sup-INF{background:rgba(231,76,60,.15);color:var(--red)}
.sup-AXS{background:rgba(124,106,255,.15);color:var(--accent)}

/* Detail */
.detail-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-header h3{font-size:15px;color:var(--accent);word-break:break-word}
.field{padding:8px 16px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px}
.field textarea{min-height:60px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);outline:none}
.detail-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}
.btn{border:none;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;min-height:var(--btn-min-h)}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-green{background:var(--green);color:var(--white)}
.btn-orange{background:var(--orange);color:var(--white)}
.btn-warn{background:var(--red);color:var(--white)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* Toast */
.toast{position:fixed;top:calc(var(--header-h)+var(--toolbar-h)+8px);right:16px;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast-ok{background:var(--green);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:0;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;position:relative}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-header h3{flex:1;font-size:15px;color:var(--accent)}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;z-index:150;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;
  transition:color .15s;text-decoration:none;-webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* Mobile */
.mobile-list{display:none;position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.mobile-detail{position:fixed;top:0;bottom:0;left:0;right:0;z-index:160;background:var(--bg);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mobile-detail.open{transform:translateX(0)}
.mc-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;min-height:56px}
.mc-item:active{background:var(--surface2)}
.mc-body{flex:1;min-width:0}
.mc-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-meta{display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap;margin-top:2px}
.mc-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.fab{display:none;position:fixed;right:20px;bottom:calc(var(--nav-h)+16px);width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--white);border:none;font-size:24px;cursor:pointer;z-index:110;box-shadow:0 4px 12px rgba(0,0,0,.4)}

/* Image */
.detail-img{width:100%;max-height:300px;object-fit:contain;border-radius:var(--radius);background:var(--surface2);margin-bottom:12px}

/* ── Header search ── */
.header-search{
  display:none;flex-shrink:1;min-width:0;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 10px;color:var(--text);font-size:13px;outline:none;width:140px;
}
.header-search:focus{border-color:var(--accent)}
.header-search::placeholder{color:var(--text2)}

/* ── Sort bar ── */
.sort-bar{
  display:none;
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;
  height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:4px;overflow-x:auto;z-index:98;
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{
  flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.1)}

@media(max-width:768px){
  .main{display:none}
  .btn-add{display:none!important}
  .header-search{display:block}
  .search-input{display:none}
  .sort-bar{display:flex}
  .mobile-list{display:block;top:calc(var(--header-h) + var(--toolbar-h) + 36px)}
  .fab{display:block}
}
.stepper{display:flex;align-items:center;gap:0}
.stepper input{text-align:center;border-radius:0;-moz-appearance:textfield;font-size:16px}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper-btn{width:44px;height:44px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:background .15s}
.stepper-btn:active{background:var(--accent)}
.stepper-btn.minus{border-radius:var(--radius) 0 0 var(--radius)}
.stepper-btn.plus{border-radius:0 var(--radius) var(--radius) 0}
</style>
</head>
<body>

<header>
  <a href="/admin/menu" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:16px;border:1px solid var(--border);text-decoration:none;flex-shrink:0">🏠</a>
  <div class="header-title">📬 景品案内</div>
  <div class="header-count" id="countBadge">読込中...</div>
  <input type="search" class="header-search" id="headerSearch" placeholder="検索..." autocomplete="off">
  <div class="header-spacer"></div>
  <button class="btn-add" onclick="openAddModal()">+ 案内を追加</button>
  <button onclick="if(typeof isDirty!=='undefined'&&isDirty){if(!confirm('未保存の変更があります。ログアウトしますか？'))return}else{if(!confirm('ログアウトしますか？'))return}sessionStorage.clear();location.href='index.html'" style="background:none;border:1px solid var(--danger-bg);color:#e74c3c;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;margin-left:8px">ログアウト</button>
</header>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="景品名で検索...">
  <div class="tb-sep"></div>
  <select class="filter-select" id="supplierFilter" onchange="resetDisplayCount();render()">
    <option value="">仕入先：全て</option>
  </select>
  <select class="filter-select" id="statusFilter" onchange="resetDisplayCount();render()">
    <option value="">状態：全て</option>
    <option value="unread">未読</option>
    <option value="interested">興味あり</option>
    <option value="ordered">発注済</option>
    <option value="read">既読</option>
  </select>
  <button class="btn-clear" onclick="clearFilters()">クリア</button>
</div>
<div class="sort-bar" id="sortBar"></div>

<div class="main">
  <div class="list-pane" id="listPane">
    <div class="empty-pane"><div class="empty-icon">⏳</div>読み込み中...</div>
  </div>
  <div class="detail-pane" id="detailPane">
    <div class="empty-pane"><div class="empty-icon">👈</div>左のリストから選択</div>
  </div>
</div>

<!-- Mobile -->
<div class="mobile-list" id="mobileList"></div>
<div class="mobile-detail" id="mobileDetail"></div>
<button class="fab" onclick="openAddModal()" aria-label="案内を追加">＋</button>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">案内を追加</h3><button class="modal-close" onclick="closeAddModal()">&times;</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Order Modal -->
<div class="modal-bg" id="orderModal" onclick="if(event.target===this)closeOrderModal()">
  <div class="modal">
    <div class="modal-header"><h3>発注に回す</h3><button class="modal-close" onclick="closeOrderModal()">&times;</button></div>
    <div id="orderBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<nav class="bottom-nav">
  <a class="nav-item" href="/admin/menu"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></a>
  <a class="nav-item" href="prizes.html"><div class="nav-icon">🏆</div><div>景品</div></a>
  <a class="nav-item" href="orders.html"><div class="nav-icon">📋</div><div>発注</div></a>
  <a class="nav-item" href="inventory.html"><div class="nav-icon">📦</div><div>在庫</div></a>
  <a class="nav-item active"><div class="nav-icon">📬</div><div>案内</div></a>
  <a class="nav-item" href="admin.html"><div class="nav-icon">⚙️</div><div>管理</div></a>
</nav>

<script>
const SB_STORAGE = window.CLAWOPS_CONFIG.SUPABASE_STORAGE;

let SUPPLIERS_LIST=[];
let SUP_NAME={};
let SUP_IDS=[];

async function ensureSupplier(name) {
  if (!name) return null;
  const existing = SUPPLIERS_LIST.find(s => s.supplier_name === name);
  if (existing) return existing.supplier_id;
  const newId = name.slice(0,3).toUpperCase().replace(/[^A-Z0-9]/g,'X') + String(Date.now()).slice(-2);
  await sbPost('suppliers', {supplier_id: newId, supplier_name: name, is_active: true});
  SUPPLIERS_LIST.push({supplier_id: newId, supplier_name: name});
  SUP_NAME[newId] = name;
  SUP_IDS.push(newId);
  return newId;
}
const STATUS_LABEL={unread:'未読',read:'既読',interested:'興味あり',ordered:'発注済',skipped:'スキップ'};

// ─── STATE ───
function getStaffId(){try{const s=JSON.parse(sessionStorage.getItem('clawops_staff'));return s?.staff_id||null}catch{return null}}

let ITEMS=[];
let selId=null;
let editId=null;
let sortKey='created_at';
let sortDir='desc';
const DISPLAY_LIMIT=100;
let displayCount=DISPLAY_LIMIT;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmt(n){return n!=null?Number(n).toLocaleString():'—'}
function fmtDate(d){if(!d)return'—';const p=String(d).split('T')[0].split('-');return p[0].slice(2)+'.'+p[1]+'.'+p[2]}
function supName(id){return SUP_NAME[id]||id||'—'}

let _tt;
function showToast(msg,ok=true){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(ok?'toast-ok':'toast-err');el.style.display='block';if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.style.display='none',3000)}
function showLoading(){document.getElementById('loadingOverlay').classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

// ─── LOAD ───
async function loadAll(){
  showLoading();
  try{
    const [items, suppRows] = await Promise.all([
      sbGet('prize_announcements','select=*&order=created_at.desc'),
      sbGet('suppliers', 'select=supplier_id,supplier_name&is_active=eq.true&order=supplier_name').catch(() => [])
    ]);
    ITEMS=items;
    SUPPLIERS_LIST=suppRows;
    SUP_NAME=Object.fromEntries(SUPPLIERS_LIST.map(s=>[s.supplier_id,s.supplier_name]));
    SUP_IDS=SUPPLIERS_LIST.map(s=>s.supplier_id);
    populateFilters();
    render();
    if(selId)renderDetail();
  }catch(e){
    document.getElementById('listPane').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
  }finally{hideLoading()}
}

function populateFilters(){
  const sf=document.getElementById('supplierFilter');
  const cur=sf.value;
  sf.innerHTML='<option value="">仕入先：全て</option>'+SUP_IDS.map(s=>`<option value="${s}">${supName(s)}</option>`).join('');
  sf.value=cur;
}

// ─── FILTER ───
function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  const sup=document.getElementById('supplierFilter')?.value||'';
  const stat=document.getElementById('statusFilter')?.value||'';
  let list=ITEMS.filter(it=>{
    if(sup&&it.supplier_id!==sup)return false;
    if(stat&&it.status!==stat)return false;
    if(q&&!(it.prize_name||'').toLowerCase().includes(q))return false;
    if((it.status==='read'||it.status==='skipped')&&it.expires_at&&new Date(it.expires_at)<new Date())return false;
    return true;
  });
  const dir=sortDir==='asc'?1:-1;
  list.sort((a,b)=>{
    let av,bv;
    if(sortKey==='prize_name'){av=a.prize_name||'';bv=b.prize_name||'';return dir*av.localeCompare(bv,'ja')}
    if(sortKey==='unit_cost'){av=Number(a.unit_cost)||0;bv=Number(b.unit_cost)||0;return dir*(av-bv)}
    if(sortKey==='case_quantity'){av=Number(a.case_quantity)||0;bv=Number(b.case_quantity)||0;return dir*(av-bv)}
    if(sortKey==='supplier_id'){av=supName(a.supplier_id);bv=supName(b.supplier_id);return dir*av.localeCompare(bv,'ja')}
    if(sortKey==='status'){av=a.status||'';bv=b.status||'';return dir*av.localeCompare(bv)}
    if(sortKey==='created_at'){av=a.created_at||'';bv=b.created_at||'';return dir*av.localeCompare(bv)}
    return 0;
  });
  return list;
}
function setSort(key){if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=key;sortDir=key==='created_at'?'desc':'asc'}resetDisplayCount();render()}
function resetDisplayCount(){displayCount=DISPLAY_LIMIT}
function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('headerSearch').value='';
  document.getElementById('supplierFilter').value='';
  document.getElementById('statusFilter').value='';
  resetDisplayCount();render();
}
let _debounce;
function debouncedRender(){clearTimeout(_debounce);_debounce=setTimeout(()=>{resetDisplayCount();render()},200)}
document.getElementById('searchInput')?.addEventListener('input',function(){
  const hs=document.getElementById('headerSearch');
  if(hs&&hs.value!==this.value)hs.value=this.value;
  debouncedRender();
});
document.getElementById('headerSearch').addEventListener('input',function(){
  document.getElementById('searchInput').value=this.value;
  debouncedRender();
});

function buildSortBar(){
  const cols=[
    {key:'prize_name',label:'景品名'},
    {key:'supplier_id',label:'仕入先'},
    {key:'unit_cost',label:'単価'},
    {key:'case_quantity',label:'入り数'},
    {key:'status',label:'状態'},
    {key:'created_at',label:'登録日'}
  ];
  const bar=document.getElementById('sortBar');
  if(!bar)return;
  bar.innerHTML=cols.map(c=>{
    const active=sortKey===c.key;
    const arrow=active?(sortDir==='asc'?' ↑':' ↓'):'';
    return`<button class="sort-btn${active?' active':''}" onclick="toggleSort('${c.key}')">${c.label}${arrow}</button>`;
  }).join('');
}
function toggleSort(key){
  if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortKey=key;sortDir=key==='created_at'?'desc':'asc';}
  resetDisplayCount();render();
}

// ─── RENDER TABLE ───
function render(){
  const all=getFiltered();
  const total=all.length;
  const list=all.slice(0,displayCount);
  const hasMore=total>displayCount;

// ─── SWIPE GESTURE (モバイル詳細) ───
// 左右スワイプ: 戻る/次前切替。上下スワイプはスクロールと競合するため使わない
let _swipeStartX=0, _swipeStartY=0, _swipeStartTime=0, _swipeMoved=false;
(function(){
  const el=document.getElementById('mobileDetail');
  el.addEventListener('touchstart', function(e){
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeStartTime=Date.now();
    _swipeMoved=false;
  }, {passive:true});
  el.addEventListener('touchmove', function(){
    _swipeMoved=true;
  }, {passive:true});
  el.addEventListener('touchend', function(e){
    if(!_swipeMoved) return; // タップは無視（ボタン誤検知防止）
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    const dy=e.changedTouches[0].clientY-_swipeStartY;
    const dt=Date.now()-_swipeStartTime;
    if(dt>400) return;
    const absDx=Math.abs(dx), absDy=Math.abs(dy);
    if(absDx<80 || absDx<absDy*1.5) return; // 横方向が十分でなければ無視
    if(dx<0){
      // 左スワイプ → 次の景品（なければ一覧に戻る）
      if(!navigateDetail(1)) closeMobileDetail();
    } else {
      // 右スワイプ → 前の景品（なければ一覧に戻る）
      if(!navigateDetail(-1)) closeMobileDetail();
    }
  }, {passive:true});
})();

function navigateDetail(dir){
  const list=getFiltered();
  const idx=list.findIndex(it=>it.id===selId);
  if(idx<0) return false;
  const next=idx+dir;
  if(next<0||next>=list.length) return false;
  openMobileDetail(list[next].id);
  return true;
}

// ─── STEPPER ──────────────────────────────────────────────────────────────────
function stepVal(inputId, delta) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const min = el.hasAttribute('min') ? parseInt(el.min) : -Infinity;
  const max = el.hasAttribute('max') ? parseInt(el.max) : Infinity;
  const cur = parseInt(el.value) || 0;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.value = next;
  el.dispatchEvent(new Event('input', {bubbles:true}));
}

// ─── INIT ───
loadAll();
</script>
