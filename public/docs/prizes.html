<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>景品マスタ | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:8px;
  --nav-h:58px;
  --header-h:56px;
  --toolbar-h:52px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px}

/* ── Header ── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-spacer{flex:1}
.btn-add{
  padding:8px 16px;border-radius:var(--radius);
  background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.btn-add:hover{background:var(--accent2)}

/* ── Toolbar ── */
.toolbar{
  position:fixed;top:var(--header-h);left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;z-index:99;
  overflow-x:auto;scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{display:none}
.search-wrap{position:relative;flex-shrink:0;width:240px}
.search-wrap input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 10px 7px 30px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:12px;pointer-events:none}
.chip{
  flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.provisional.on{background:var(--yellow);border-color:var(--yellow);color:#000}
.chip.inactive.on{background:rgba(144,144,168,.2);border-color:var(--text2);color:var(--text)}
.tb-sep{flex-shrink:0;width:1px;height:20px;background:var(--border)}
.filter-select{
  flex-shrink:0;padding:5px 8px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:12px;cursor:pointer;outline:none;
}
.filter-select option{background:var(--surface)}
.btn-clear{
  flex-shrink:0;padding:5px 11px;border-radius:var(--radius);font-size:12px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.btn-clear:hover{border-color:var(--accent);color:var(--accent)}

/* ── Main layout ── */
.main{
  position:fixed;
  top:calc(var(--header-h) + var(--toolbar-h));
  left:0;right:0;
  bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  display:flex;
}

/* ── List pane ── */
.list-pane{
  flex:3;min-width:300px;overflow-y:auto;
  border-right:1px solid var(--border);
}
.prize-table{width:100%;border-collapse:collapse;table-layout:fixed}
.prize-table thead th{
  position:sticky;top:0;background:var(--surface);
  padding:9px 10px;text-align:left;
  font-size:12px;font-weight:700;color:var(--text2);
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;white-space:nowrap;
}
.prize-table thead th:hover{color:var(--text)}
.prize-table thead th.sorted{color:var(--accent)}
.prize-table thead th:last-child{cursor:default}
.prize-table colgroup col.col-name{width:25%}
.prize-table colgroup col.col-short{width:13%}
.prize-table colgroup col.col-cost{width:9%}
.prize-table colgroup col.col-case{width:10%}
.prize-table colgroup col.col-sup{width:15%}
.prize-table colgroup col.col-order{width:12%}
.prize-table colgroup col.col-status{width:16%}
.prize-table tbody tr{
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
}
.prize-table tbody tr:hover{background:var(--surface2)}
.prize-table tbody tr.selected{
  background:rgba(124,106,255,.12);
  border-left:3px solid var(--accent);
}
.prize-table tbody tr.selected td:first-child{padding-left:7px}
.prize-table tbody td{
  padding:8px 10px;font-size:13px;vertical-align:middle;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.td-name{font-weight:600}
.td-short{color:var(--text2);font-size:12px}
.td-cost{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.td-sup{color:var(--orange);font-size:12px}
.td-actions{white-space:nowrap}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge-active{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-provisional{background:rgba(243,156,18,.12);color:var(--yellow);border:1px solid rgba(243,156,18,.3)}
.badge-inactive{background:rgba(144,144,168,.1);color:var(--text2);border:1px solid var(--border)}
.row-btn{
  padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.row-btn:hover{border-color:var(--accent);color:var(--accent)}
.empty-pane{text-align:center;padding:60px 20px;color:var(--text2);font-size:13px}
.empty-pane .empty-icon{font-size:36px;margin-bottom:10px}

/* ── Detail pane ── */
.detail-pane{
  flex:2;min-width:280px;overflow-y:auto;
  background:var(--surface);
}
.detail-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text2);gap:12px;
}
.detail-empty-icon{font-size:40px}
.detail-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.detail-title{
  font-size:15px;font-weight:700;line-height:1.35;
  word-break:break-all;color:var(--accent);
}
.detail-id{font-size:11px;color:var(--text2);margin-top:4px}
.detail-dirty{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--yellow);margin-right:5px;
  animation:pulse .9s ease-in-out infinite alternate;
}
@keyframes pulse{from{opacity:1}to{opacity:.25}}
.detail-body{padding:14px 16px 0}
.field{margin-bottom:13px}
.field label{
  display:block;font-size:11px;color:var(--text2);
  font-weight:700;letter-spacing:.3px;margin-bottom:5px;
}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 10px;
  color:var(--text);font-size:14px;outline:none;
  font-family:inherit;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--surface)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:var(--red);margin-left:2px}
.detail-actions{
  padding:14px 16px 20px;
  display:flex;flex-wrap:wrap;gap:8px;
}
.btn-save{
  padding:9px 20px;border-radius:var(--radius);
  background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;
  white-space:nowrap;
}
.btn-save:hover:not(:disabled){background:var(--accent2)}
.btn-save:disabled{opacity:.45;pointer-events:none}
.btn-dup,.btn-stop,.btn-revert{
  padding:9px 14px;border-radius:var(--radius);
  background:transparent;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-dup{color:var(--text2);border:1px solid var(--border)}
.btn-dup:hover{border-color:var(--accent);color:var(--accent)}
.btn-stop{color:var(--yellow);border:1px solid rgba(243,156,18,.4)}
.btn-stop:hover{border-color:var(--yellow);background:rgba(243,156,18,.08)}
.btn-revert{color:var(--text2);border:1px solid var(--border)}
.btn-revert:hover{border-color:var(--text2);color:var(--text)}

/* ── Aliases popup ── */
.aliases-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;
  display:flex;align-items:center;justify-content:center;
}
.aliases-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px;max-width:380px;width:90%;
}
.aliases-box h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.aliases-list{color:var(--text2);font-size:13px;line-height:2}
.aliases-close{
  margin-top:14px;width:100%;padding:9px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
}
.aliases-close:hover{border-color:var(--accent)}

/* ── Merge modal ── */
.merge-modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.merge-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:420px;width:100%}
.merge-box h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--yellow)}
.merge-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.merge-card .mc-label{font-size:10px;color:var(--text2);font-weight:600;margin-bottom:4px}
.merge-card .mc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.merge-card .mc-detail{font-size:11px;color:var(--text2);line-height:1.6;word-break:break-all}
.merge-actions{display:flex;flex-direction:column;gap:8px}
.merge-btn{padding:12px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;width:100%;text-align:center}
.merge-btn.primary{background:var(--accent);color:#fff}
.merge-btn.secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.merge-btn.ghost{background:none;border:none;color:var(--text2);font-size:12px;padding:8px}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;z-index:150;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;
  transition:color .15s;text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* ── Spinner ── */
.spinner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h) + 12px);right:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:13px;font-weight:600;z-index:400;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ── Mobile UI ── */
.mobile-list{display:none}
.mobile-detail{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateX(100%);transition:transform .25s ease;
}
.mobile-detail.open{transform:translateX(0)}
.mc-item{
  display:flex;align-items:stretch;
  padding:8px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
.mc-item:active{background:var(--surface2)}
.mc-status-bar{width:3px;border-radius:2px;flex-shrink:0}
.mc-status-bar.active{background:var(--green)}
.mc-status-bar.provisional{background:var(--yellow)}
.mc-status-bar.inactive{background:var(--border)}
.mc-body{flex:1;min-width:0}
.mc-name{font-size:14px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-name mark{background:rgba(124,106,255,.3);color:var(--text);border-radius:2px;padding:0 1px}
.mc-sub{font-size:10px;color:var(--text2);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-meta{font-size:12px;color:var(--text2);margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;overflow:hidden}
.mc-aliases{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal;word-break:break-all;line-height:1.4}
.mc-kv{display:flex;flex-wrap:wrap;gap:2px 0;margin-top:2px}
.mc-kv-item{display:flex;flex-direction:column;gap:0;min-width:0;padding:2px 6px;background:var(--surface2);border-radius:4px;margin-right:4px}
.mc-kv-label{font-size:8px;color:var(--text2);font-weight:700;letter-spacing:.2px}
.mc-kv-val{font-size:12px;color:var(--text);white-space:nowrap;font-weight:600;font-variant-numeric:tabular-nums}
.mc-arrow{color:var(--text2);font-size:22px;padding-left:4px;flex-shrink:0;line-height:1;display:flex;align-items:center}
.td-name mark,.td-short mark{background:rgba(124,106,255,.3);color:var(--text);border-radius:2px;padding:0 1px}
.fab{
  position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);right:18px;
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#fff;border:none;font-size:28px;cursor:pointer;z-index:160;
  box-shadow:0 4px 16px rgba(124,106,255,.5);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.fab:hover{background:var(--accent2)}
.md-header{
  position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;z-index:10;
}
.md-back{
  display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;
  background:var(--surface2);color:var(--text);font-size:18px;font-weight:700;
  border:1px solid var(--border);cursor:pointer;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.md-title{font-size:16px;font-weight:700;flex:1}
.md-body{padding:14px 16px 0}
.md-actions{padding:14px 16px 32px;display:flex;flex-direction:column;gap:10px}

/* ── Header search ── */
.header-search{
  display:none;flex-shrink:1;min-width:0;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 10px;color:var(--text);font-size:13px;outline:none;width:140px;
}
.header-search:focus{border-color:var(--accent)}
.header-search::placeholder{color:var(--text2)}

/* ── Sort bar ── */
.sort-bar{
  display:none;
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;
  height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:4px;overflow-x:auto;z-index:98;
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{
  flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.1)}

@media (max-width:768px){
  .main{display:none!important}
  .btn-add{display:none!important}
  #mobileSortSelect{display:block!important}
  .header-search{display:block}
  .search-wrap{display:none}
  .sort-bar{display:flex}
  .mobile-list{
    display:block;position:fixed;
    top:calc(var(--header-h) + var(--toolbar-h) + 36px);
    left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);
  }
  .mobile-detail{display:block}
  .fab{display:flex}
}
.stepper{display:flex;align-items:center;gap:0}
.stepper input{text-align:center;border-radius:0;-moz-appearance:textfield;font-size:16px}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper-btn{width:40px;height:40px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:background .15s}
.stepper-btn:active{background:var(--accent)}
.stepper-btn.minus{border-radius:var(--radius) 0 0 var(--radius)}
.stepper-btn.plus{border-radius:0 var(--radius) var(--radius) 0}
</style>
</head>
<body>

<header>
  <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:16px;border:1px solid var(--border);text-decoration:none;flex-shrink:0">🏠</a>
  <span class="header-title">🏆 景品マスタ</span>
  <span class="header-count" id="countBadge">読込中…</span>
  <input type="search" class="header-search" id="headerSearch" placeholder="検索..." autocomplete="off">
  <div class="header-spacer"></div>
  <button class="btn-add" onclick="openNew()">＋ 新しい景品を追加</button>
  <button onclick="if(typeof isDirty!=='undefined'&&isDirty){if(!confirm('未保存の変更があります。ログアウトしますか？'))return}else{if(!confirm('ログアウトしますか？'))return}sessionStorage.clear();location.href='index.html'" style="background:none;border:1px solid #5a3a3a;color:#e74c3c;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;margin-left:8px">ログアウト</button>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="景品名・別名で検索..." autocomplete="off">
  </div>
  <div class="tb-sep"></div>
  <select class="filter-select" id="statusFilter" onchange="setStatusFilter(this.value)">
    <option value="">すべて</option>
    <option value="active">Active</option>
    <option value="provisional">仮登録</option>
    <option value="inactive">停止中</option>
  </select>
  <div class="tb-sep"></div>
  <select class="filter-select" id="stockFilter" onchange="setStockFilter(this.value)">
    <option value="">在庫：全て</option>
    <option value="instock">在庫あり</option>
    <option value="nostock">在庫なし</option>
  </select>
  <div class="tb-sep"></div>
  <select class="filter-select" id="supplierFilter" onchange="setSupplierFilter(this.value)">
    <option value="">仕入先：全て</option>
  </select>
  <div class="tb-sep"></div>
  <select class="filter-select" id="mobileSortSelect" onchange="setMobileSort(this.value)" style="display:none">
    <option value="prize_name">景品名順</option>
    <option value="original_cost">単価順</option>

// ─── SUPABASE REST ────────────────────────────────────────────────────────────
async function sbGet(table, params='') {
  let all=[],offset=0;const PAGE=1000;
  while(true){
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${offset}`, {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    if (!r.ok) throw new Error(await r.text());
    const d=await r.json();all=all.concat(d);if(d.length<PAGE)break;offset+=PAGE;
  }
  return all;
}

async function sbPatch(table, id, idCol, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`, {
    method: 'PATCH',
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'},
    body: JSON.stringify(body)

}

function fmtDate(d) {

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function displayAliases(raw) {

function highlight(text, query) {
  if (!query || !text) return esc(text || '');
  const escaped = esc(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escaped.replace(new RegExp('(' + q + ')', 'gi'), '<mark>$1</mark>');
}

    if (filterStock === 'instock' && !(stockMap[p.prize_id] > 0)) return false;

      if (filterOrderDateFrom && d < filterOrderDateFrom) return false;
      if (filterOrderDateTo && d > filterOrderDateTo) return false;
    }

    if (q) {
      const nm = (p.prize_name  || '').toLowerCase();
      const sn = (p.category    || '').toLowerCase();
      const al = (p.aliases     || '').toLowerCase();

}

// ─── IMAGE RESIZE & UPLOAD ───────────────────────────────────────────────────
function resizeImage(file, maxSide = 1200, quality = 0.8) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) {
      reject(new Error('画像ファイルを選択してください'));
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      reject(new Error('ファイルサイズが大きすぎます（上限20MB）'));
      return;
    }
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(img.src);
      let w = img.width, h = img.height;
      if (w > maxSide || h > maxSide) {
        if (w > h) { h = Math.round(h * maxSide / w); w = maxSide; }
        else { w = Math.round(w * maxSide / h); h = maxSide; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('画像の変換に失敗しました'));
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('画像を読み込めませんでした')); };
    img.src = URL.createObjectURL(file);
  });
}

async function uploadPrizeImage(prizeId, file) {

  const res = await fetch(uploadUrl, {

    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'image/jpeg',
      'x-upsert': 'true'
    },
    body: blob
  });
  if (!res.ok) throw new Error('画像のアップロードに失敗しました: ' + (await res.text()));
  await sbPatch('prize_masters', prizeId, 'prize_id', {
    image_url: path,
    updated_at: new Date().toISOString(),
    updated_by: getStaffId()
  });
  const item = DATA.find(x => String(x.prize_id) === String(prizeId));
  if (item) item.image_url = path;
  return path;
}

// ─── SAVE ──────────────────────────────────────────────────────────────────────
async function savePrize() {
  const name      = (document.getElementById('fName').value || '').trim();
  const aliasesRaw = (document.getElementById('fAliases').value || '').trim();
  const aliases   = aliasesRaw ? JSON.stringify(aliasesRaw.split(',').map(s=>s.trim()).filter(Boolean)) : '[]';
  const costStr   = document.getElementById('fCost').value;
  const status    = document.getElementById('fStatus').value;
  const supVal    = document.getElementById('fSupplier').value || null;
  const qtyStr    = document.getElementById('fQty').value;

  // ── Validation ──
  if (!name) { showToast('景品名が空です', false); return; }
  if (costStr === '') { showToast('単価が入っていません', false); return; }
  const costNum = parseInt(costStr, 10);
  if (isNaN(costNum) || costNum < 0) { showToast('単価は0以上の整数を入力してください', false); return; }

  if (costNum >= 5000 && !confirm(`単価が極端です（¥${fmt(costNum)}）。確認してください。`)) return;

  const category = (document.getElementById('fCategory')?.value || '').trim();
  const payload = {
    prize_name: name, category: category || null, aliases: aliases || null,
    original_cost: costNum, status,
    default_case_quantity: qtyStr ? parseInt(qtyStr, 10) : null,
    updated_at: new Date().toISOString(), updated_by: getStaffId(),
    supplier_name: supVal
  };

  // ── Duplicate check with merge option ──
  const dupes = findDuplicates(name, aliases, selPrizeId);
  if (dupes.length) {
    showMergeModal(dupes[0], payload, selPrizeId,
      async (keepRec) => { await doSavePrizeWithMerge(keepRec, payload); },
      async () => { await doSavePrizeDirect(payload); }
    );
    return;
  }
  await doSavePrizeDirect(payload);
}

async function doSavePrizeDirect(payload) {
  if (payload.supplier_name) await ensureSupplier(payload.supplier_name);
  const saveBtn = document.getElementById('btnSave');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
  showLoading();
  try {
    if (isNewMode) {
      const result = await sbPost('prize_masters', payload);
      const newId = Array.isArray(result) ? result[0]?.prize_id : result?.prize_id;
      showToast('保存しました'); isDirty = false; isNewMode = false;
      await loadAll(); if (newId) selPrizeId = newId; render(); renderDetail();
    } else {
      await sbPatch('prize_masters', selPrizeId, 'prize_id', payload);
      showToast('保存しました'); isDirty = false;
      await loadAll(); render(); renderDetail();
    }
  } catch(e) {
    showToast('エラー: ' + e.message, false);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
  } finally { hideLoading(); }
}

async function doSavePrizeWithMerge(keepRec, payload) {
  if (payload.supplier_name) await ensureSupplier(payload.supplier_name);
  showLoading();
  try {
    const removeId = isNewMode ? null : selPrizeId;
    const keptId = await executeMerge(keepRec, removeId, payload);
    showToast('マージして保存しました'); isDirty = false; isNewMode = false;
    selPrizeId = keptId;
    await loadAll(); render(); renderDetail();
  } catch(e) {
    showToast('マージエラー: ' + e.message, false);
    const btn = document.getElementById('btnSave');
    if (btn) { btn.disabled = false; btn.textContent = '保存'; }
  } finally { hideLoading(); }
}

// ─── MERGE SCHEME ─────────────────────────────────────────────────────────────
function parseAliases(raw) {
  try { const a = JSON.parse(raw || '[]'); return Array.isArray(a) ? a : []; } catch { return (raw||'').split(',').map(s=>s.trim()).filter(Boolean); }
}

function findDuplicates(name, aliasesStr, currentId) {
  const inputAliases = parseAliases(aliasesStr).map(a => a.toLowerCase());
  const dupes = [];
  for (const p of DATA) {
    if (String(p.prize_id) === String(currentId)) continue;
    // 1. prize_name exact match
    if (p.prize_name === name) { dupes.push(p); continue; }
    // 2. alias overlap
    if (inputAliases.length) {
      const existAliases = parseAliases(p.aliases).map(a => a.toLowerCase());
      if (inputAliases.some(a => existAliases.includes(a))) { dupes.push(p); continue; }
    }
    // 3. input name matches existing alias
    const existAliases2 = parseAliases(p.aliases).map(a => a.toLowerCase());
    if (existAliases2.includes(name.toLowerCase())) { dupes.push(p); }
  }
  return dupes;
}

function showMergeModal(dupeRecord, currentPayload, currentId, onMerge, onSkip) {
  const dp = dupeRecord;
  let dpAliases = [];
  try { dpAliases = parseAliases(dp.aliases); } catch { /* ignore */ }
  const formalName = dpAliases[0] || '';
  const el = document.createElement('div');
  el.className = 'merge-modal';
  el.innerHTML = `<div class="merge-box">
    <h3>⚠️ 同じ商品の可能性があります</h3>
    <div class="merge-card">

      <div class="mc-detail">
        ${formalName ? `正式名称: ${esc(formalName)}<br>` : ''}
        ID: ${esc(dp.prize_id)}<br>
        単価: ¥${fmt(dp.original_cost)} / 仕入先: ${esc(dp.supplier_name||'—')}<br>
        状態: ${esc(dp.status)}
      </div>
    </div>
    <div class="merge-actions">
      <button class="merge-btn primary" id="mergeConfirmBtn">マージして保存</button>
      <button class="merge-btn secondary" id="mergeSeparateBtn">別商品として保存</button>
      <button class="merge-btn ghost" id="mergeCancelBtn">キャンセル</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  document.getElementById('mergeConfirmBtn').onclick = () => { el.remove(); onMerge(dp); };
  document.getElementById('mergeSeparateBtn').onclick = () => { el.remove(); onSkip(); };
  document.getElementById('mergeCancelBtn').onclick = () => { el.remove(); };
}

async function executeMerge(keepRecord, removeId, newPayload) {
  const API = SB_URL + '/rest/v1';
  const hdrs = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

  // Merge aliases: union (case-insensitive dedup)
  const keepAliases = parseAliases(keepRecord.aliases);
  const newAliases = parseAliases(newPayload.aliases);
  const seen = new Set();
  const mergedAliases = [];
  for (const a of [...keepAliases, ...newAliases]) {
    const key = a.toLowerCase();
    if (!seen.has(key)) { seen.add(key); mergedAliases.push(a); }
  }

  // Build merged payload: take best value from both records
  // For remove record, look up from DATA (has image_url etc.)
  const removeRec = removeId ? DATA.find(x => String(x.prize_id) === String(removeId)) : null;

  const merged = {
    prize_name: newPayload.prize_name,
    aliases: JSON.stringify(mergedAliases),
    original_cost: newPayload.original_cost ?? keepRecord.original_cost ?? null,
    category: newPayload.category || keepRecord.category || (removeRec?.category) || null,
    supplier_name: newPayload.supplier_name || keepRecord.supplier_name || (removeRec?.supplier_name) || null,
    default_case_quantity: newPayload.default_case_quantity ?? keepRecord.default_case_quantity ?? (removeRec?.default_case_quantity) ?? null,
    image_url: keepRecord.image_url || (removeRec?.image_url) || null,
    status: newPayload.status,
    updated_at: new Date().toISOString(),
    updated_by: getStaffId()
  };

  // Update the keep record
  await sbPatch('prize_masters', keepRecord.prize_id, 'prize_id', merged);

  // Re-point ALL FK references from removeId -> keepId
  if (removeId && removeId !== keepRecord.prize_id) {
    const keepId = keepRecord.prize_id;
    const errors = [];

    // Tables with prize_id FK
    const prizeIdTables = ['prize_orders','prize_stocks','stock_movements','booth_prize_stocks','locker_contents','capsule_materials','phase_history','daily_booth_stats','locker_actions'];
    for (const t of prizeIdTables) {
      const r = await fetch(API+'/'+t+'?prize_id=eq.'+encodeURIComponent(removeId),{method:'PATCH',headers:hdrs,body:JSON.stringify({prize_id:keepId})});
      if (!r.ok && r.status !== 404) errors.push(t+':'+r.status);
    }
    // booths.current_prize_id
    const r1 = await fetch(API+'/booths?current_prize_id=eq.'+encodeURIComponent(removeId),{method:'PATCH',headers:hdrs,body:JSON.stringify({current_prize_id:keepId})});
    if (!r1.ok && r1.status !== 404) errors.push('booths:'+r1.status);
    // replacement_suggestions (2 columns)
    const r2 = await fetch(API+'/replacement_suggestions?current_prize_id=eq.'+encodeURIComponent(removeId),{method:'PATCH',headers:hdrs,body:JSON.stringify({current_prize_id:keepId})});
    if (!r2.ok && r2.status !== 404) errors.push('repl_cur:'+r2.status);
    const r3 = await fetch(API+'/replacement_suggestions?suggested_prize_id=eq.'+encodeURIComponent(removeId),{method:'PATCH',headers:hdrs,body:JSON.stringify({suggested_prize_id:keepId})});
    if (!r3.ok && r3.status !== 404) errors.push('repl_sug:'+r3.status);

    if (errors.length) throw new Error('参照更新失敗: '+errors.join(', '));

    // Delete the old record
    const delRes = await fetch(API+'/prize_masters?prize_id=eq.'+encodeURIComponent(removeId),{method:'DELETE',headers:hdrs});
    if (!delRes.ok) throw new Error('旧レコード削除失敗: '+(await delRes.text()));
  }

  return keepRecord.prize_id;
}

function duplicatePrize() {
  if (isDirty && !confirm('未保存の変更があります。破棄しますか？')) return;
  const src = DATA.find(x => String(x.prize_id) === String(selPrizeId));
  if (!src) return;

  isDirty = false;
  isNewMode = true;
  selPrizeId = null;
  render();
  renderDetail();

  // Pre-fill from source
  document.getElementById('fName').value    = src.prize_name + '（複製）';
  document.getElementById('fAliases').value = displayAliases(src.aliases);
  document.getElementById('fCost').value    = src.original_cost != null ? src.original_cost : '';
  document.getElementById('fStatus').value  = 'provisional';
  document.getElementById('fSupplier').value = src.supplier_name || '';
  document.getElementById('fQty').value     = src.default_case_quantity != null ? src.default_case_quantity : '';
  markDirty();
}

      <div class="stepper"><button type="button" class="stepper-btn minus" onclick="stepVal('mfCost',-10)">−</button><input type="tel" id="mfCost" value="${p.original_cost!=null?p.original_cost:''}" min="0" placeholder="例：800" oninput="markDirtyMobile()" inputmode="numeric" pattern="[0-9]*" style="font-size:16px"><button type="button" class="stepper-btn plus" onclick="stepVal('mfCost',10)">＋</button></div>
    </div>
    <div class="field">
      <label>標準入り数</label>
      <div class="stepper"><button type="button" class="stepper-btn minus" onclick="stepVal('mfQty',-1)">−</button><input type="tel" id="mfQty" value="${p.default_case_quantity!=null?p.default_case_quantity:''}" min="1" placeholder="例：12" oninput="markDirtyMobile()" inputmode="numeric" pattern="[0-9]*" style="font-size:16px"><button type="button" class="stepper-btn plus" onclick="stepVal('mfQty',1)">＋</button></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
    <div class="field">
      <label>カテゴリ</label>
      <input type="text" id="mfCategory" value="${esc(p.category||'')}" placeholder="例：ぬいぐるみ" oninput="markDirtyMobile()">
    </div>
    <div class="field">
      <label>仕入先</label>
      <select id="mfSupplier" onchange="markDirtyMobile()">${suppOpts}</select>
    </div>
    <div class="field">
      <label>状態</label>
      <select id="mfStatus" onchange="markDirtyMobile()">${statusOpts}</select>
    </div>
  </div>
</div>
<div class="md-actions">
  <button class="btn-save" id="mfBtnSave" onclick="savePrizeMobile()" style="width:100%">保存</button>
  ${!isNewMode ? `<button class="btn-dup" onclick="duplicatePrizeMobile()">この景品を複製</button>` : ''}
  ${!isNewMode && p.status !== 'inactive' ? `<button class="btn-stop" onclick="deactivatePrizeMobile()">使用停止にする</button>` : ''}
  <button class="btn-revert" onclick="if(isDirty&&!confirm('未保存の変更があります。破棄しますか？'))return;isDirty=false;closeMobileDetail()" style="width:100%;text-align:center">キャンセル</button>
</div>`;
}

function handleMobileImgUpload(input) { handleImgUploadShared(input, renderMobileDetailContent); }

async function savePrizeMobile() {
  const name    = (document.getElementById('mfName').value || '').trim();
  const aliasesRaw = (document.getElementById('mfAliases').value || '').trim();
  const aliases = aliasesRaw ? JSON.stringify(aliasesRaw.split(',').map(s=>s.trim()).filter(Boolean)) : '[]';
  const costStr = document.getElementById('mfCost').value;
  const status  = document.getElementById('mfStatus').value;
  const supVal  = document.getElementById('mfSupplier').value || null;
  const qtyStr  = document.getElementById('mfQty').value;

  if (!name) { showToast('景品名が空です', false); return; }
  if (costStr === '') { showToast('単価が入っていません', false); return; }
  const costNum = parseInt(costStr, 10);
  if (isNaN(costNum) || costNum < 0) { showToast('単価は0以上の整数を入力してください', false); return; }

  if (costNum >= 5000 && !confirm(`単価が極端です（¥${fmt(costNum)}）。確認してください。`)) return;

  const category = (document.getElementById('mfCategory')?.value || '').trim();
  const payload = {
    prize_name: name, category: category || null, aliases: aliases || null,
    original_cost: costNum, status,
    default_case_quantity: qtyStr ? parseInt(qtyStr, 10) : null,
    updated_at: new Date().toISOString(), updated_by: getStaffId(),
    supplier_name: supVal
  };

  // ── Duplicate check with merge option ──
  const dupes = findDuplicates(name, aliases, selPrizeId);
  if (dupes.length) {
    showMergeModal(dupes[0], payload, selPrizeId,
      async (keepRec) => { await doSaveMobileWithMerge(keepRec, payload); },
      async () => { await doSaveMobileDirect(payload); }
    );
    return;
  }
  await doSaveMobileDirect(payload);
}

async function doSaveMobileDirect(payload) {
  if (payload.supplier_name) await ensureSupplier(payload.supplier_name);
  const saveBtn = document.getElementById('mfBtnSave');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
  showLoading();
  try {
    if (isNewMode) {
      const result = await sbPost('prize_masters', payload);
      const newId = Array.isArray(result) ? result[0]?.prize_id : result?.prize_id;
      showToast('保存しました'); isDirty = false; isNewMode = false;
      closeMobileDetail(); await loadAll(); if (newId) selPrizeId = newId; render();
    } else {
      await sbPatch('prize_masters', selPrizeId, 'prize_id', payload);
      showToast('保存しました'); isDirty = false;
      closeMobileDetail(); await loadAll(); render();
    }
  } catch(e) {
    showToast('エラー: ' + e.message, false);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
  } finally { hideLoading(); }
}

async function doSaveMobileWithMerge(keepRec, payload) {
  if (payload.supplier_name) await ensureSupplier(payload.supplier_name);
  const saveBtn = document.getElementById('mfBtnSave');
  showLoading();
  try {
    const removeId = isNewMode ? null : selPrizeId;
    const keptId = await executeMerge(keepRec, removeId, payload);
    showToast('マージして保存しました'); isDirty = false; isNewMode = false;
    selPrizeId = keptId;
    closeMobileDetail(); await loadAll(); render();
  } catch(e) {
    showToast('マージエラー: ' + e.message, false);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
  } finally { hideLoading(); }
}

function duplicatePrizeMobile() {
  if (isDirty && !confirm('未保存の変更があります。破棄しますか？')) return;
  const src = DATA.find(x => String(x.prize_id) === String(selPrizeId));
  if (!src) return;
  isDirty = false; isNewMode = true; selPrizeId = null;
  renderMobileDetailContent();
  document.getElementById('mfName').value    = src.prize_name + '（複製）';
  document.getElementById('mfAliases').value = displayAliases(src.aliases);
  document.getElementById('mfCategory').value = src.category || '';
  document.getElementById('mfCost').value    = src.original_cost != null ? src.original_cost : '';
  document.getElementById('mfStatus').value  = 'provisional';
  document.getElementById('mfSupplier').value = src.supplier_name || '';
  document.getElementById('mfQty').value     = src.default_case_quantity != null ? src.default_case_quantity : '';
  markDirtyMobile();
}

async function deactivatePrizeMobile() {
  const p = DATA.find(x => String(x.prize_id) === String(selPrizeId));
  if (!p) return;
  if (!confirm(`「${p.prize_name}」を使用停止にします。よろしいですか？`)) return;
  showLoading();
  try {
    await sbPatch('prize_masters', selPrizeId, 'prize_id', {status: 'inactive', updated_at: new Date().toISOString(), updated_by: getStaffId()});
    showToast('使用停止にしました');
    isDirty = false;
    closeMobileDetail();
    await loadAll();
    render();
  } catch(e) {
    showToast('エラー: ' + e.message, false);
  } finally {
    hideLoading();
  }
}

// ─── STEPPER ──────────────────────────────────────────────────────────────────
function stepVal(inputId, delta) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const min = el.hasAttribute('min') ? parseInt(el.min) : -Infinity;
  const max = el.hasAttribute('max') ? parseInt(el.max) : Infinity;
  const cur = parseInt(el.value) || 0;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.value = next;
  el.dispatchEvent(new Event('input', {bubbles:true}));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
