<!DOCTYPE html>
<html lang="ja">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --red:#e74c3c;
  --radius:8px;
  --white:#fff;
  --btn-min-h:44px;
  --badge-fs:12px;
  --space-xs:4px;
  --space-sm:8px;
  --space-md:12px;
  --space-lg:16px;
  --space-xl:24px;
  --danger-bg:#5a3a3a;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.logo{font-size:48px;margin-bottom:6px}
h1{font-size:22px;font-weight:800;letter-spacing:1px;margin-bottom:var(--space-xs)}
.sub{font-size:13px;color:var(--text2);margin-bottom:32px}

/* ── Login ── */
.login-box{
  width:100%;max-width:320px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:var(--space-xl);margin-bottom:20px;
}
.login-box h2{font-size:15px;font-weight:700;margin-bottom:var(--space-lg);text-align:center}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:var(--badge-fs);color:var(--text2);font-weight:700;margin-bottom:5px}
.login-field select,.login-field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  color:var(--text);font-size:15px;outline:none;
  font-family:inherit;transition:border-color .2s;
}
.login-field select:focus,.login-field input:focus{border-color:var(--accent)}
.login-field input::placeholder{color:var(--text2)}
.btn-login{
  width:100%;padding:11px;border-radius:var(--radius);
  background:var(--accent);color:var(--white);border:none;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .15s;margin-top:var(--space-xs);
  min-height:var(--btn-min-h);
}
.btn-login:hover{background:var(--accent2)}
.btn-login:disabled{opacity:.5;cursor:default}
.btn-skip{
  width:100%;padding:9px;border-radius:var(--radius);
  background:transparent;color:var(--text2);border:1px solid var(--border);
  font-size:var(--badge-fs);cursor:pointer;margin-top:var(--space-sm);
  transition:all .15s;
  min-height:var(--btn-min-h);
}
.btn-skip:hover{border-color:var(--accent);color:var(--text)}
.login-msg{font-size:var(--badge-fs);text-align:center;margin-top:10px;min-height:18px}
.login-msg.err{color:var(--red)}
.login-msg.ok{color:var(--green)}
.staff-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;margin-bottom:20px;font-size:13px;min-height:var(--btn-min-h);
}
.staff-badge .name{font-weight:700;color:var(--accent)}
.btn-logout{
  background:none;border:none;color:var(--text2);font-size:var(--badge-fs);
  cursor:pointer;text-decoration:underline;
}
.btn-change-pin{
  background:none;border:none;color:var(--text2);font-size:var(--badge-fs);
  cursor:pointer;text-decoration:underline;margin-left:var(--space-xs);
}

/* ── Grid ── */
.grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  width:100%;max-width:360px;
}
.card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:var(--space-sm);padding:var(--space-xl) var(--space-md);
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  text-decoration:none;color:var(--text);
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.card:hover,.card:active{
  background:var(--surface2);border-color:var(--accent);
  transform:translateY(-2px);
}
.card-icon{font-size:36px;line-height:1}
.card-label{font-size:14px;font-weight:700}
.card-desc{font-size:11px;color:var(--text2);text-align:center;line-height:1.4}
.footer{margin-top:40px;font-size:11px;color:var(--text2)}
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.5);z-index:199;
}
.modal-overlay.hidden{display:none!important}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="logo">🎮</div>
<h1>ClawOps</h1>
<p class="sub">クレーンゲーム運営管理</p>

<!-- Login -->
<div id="loginBox" class="login-box">
  <h2>ログイン</h2>
  <div class="login-field">
    <label>スタッフ名</label>
    <select id="staffSelect"><option value="">読み込み中...</option></select>
  </div>
  <div id="pinSection" class="hidden">
    <div class="login-field">
      <label id="pinLabel">暗証番号（4桁以上）</label>
      <input type="password" id="pinInput" inputmode="numeric" placeholder="暗証番号を入力">
    </div>
  </div>
  <button class="btn-login" id="btnLogin" onclick="handleLogin()" disabled>ログイン</button>
  <button class="btn-skip" onclick="skipLogin()">ログインせず使う</button>
  <div class="login-msg" id="loginMsg"></div>
</div>

<!-- Staff badge (shown when logged in) -->
<div id="staffBadge" class="staff-badge hidden">
  <span class="name" id="badgeName"></span>
  <button class="btn-logout" onclick="logout()">ログアウト</button>
  <button class="btn-change-pin" onclick="showChangePin()">暗証番号変更</button>
</div>

<!-- Menu -->
<div id="menuGrid" class="grid hidden">
  <a class="card" href="/login">
    <div class="card-icon">🚶</div>
    <div class="card-label">巡回アプリ</div>
    <div class="card-desc">メーター入力・売上・棚卸し</div>
  </a>
  <a class="card" href="prizes.html">
    <div class="card-icon">🏆</div>
    <div class="card-label">景品マスタ</div>
    <div class="card-desc">景品の登録・検索</div>
  </a>
  <a class="card" href="orders.html">
    <div class="card-icon">📋</div>
    <div class="card-label">発注管理</div>
    <div class="card-desc">発注・入荷チェック</div>
  </a>
  <a class="card" href="inventory.html">
    <div class="card-icon">📦</div>
    <div class="card-label">在庫管理</div>
    <div class="card-desc">在庫確認・移動</div>
  </a>
  <a class="card" href="announcements.html">
    <div class="card-icon">📬</div>
    <div class="card-label">景品案内</div>
    <div class="card-desc">仕入先からの新商品</div>
  </a>
  <a class="card" href="billing.html">
    <div class="card-icon">💰</div>
    <div class="card-label">集金帳票</div>
    <div class="card-desc">店舗別・印刷対応</div>
  </a>
  <a class="card" href="analytics.html">
    <div class="card-icon">📊</div>
    <div class="card-label">売上分析</div>
    <div class="card-desc">ランキング・推移・出率</div>
  </a>
  <a class="card" href="image-match.html">
    <div class="card-icon">🖼️</div>
    <div class="card-label">画像マッチング</div>
    <div class="card-desc">景品写真の紐付け</div>
  </a>
  <a class="card" href="admin.html">
    <div class="card-icon">⚙️</div>
    <div class="card-label">管理・ツール</div>
    <div class="card-desc">マスタ設定・Excel出力</div>
  </a>
</div>

<!-- Change PIN modal -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeChangePinModal()"></div>
<div id="changePinModal" class="login-box hidden" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;max-width:480px;width:90%">
  <h2>暗証番号変更</h2>
  <div class="login-field">
    <label>新しい暗証番号（4桁以上）</label>
    <input type="password" id="newPinInput" inputmode="numeric" placeholder="新しい暗証番号">
  </div>
  <button class="btn-login" onclick="changePin()">変更する</button>
  <button class="btn-skip" onclick="closeChangePinModal()">キャンセル</button>
  <div class="login-msg" id="changePinMsg"></div>
</div>

<div class="footer">ClawOps v1.0</div>

<script>
const SB_URL = window.CLAWOPS_CONFIG.SUPABASE_URL + '/rest/v1';
const SB_KEY = window.CLAWOPS_CONFIG.SUPABASE_ANON_KEY;
const SB_STORAGE = window.CLAWOPS_CONFIG.SUPABASE_URL + '/storage/v1/object';
const headers={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

let STAFF=[];
let currentStaff=null; // {staff_id, name, pin}

async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{headers});
  return r.ok?r.json():[];
}
async function sbPatch(table,id,idCol,body){
  await fetch(`${SB_URL}/${table}?${idCol}=eq.${encodeURIComponent(id)}`,{
    method:'PATCH',headers:{...headers,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
}

// ── Init ──
async function init(){
  // Check saved session
  const saved=sessionStorage.getItem('clawops_staff');
  if(saved){
    currentStaff=JSON.parse(saved);
    showMenu();
    return;
  }

  STAFF=await sbGet('staff','select=staff_id,name,pin&is_active=eq.true&order=name');
  const sel=document.getElementById('staffSelect');
  sel.innerHTML='<option value="">-- 選択してください --</option>'+
    STAFF.map(s=>`<option value="${s.staff_id}">${s.name}</option>`).join('');
  sel.onchange=onStaffChange;
  document.getElementById('btnLogin').disabled=false;
}

function onStaffChange(){
  const sel=document.getElementById('staffSelect');
  const staff=STAFF.find(s=>s.staff_id===sel.value);
  const pinSec=document.getElementById('pinSection');
  const pinLabel=document.getElementById('pinLabel');
  const pinInput=document.getElementById('pinInput');
  document.getElementById('loginMsg').textContent='';

  if(!staff){pinSec.classList.add('hidden');return;}

  pinSec.classList.remove('hidden');
  if(staff.pin){
    pinLabel.textContent='暗証番号';
    pinInput.placeholder='暗証番号を入力';
  }else{
    pinLabel.textContent='暗証番号を設定（4桁以上）';
    pinInput.placeholder='好きな番号を決めてください';
  }
  pinInput.value='';
  pinInput.focus();
}

async function handleLogin(){
  const sel=document.getElementById('staffSelect');
  const staff=STAFF.find(s=>s.staff_id===sel.value);
  const pin=document.getElementById('pinInput').value.trim();
  const msg=document.getElementById('loginMsg');

  if(!staff){msg.className='login-msg err';msg.textContent='スタッフを選択してください';return;}
  if(pin.length<4){msg.className='login-msg err';msg.textContent='暗証番号は4桁以上で入力してください';return;}

  if(staff.pin){
    // 認証
    if(pin!==staff.pin){
      msg.className='login-msg err';msg.textContent='暗証番号が違います';return;
    }
  }else{
    // 初回: PINを保存
    await sbPatch('staff',staff.staff_id,'staff_id',{pin:pin});
    staff.pin=pin;
    msg.className='login-msg ok';msg.textContent='暗証番号を登録しました';
  }

  currentStaff={staff_id:staff.staff_id,name:staff.name};
  sessionStorage.setItem('clawops_staff',JSON.stringify(currentStaff));
  showMenu();
}

function skipLogin(){
  alert('ログイン機能はconfig.jsで設定する必要があります');
}

function showMenu(){
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('menuGrid').classList.remove('hidden');
  if(currentStaff){
    document.getElementById('badgeName').textContent=currentStaff.name;
    document.getElementById('staffBadge').classList.remove('hidden');
  }
}

function logout(){
  sessionStorage.removeItem('clawops_staff');
  currentStaff=null;
  location.reload();
}

function showChangePin(){
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('changePinModal').classList.remove('hidden');
  document.getElementById('newPinInput').value='';
  document.getElementById('changePinMsg').textContent='';
  document.getElementById('newPinInput').focus();
}

function closeChangePinModal(){
  document.getElementById('changePinModal').classList.add('hidden');
  document.getElementById('modalOverlay').classList.add('hidden');
}

async function changePin(){
  const newPin=document.getElementById('newPinInput').value.trim();
  const msg=document.getElementById('changePinMsg');
  if(newPin.length<4){msg.className='login-msg err';msg.textContent='4桁以上で入力してください';return;}
  await sbPatch('staff',currentStaff.staff_id,'staff_id',{pin:newPin});
  msg.className='login-msg ok';msg.textContent='変更しました';
  setTimeout(()=>closeChangePinModal(),1000);
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(!document.getElementById('changePinModal').classList.contains('hidden')){changePin();return;}
    if(!document.getElementById('loginBox').classList.contains('hidden')){handleLogin();}
  }
});

init();
</script>
</body>
</html>
