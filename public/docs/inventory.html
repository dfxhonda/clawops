<!DOCTYPE html>
<html lang="ja">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>在庫管理 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:8px;
  --nav-h:58px;
  --header-h:56px;
  --toolbar-h:52px;
  --white:#fff;--btn-min-h:44px;--badge-fs:12px;--space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:24px;--danger-bg:#5a3a3a;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px}

header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-spacer{flex:1}
.btn-add{padding:8px 16px;border-radius:var(--radius);background:var(--accent);color:var(--white);border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:var(--btn-min-h)}
.btn-add:hover{background:var(--accent2)}

.toolbar{
  position:fixed;top:var(--header-h);left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;z-index:99;overflow-x:auto;
}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.filter-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px}
.search-input{flex:1;min-width:100px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
.search-input::placeholder{color:var(--text2)}
.btn-clear{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
#mobileSortSelect{display:none}

.main{
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;bottom:var(--nav-h);
  display:flex;overflow:hidden;
}
.list-pane{flex:3;min-width:300px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.detail-pane{flex:2;min-width:280px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
colgroup col.c-name{width:30%}
colgroup col.c-place{width:20%}
colgroup col.c-qty{width:12%}
colgroup col.c-cost{width:12%}
colgroup col.c-value{width:14%}
colgroup col.c-date{width:12%}
thead{position:sticky;top:0;z-index:1}
th{background:var(--surface);padding:8px;text-align:left;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;font-size:12px;border-bottom:1px solid var(--border)}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
td{padding:6px 8px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--surface2)}
tr.sel{background:rgba(124,106,255,.06);border-left:3px solid var(--accent)}
.td-r{text-align:right;font-variant-numeric:tabular-nums}
.empty-pane{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* Detail */
.detail-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-header h3{font-size:15px;color:var(--accent)}
.field{padding:8px 16px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px}
.field textarea{min-height:60px;resize:vertical}
.field input:focus,.field select:focus{border-color:var(--accent);outline:none}
.field .error{font-size:11px;color:var(--red);margin-top:2px}
.detail-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}
.btn{border:none;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;min-height:var(--btn-min-h)}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-green{background:var(--green);color:var(--white)}
.btn-warn{background:var(--red);color:var(--white)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* Toast */
.toast{position:fixed;top:calc(var(--header-h)+var(--toolbar-h)+8px);right:16px;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast-ok{background:var(--green);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:20px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
.modal h3{color:var(--accent);margin-bottom:12px}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;z-index:150;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;
  transition:color .15s;text-decoration:none;-webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* Mobile */
.mobile-list{display:none;position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.mobile-detail{position:fixed;top:0;bottom:0;left:0;right:0;z-index:160;background:var(--bg);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mobile-detail.open{transform:translateX(0)}
.mc-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;min-height:56px}
.mc-item:active{background:var(--surface2)}
.mc-body{flex:1;min-width:0}
.mc-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-meta{display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap;margin-top:2px}
.fab{display:none;position:fixed;right:20px;bottom:calc(var(--nav-h)+16px);width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--white);border:none;font-size:24px;cursor:pointer;z-index:110;box-shadow:0 4px 12px rgba(0,0,0,.4)}

/* ── Header search ── */
.header-search{
  display:none;flex-shrink:1;min-width:0;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 10px;color:var(--text);font-size:13px;outline:none;width:140px;
}
.header-search:focus{border-color:var(--accent)}
.header-search::placeholder{color:var(--text2)}

/* ── Sort bar ── */
.sort-bar{
  display:none;
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;
  height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:4px;overflow-x:auto;z-index:98;
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{
  flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.1)}

@media(max-width:768px){
  .main{display:none}
  .toolbar{display:none}
  .btn-add{display:none!important}
  .toolbar{display:flex}
  .header-search{display:block}
  .search-input{display:none}
  .sort-bar{display:flex}
  .mobile-list{display:block;top:calc(var(--header-h) + var(--toolbar-h) + 36px)}
  .fab{display:block}
  #mobileSortSelect{display:block}
}
.stepper{display:flex;align-items:center;gap:0}
.stepper input{text-align:center;border-radius:0;-moz-appearance:textfield;font-size:16px}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper-btn{width:44px;height:44px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:background .15s}
.stepper-btn:active{background:var(--accent)}
.stepper-btn.minus{border-radius:var(--radius) 0 0 var(--radius)}
.stepper-btn.plus{border-radius:0 var(--radius) var(--radius) 0}

/* Store/Location selector */
.store-select-prompt { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:24px; }
.store-select-prompt .icon { font-size:48px; margin-bottom:12px; }
.store-select-prompt .msg { font-size:15px; color:var(--text2); margin-bottom:20px; }
.store-select-grid { display:grid; grid-template-columns:1fr; gap:10px; width:100%; max-width:360px; }
.store-select-btn { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:left; color:var(--text); font-size:15px; font-weight:700; cursor:pointer; }
.store-select-btn:active { border-color:var(--accent); }
.store-select-btn .sub { font-size:11px; color:var(--text2); font-weight:400; margin-top:2px; }
</style>
</head>
<body>

<header>
  <a href="/admin/menu" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:16px;border:1px solid var(--border);text-decoration:none;flex-shrink:0">🏠</a>
  <div class="header-title">📦 在庫管理</div>
  <div class="header-count" id="countBadge">読込中...</div>
  <div class="header-count" id="totalBadge" style="color:var(--cyan)"></div>
  <input type="search" class="header-search" id="headerSearch" placeholder="検索..." autocomplete="off">
  <div class="header-spacer"></div>
  <button class="btn-add" onclick="openMovement()">+ 在庫を動かす</button>
  <button onclick="if(confirm('ログアウトしますか？')){sessionStorage.clear();location.href='index.html'}" style="background:none;border:none;color:var(--text2);font-size:9px;cursor:pointer;padding:2px 4px" title="ログアウト">⏻</button>
</header>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="景品名で検索...">
  <div class="tb-sep"></div>
  <select class="filter-select" id="ownerFilter" onchange="onOwnerFilterChange()">
    <option value="">場所：全て</option>
  </select>
  <select class="filter-select" id="qtyFilter" onchange="applyFilters()">
    <option value="">数量：全て</option>
    <option value="zero">0個</option>
    <option value="low">10個以下</option>
    <option value="has">1個以上</option>
  </select>
  <div class="tb-sep"></div>
  <select class="filter-select" id="mobileSortSelect" onchange="setSort(this.value)">
    <option value="prize_name">名前順</option>
    <option value="owner">場所順</option>
    <option value="quantity">数量順</option>
    <option value="original_cost">単価順</option>
    <option value="updated_at">更新日順</option>
  </select>
  <button class="btn-clear" onclick="clearFilters()">クリア</button>
</div>
<div class="sort-bar" id="sortBar"></div>

<div class="main">
  <div class="list-pane" id="listPane">
    <div class="empty-pane"><div class="empty-icon">⏳</div>読み込み中...</div>
  </div>
  <div class="detail-pane" id="detailPane">
    <div class="empty-pane" id="detailEmpty"><div class="empty-icon">👈</div>左のリストから選択</div>
  </div>
</div>

<!-- Mobile -->
<div class="mobile-list" id="mobileList"></div>
<div class="mobile-detail" id="mobileDetail"></div>
<button class="fab" onclick="openMovement()" aria-label="在庫を動かす">＋</button>

<!-- Movement Modal -->
<div class="modal-bg" id="movementModal" onclick="if(event.target===this)closeMovement()">
  <div class="modal" id="movementContent"></div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<nav class="bottom-nav">
  <a class="nav-item" href="/admin/menu"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></a>
  <a class="nav-item" href="prizes.html"><div class="nav-icon">🏆</div><div>景品</div></a>
  <a class="nav-item" href="orders.html"><div class="nav-icon">📋</div><div>発注</div></a>
  <a class="nav-item active"><div class="nav-icon">📦</div><div>在庫</div></a>
  <a class="nav-item" href="announcements.html"><div class="nav-icon">📬</div><div>案内</div></a>
  <a class="nav-item" href="admin.html"><div class="nav-icon">⚙️</div><div>管理</div></a>
</nav>

<script>
const SB_STORAGE = window.CLAWOPS_CONFIG.SUPABASE_STORAGE;

// ─── AUTH ───
function getStaffId(){try{const s=JSON.parse(sessionStorage.getItem('clawops_staff'));return s?.staff_id||null}catch{return null}}

// ─── STATE ───
let STOCKS=[],MOVEMENTS=[],PRIZES={},LOCATIONS=[],STAFF=[],OWNERS=[];
let IMG_MAP = {};
let sortKey='updated_at',sortDir='desc';
let curSearch='',filterOwner='',filterQty='';
let selStockId=null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function ownerLabel(type,id){
  if(type==='location'){const l=LOCATIONS.find(x=>x.location_id===id);return l?l.location_name:id}
  if(type==='staff'){const s=STAFF.find(x=>x.staff_id===id);return s?(s.name+'の車'):id}
  return id||'—';
}
function fmt(n){return n!=null?Number(n).toLocaleString():'—'}
function fmtDate(d){if(!d)return'—';const p=d.split('T')[0].split('-');return p[0].slice(2)+'.'+p[1]+'.'+p[2]}
function qtyColor(q){return q<=0?'var(--red)':q<=10?'var(--yellow)':'var(--green)'}

let _tt;
function showToast(msg,ok=true){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(ok?'toast-ok':'toast-err');el.style.display='block';if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.style.display='none',3000)}
function showLoading(){document.getElementById('loadingOverlay').classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

// ─── LOAD ───
let _currentOwnerType='', _currentOwnerId='';

async function loadLocations(){
  showLoading();
  try{
    const[prizes,locations,staff]=await Promise.all([
      sbGet('prize_masters','select=prize_id,prize_name,original_cost,status,image_url&order=prize_name'),
      sbGet('locations','select=location_id,location_name,location_type,parent_location_id&is_active=eq.true&order=location_name'),
      sbGet('staff','select=staff_id,name,has_vehicle_stock&is_active=eq.true&order=name'),
    ]);
    PRIZES=Object.fromEntries(prizes.map(p=>[p.prize_id,p]));
    IMG_MAP = Object.fromEntries(prizes.filter(p => p.image_url).map(p => [String(p.prize_id), p.image_url]));
    LOCATIONS=locations;
    STAFF=staff.filter(s=>s.has_vehicle_stock);
    OWNERS=[...LOCATIONS.map(l=>({type:'location',id:l.location_id,label:l.location_name})),...STAFF.map(s=>({type:'staff',id:s.staff_id,label:s.name+'の車'}))];
    populateFilters();
    // Check sessionStorage for saved selection
    const saved=sessionStorage.getItem('clawops_selected_location');
    if(saved){
      const[sType,sId]=saved.split(':');
      const valid=OWNERS.find(o=>o.type===sType&&o.id===sId);
      if(valid){
        document.getElementById('ownerFilter').value=saved;
        filterOwner=saved;
        await loadOwnerData(sType,sId);
        return;
      }
    }
    renderLocationSelector();
  }catch(e){
    document.getElementById('listPane').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
    document.getElementById('mobileList').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
  }finally{hideLoading()}
}

async function loadOwnerData(ownerType, ownerId){
  _currentOwnerType=ownerType;_currentOwnerId=ownerId;
  showLoading();
  try{
    const[stocks,movements]=await Promise.all([
      sbGet('prize_stocks',`select=*&order=updated_at.desc&owner_type=eq.${encodeURIComponent(ownerType)}&owner_id=eq.${encodeURIComponent(ownerId)}`),
      sbGet('stock_movements',`select=*&order=created_at.desc&or=(from_owner_id.eq.${encodeURIComponent(ownerId)},to_owner_id.eq.${encodeURIComponent(ownerId)})`),
    ]);
    STOCKS=stocks;MOVEMENTS=movements;
    render();
    if(selStockId)renderDetail();
  }catch(e){
    document.getElementById('listPane').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
    document.getElementById('mobileList').innerHTML=`<div class="empty-pane">⚠️ ${esc(e.message)}</div>`;
  }finally{hideLoading()}
}

function renderLocationSelector(){
  // Hide count/total badges until data loaded
  document.getElementById('countBadge').textContent='';
  document.getElementById('totalBadge').textContent='';
  let html='<div class="store-select-prompt"><div class="icon">📍</div><div class="msg">場所を選択してください</div><div class="store-select-grid">';
  LOCATIONS.forEach(loc=>{
    const indent=loc.parent_location_id?'　└ ':'';
    html+=`<button class="store-select-btn" onclick="selectLocation('location','${loc.location_id}')">${indent}${esc(loc.location_name)}</button>`;
  });
  if(STAFF&&STAFF.length>0){
    html+='</div><div class="msg" style="margin-top:24px">または担当者</div><div class="store-select-grid">';
    STAFF.forEach(s=>{
      html+=`<button class="store-select-btn" onclick="selectLocation('staff','${esc(s.staff_id)}')">${esc(s.name)}の車</button>`;
    });
  }
  html+='</div></div>';
  document.getElementById('listPane').innerHTML=html;
  document.getElementById('mobileList').innerHTML=html;
}

function selectLocation(type, id){
  sessionStorage.setItem('clawops_selected_location',type+':'+id);
  document.getElementById('ownerFilter').value=type+':'+id;
  filterOwner=type+':'+id;
  loadOwnerData(type,id);
}

function onOwnerFilterChange(){
  const val=document.getElementById('ownerFilter').value;
  if(!val){
    // "全て" selected → show location selector
    sessionStorage.removeItem('clawops_selected_location');
    _currentOwnerType='';_currentOwnerId='';
    filterOwner='';
    STOCKS=[];MOVEMENTS=[];
    renderLocationSelector();
    return;
  }
  const[type,id]=val.split(':');
  selectLocation(type,id);
}

function populateFilters(){
  const sel=document.getElementById('ownerFilter');
  const cur=sel.value;
  sel.innerHTML='<option value="">場所：全て</option>'+OWNERS.map(o=>`<option value="${o.type}:${o.id}">${esc(o.label)}</option>`).join('');
  sel.value=cur;
}

// ─── FILTER / SORT ───
function getFiltered(){
  let list=STOCKS.filter(s=>{
    if(filterOwner){const[t,i]=filterOwner.split(':');if(s.owner_type!==t||s.owner_id!==i)return false}
    if(filterQty==='zero'&&s.quantity!==0)return false;
    if(filterQty==='low'&&(s.quantity<0||s.quantity>10))return false;
    if(filterQty==='has'&&s.quantity<1)return false;
    if(curSearch){const pz=PRIZES[s.prize_id];const nm=(pz?pz.prize_name:'').toLowerCase();if(!nm.includes(curSearch))return false}
    return true;
  });
  const dir=sortDir==='asc'?1:-1;
  list.sort((a,b)=>{
    let av,bv;
    if(sortKey==='prize_name'){const pa=PRIZES[a.prize_id],pb=PRIZES[b.prize_id];av=pa?pa.prize_name:'';bv=pb?pb.prize_name:''}
    else if(sortKey==='owner'){av=ownerLabel(a.owner_type,a.owner_id);bv=ownerLabel(b.owner_type,b.owner_id)}
    else if(sortKey==='quantity'){av=a.quantity||0;bv=b.quantity||0;return dir*(av-bv)}
    else if(sortKey==='original_cost'){const pa=PRIZES[a.prize_id],pb=PRIZES[b.prize_id];av=pa?Number(pa.original_cost)||0:0;bv=pb?Number(pb.original_cost)||0:0;return dir*(av-bv)}
    else if(sortKey==='updated_at'){av=a.updated_at||'';bv=b.updated_at||'';return dir*av.localeCompare(bv)}
    else{av=a[sortKey]||'';bv=b[sortKey]||''}
    return dir*String(av).localeCompare(String(bv),'ja');
  });
  return list;
}

// ─── 棚卸し確定 ───
async function confirmCount(stockId){
  if(!confirm('この在庫の棚卸しを確定しますか？\n（現在の数量で計数済みとして記録します）')) return;
  showLoading();
  try{
    const now=new Date().toISOString();
    await sbPatch('prize_stocks',stockId,'stock_id',{last_counted_at:now,last_counted_by:getStaffId(),updated_at:now,updated_by:getStaffId()});
    const s=STOCKS.find(x=>x.stock_id===stockId);
    if(s){s.last_counted_at=now;s.last_counted_by=getStaffId();}
    showToast('棚卸し確定しました');
    renderDetail();
    if(document.getElementById('mobileDetail').classList.contains('open')) openMobileDetail(stockId);
  }catch(e){showToast('エラー: '+e.message,false)}finally{hideLoading()}
}

function buildMovementForm(stock){
  const types=[{v:'arrival',l:'入荷'},{v:'transfer',l:'移動'},{v:'replenish',l:'補充'},{v:'adjust',l:'修正'}];
  const prizeOpts=Object.entries(PRIZES).filter(([,p])=>p.status==='active').map(([id,p])=>`<option value="${id}" ${stock&&stock.prize_id===id?'selected':''}>${esc(p.prize_name)}</option>`).join('');
  const ownerOpts=OWNERS.map(o=>`<option value="${o.type}:${o.id}" ${stock&&stock.owner_type===o.type&&stock.owner_id===o.id?'selected':''}>${esc(o.label)}</option>`).join('');
  return`
  <h3>在庫を動かす</h3>
  <div class="field"><label>動きの種類</label><select id="mvType">${types.map(t=>`<option value="${t.v}">${t.l}</option>`).join('')}</select></div>
  <div class="field"><label>景品</label><select id="mvPrize"><option value="">選択してください</option>${prizeOpts}</select></div>
  <div class="field"><label>元の場所</label><select id="mvFrom"><option value="">なし（入荷時）</option>${ownerOpts}</select></div>
  <div class="field"><label>先の場所</label><select id="mvTo"><option value="">選択してください</option>${ownerOpts}</select></div>
  <div class="field"><label>数量</label><div class="stepper"><button type="button" class="stepper-btn minus" onclick="stepVal('mvQty',-1)">−</button><input type="tel" id="mvQty" min="1" placeholder="動かす数" inputmode="numeric" pattern="[0-9]*" style="font-size:16px"><button type="button" class="stepper-btn plus" onclick="stepVal('mvQty',1)">＋</button></div><div class="error" id="mvErr"></div></div>
  <div class="field"><label>理由メモ</label><textarea id="mvNote" placeholder="任意"></textarea></div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-ghost" onclick="closeMovement()" style="flex:1">キャンセル</button>
    <button class="btn btn-primary" onclick="submitMovement()" style="flex:1">登録</button>
  </div>`;
}

function closeMovement(){document.getElementById('movementModal').classList.remove('open')}

async function submitMovement(){
  const type=document.getElementById('mvType').value;
  const prizeId=document.getElementById('mvPrize').value;
  const fromVal=document.getElementById('mvFrom').value;
  const toVal=document.getElementById('mvTo').value;
  const qty=parseInt(document.getElementById('mvQty').value);
  const note=document.getElementById('mvNote').value.trim();
  const errEl=document.getElementById('mvErr');
  errEl.textContent='';
  if(!prizeId){errEl.textContent='景品を選択してください';return}
  if(!toVal&&type!=='adjust'){errEl.textContent='先の場所を選択してください';return}
  if(!qty||qty<1){errEl.textContent='数量を入力してください';return}
  if(fromVal&&fromVal===toVal){errEl.textContent='同じ場所への移動はできません';return}
  const[fromType,fromId]=fromVal?fromVal.split(':'):['',''];
  const[toType,toId]=toVal?toVal.split(':'):['',''];
  showLoading();
  try{
    await sbPost('stock_movements',{prize_id:prizeId,movement_type:type,from_owner_type:fromType||null,from_owner_id:fromId||null,to_owner_type:toType||null,to_owner_id:toId||null,quantity:qty,note:note||null,created_by:getStaffId(),created_at:new Date().toISOString()});
    if(fromType&&fromId) await upsertStock(prizeId,fromType,fromId,-qty);
    if(toType&&toId) await upsertStock(prizeId,toType,toId,qty);
    closeMovement();closeMobileDetail();
    showToast('登録しました');
    if(_currentOwnerType&&_currentOwnerId) await loadOwnerData(_currentOwnerType,_currentOwnerId);
  }catch(e){errEl.textContent='エラー: '+e.message}finally{hideLoading()}
}

async function upsertStock(prizeId,ownerType,ownerId,delta){
  const existing=STOCKS.find(s=>s.prize_id===prizeId&&s.owner_type===ownerType&&s.owner_id===ownerId);
  if(existing){
    const newQty=Math.max(0,(existing.quantity||0)+delta);
    await sbPatch('prize_stocks',existing.stock_id,'stock_id',{quantity:newQty,updated_at:new Date().toISOString(),updated_by:getStaffId()});
  }else if(delta>0){
    const stockId='STK-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
    await sbPost('prize_stocks',{stock_id:stockId,prize_id:prizeId,owner_type:ownerType,owner_id:ownerId,quantity:delta,created_at:new Date().toISOString(),updated_at:new Date().toISOString(),updated_by:getStaffId()});
  }
}

  const pz=PRIZES[s.prize_id]||{};
  document.getElementById('movementContent').innerHTML=`

  <div class="field"><label>修正後の数量</label><div class="stepper"><button type="button" class="stepper-btn minus" onclick="stepVal('adjQty',-1)">−</button><input type="tel" id="adjQty" min="0" value="${s.quantity}" inputmode="numeric" pattern="[0-9]*" style="font-size:16px"><button type="button" class="stepper-btn plus" onclick="stepVal('adjQty',1)">＋</button></div><div class="error" id="adjErr"></div></div>
  <div class="field"><label>修正理由 <span style="color:var(--red)">*</span></label><textarea id="adjReason" placeholder="例: 棚卸しで差異があった"></textarea></div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-ghost" onclick="closeMovement()" style="flex:1">キャンセル</button>
    <button class="btn btn-green" onclick="submitAdjust('${esc(s.stock_id)}')" style="flex:1">修正を登録</button>
  </div>`;
  document.getElementById('movementModal').classList.add('open');
}

async function submitAdjust(stockId){
  const s=STOCKS.find(x=>x.stock_id===stockId);if(!s)return;
  const newQty=parseInt(document.getElementById('adjQty').value);
  const reason=document.getElementById('adjReason').value.trim();
  const errEl=document.getElementById('adjErr');
  errEl.textContent='';
  if(isNaN(newQty)||newQty<0){errEl.textContent='正しい数量を入力してください';return}
  if(!reason){errEl.textContent='修正理由を入力してください';return}
  const delta=newQty-s.quantity;
  showLoading();
  try{
    await sbPost('stock_movements',{prize_id:s.prize_id,movement_type:'adjust',from_owner_type:s.owner_type,from_owner_id:s.owner_id,to_owner_type:s.owner_type,to_owner_id:s.owner_id,quantity:Math.abs(delta),note:reason,adjustment_reason:reason,created_by:getStaffId(),created_at:new Date().toISOString()});
    await sbPatch('prize_stocks',stockId,'stock_id',{quantity:newQty,updated_at:new Date().toISOString(),updated_by:getStaffId()});
    closeMovement();closeMobileDetail();
    showToast('数量を修正しました');
    if(_currentOwnerType&&_currentOwnerId) await loadOwnerData(_currentOwnerType,_currentOwnerId);
  }catch(e){errEl.textContent='エラー: '+e.message}finally{hideLoading()}
}

// ─── STEPPER ──────────────────────────────────────────────────────────────────
function stepVal(inputId, delta) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const min = el.hasAttribute('min') ? parseInt(el.min) : -Infinity;
  const max = el.hasAttribute('max') ? parseInt(el.max) : Infinity;
  const cur = parseInt(el.value) || 0;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.value = next;
  el.dispatchEvent(new Event('input', {bubbles:true}));
}

// ─── INIT ───
loadLocations();
</script>
