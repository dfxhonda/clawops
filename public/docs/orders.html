<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>発注管理 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:8px;
  --nav-h:58px;
  --header-h:56px;
  --toolbar-h:52px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px}

/* ── Header ── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-spacer{flex:1}
.btn-add{
  padding:8px 16px;border-radius:var(--radius);
  background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.btn-add:hover{background:var(--accent2)}

/* ── Toolbar ── */
.toolbar{
  position:fixed;top:var(--header-h);left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;z-index:99;
  overflow-x:auto;scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{display:none}
.search-wrap{position:relative;flex-shrink:0;width:220px}
.search-wrap input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 10px 7px 30px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:12px;pointer-events:none}
.tb-sep{flex-shrink:0;width:1px;height:20px;background:var(--border)}
.filter-select{
  flex-shrink:0;padding:5px 8px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:12px;cursor:pointer;outline:none;
}
.filter-select option{background:var(--surface)}
.date-input{
  flex-shrink:0;padding:5px 8px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:12px;outline:none;cursor:pointer;
  width:120px;
}
.date-input:focus{border-color:var(--accent)}
.date-sep{flex-shrink:0;color:var(--text2);font-size:12px;padding:0 2px}
.btn-clear{
  flex-shrink:0;padding:5px 11px;border-radius:var(--radius);font-size:12px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.btn-clear:hover{border-color:var(--accent);color:var(--accent)}

/* ── Main layout ── */
.main{
  position:fixed;
  top:calc(var(--header-h) + var(--toolbar-h));
  left:0;right:0;
  bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  display:flex;
}

/* ── List pane ── */
.list-pane{
  flex:3;min-width:300px;overflow-y:auto;
  border-right:1px solid var(--border);
}
.order-table{width:100%;border-collapse:collapse;table-layout:fixed}
.order-table thead th{
  position:sticky;top:0;background:var(--surface);
  padding:9px 10px;text-align:left;
  font-size:12px;font-weight:700;color:var(--text2);
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;white-space:nowrap;
}
.order-table thead th:hover{color:var(--text)}
.order-table thead th.sorted{color:var(--accent)}
.order-table colgroup col.col-date{width:13%}
.order-table colgroup col.col-name{width:25%}
.order-table colgroup col.col-src{width:8%}
.order-table colgroup col.col-qty{width:7%}
.order-table colgroup col.col-unit{width:10%}
.order-table colgroup col.col-case{width:11%}
.order-table colgroup col.col-status{width:13%}
.order-table colgroup col.col-dest{width:9%}
.order-table tbody tr{
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
}
.order-table tbody tr:hover{background:var(--surface2)}
.order-table tbody tr.selected{
  background:rgba(124,106,255,.12);
  border-left:3px solid var(--accent);
}
.order-table tbody tr.selected td:first-child{padding-left:7px}
.order-table tbody td{
  padding:8px 10px;font-size:13px;vertical-align:middle;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.td-name{font-weight:600}
.td-src{color:var(--orange);font-size:12px}
.td-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.td-qty{text-align:right;color:var(--text2);font-size:12px}
.td-dest{color:var(--text2);font-size:12px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge-ordered{background:rgba(0,180,216,.15);color:var(--cyan);border:1px solid rgba(0,180,216,.3)}
.badge-arrived{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-cancelled{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3)}
.badge-confirmed{background:rgba(124,106,255,.15);color:var(--accent);border:1px solid rgba(124,106,255,.3)}
.empty-pane{text-align:center;padding:60px 20px;color:var(--text2);font-size:13px}
.empty-pane .empty-icon{font-size:36px;margin-bottom:10px}

/* ── Detail pane ── */
.detail-pane{
  flex:2;min-width:280px;overflow-y:auto;
  background:var(--surface);
}
.detail-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text2);gap:12px;
}
.detail-empty-icon{font-size:40px}
.detail-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.detail-title{
  font-size:15px;font-weight:700;line-height:1.35;
  word-break:break-all;color:var(--accent);
}
.detail-id{font-size:11px;color:var(--text2);margin-top:4px}
.detail-dirty{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--yellow);margin-right:5px;
  animation:pulse .9s ease-in-out infinite alternate;
}
@keyframes pulse{from{opacity:1}to{opacity:.25}}
.detail-body{padding:14px 16px 0}
.field{margin-bottom:13px}
.field label{
  display:block;font-size:11px;color:var(--text2);
  font-weight:700;letter-spacing:.3px;margin-bottom:5px;
}
.field input,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 10px;
  color:var(--text);font-size:14px;outline:none;
  font-family:inherit;transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--surface)}
.field-readonly{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 10px;
  color:var(--text2);font-size:14px;
}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:var(--red);margin-left:2px}
.detail-actions{
  padding:14px 16px 20px;
  display:flex;flex-wrap:wrap;gap:8px;
}
.btn-save{
  padding:9px 20px;border-radius:var(--radius);
  background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;
  white-space:nowrap;
}
.btn-save:hover:not(:disabled){background:var(--accent2)}
.btn-save:disabled{opacity:.45;pointer-events:none}
.btn-arrive,.btn-cancel,.btn-revert{
  padding:9px 14px;border-radius:var(--radius);
  background:transparent;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-arrive{color:var(--green);border:1px solid rgba(46,204,113,.4)}
.btn-arrive:hover{border-color:var(--green);background:rgba(46,204,113,.08)}
.btn-cancel{color:var(--red);border:1px solid rgba(231,76,60,.4)}
.btn-cancel:hover{border-color:var(--red);background:rgba(231,76,60,.08)}
.btn-revert{color:var(--text2);border:1px solid var(--border)}
.btn-revert:hover{border-color:var(--text2);color:var(--text)}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;z-index:150;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;
  transition:color .15s;text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* ── Spinner ── */
.spinner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h) + 12px);right:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:13px;font-weight:600;z-index:400;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* ── Mobile UI ── */
.mobile-list{display:none}
.mobile-detail{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateX(100%);transition:transform .25s ease;
}
.mobile-detail.open{transform:translateX(0)}
.mc-item{
  display:flex;align-items:center;
  padding:13px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.mc-item:active{background:var(--surface2)}
.mc-body{flex:1;min-width:0}
.mc-name{font-size:15px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-meta{font-size:12px;color:var(--text2);margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;overflow:hidden}
.mc-arrow{color:var(--text2);font-size:22px;padding-left:8px;flex-shrink:0;line-height:1}
.fab{
  position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);right:18px;
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#fff;border:none;font-size:28px;cursor:pointer;z-index:160;
  box-shadow:0 4px 16px rgba(124,106,255,.5);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.fab:hover{background:var(--accent2)}
.md-header{
  position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;z-index:10;
}
.md-back{
  display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;
  background:var(--surface2);color:var(--text);font-size:18px;font-weight:700;
  border:1px solid var(--border);cursor:pointer;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.md-title{font-size:16px;font-weight:700;flex:1}
.md-body{padding:14px 16px 0}
.md-actions{padding:14px 16px 32px;display:flex;flex-direction:column;gap:10px}

/* ── Header search ── */
.header-search{
  display:none;flex-shrink:1;min-width:0;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 10px;color:var(--text);font-size:13px;outline:none;width:140px;
}
.header-search:focus{border-color:var(--accent)}
.header-search::placeholder{color:var(--text2)}

/* ── Sort bar ── */
.sort-bar{
  display:none;
  position:fixed;top:calc(var(--header-h) + var(--toolbar-h));left:0;right:0;
  height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:4px;overflow-x:auto;z-index:98;
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{
  flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,255,.1)}

@media (max-width:768px){
  .main{display:none!important}
  .btn-add{display:none!important}
  .header-search{display:block}
  .search-wrap{display:none}
  .sort-bar{display:flex}
  .mobile-list{
    display:block;position:fixed;
    top:calc(var(--header-h) + var(--toolbar-h) + 36px);
    left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);
  }
  .mobile-detail{display:block}
  .fab{display:flex}
}
.stepper{display:flex;align-items:center;gap:0}
.stepper input{text-align:center;border-radius:0;-moz-appearance:textfield;font-size:16px}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper-btn{width:40px;height:40px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;transition:background .15s}
.stepper-btn:active{background:var(--accent)}
.stepper-btn.minus{border-radius:var(--radius) 0 0 var(--radius)}
.stepper-btn.plus{border-radius:0 var(--radius) var(--radius) 0}
.store-select-prompt { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:24px; }
.store-select-prompt .icon { font-size:48px; margin-bottom:12px; }
.store-select-prompt .msg { font-size:15px; color:var(--text2); margin-bottom:20px; }
.store-select-grid { display:grid; grid-template-columns:1fr; gap:10px; width:100%; max-width:360px; }
.store-select-btn { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:left; color:var(--text); font-size:15px; font-weight:700; cursor:pointer; }
.store-select-btn:active { border-color:var(--accent); }
.store-select-btn .sub { font-size:11px; color:var(--text2); font-weight:400; margin-top:2px; }
</style>
</head>

// ─── SUPABASE REST ────────────────────────────────────────────────────────────
async function sbGet(table, params='') {
  let all=[],offset=0;const PAGE=1000;
  while(true){
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}&limit=${PAGE}&offset=${offset}`, {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    if (!r.ok) throw new Error(await r.text());
    const d=await r.json();all=all.concat(d);if(d.length<PAGE)break;offset+=PAGE;
  }
  return all;
}

async function sbPatch(table, id, idCol, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`, {
    method: 'PATCH',
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function ensureSupplier(name) {
  if (!name) return null;
  const existing = SUPPLIERS_LIST.find(s => s.supplier_name === name);
  if (existing) return existing.supplier_id;
  const newId = name.slice(0,3).toUpperCase().replace(/[^A-Z0-9]/g,'X') + String(Date.now()).slice(-2);
  await sbPost('suppliers', {supplier_id: newId, supplier_name: name, is_active: true});
  SUPPLIERS_LIST.push({supplier_id: newId, supplier_name: name});
  SUP_NAME[newId] = name;
  return newId;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).slice(0,10).split('-');
  return s[0].slice(2) + '.' + s[1] + '.' + s[2];
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) { return Number(n||0).toLocaleString('ja-JP'); }

function statusLabel(s) {
  if (s === 'ordered')   return '発注済み';
  if (s === 'arrived')   return '入荷済み';
  if (s === 'cancelled') return '取消';
  if (s === 'confirmed') return '確定';
  return s || '—';
}

function prizeName(o) {
  if (o.prize_id && PRIZE_MAP[String(o.prize_id)]) return PRIZE_MAP[String(o.prize_id)];
  return o.prize_name_raw || '（景品名未設定）';
}

function statusBadge(s) {
  if (s === 'ordered')   return '<span class="badge badge-ordered">発注済み</span>';
  if (s === 'arrived')   return '<span class="badge badge-arrived">入荷済み</span>';
  if (s === 'cancelled') return '<span class="badge badge-cancelled">取消</span>';
  if (s === 'confirmed') return '<span class="badge badge-confirmed">確定</span>';
  return '<span class="badge badge-ordered">' + esc(s || '—') + '</span>';
}

function showToast(msg, ok=true) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
  el.style.animation = 'none';

  _toastTimer = setTimeout(() => el.style.display='none', 3000);
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadDestData(dest) {
  showLoading();
  try {
    const fetches = [
      sbGet('prize_orders',
        'select=order_id,prize_id,prize_name_raw,supplier_id,order_source,order_date,expected_date,case_quantity,case_count,unit_cost,case_cost,destination,status,source_file,notes' +
        '&destination=eq.' + encodeURIComponent(dest) +
        '&order=order_date.desc')
    ];
    if (!_masterLoaded) {
      fetches.push(
        sbGet('prize_masters', 'select=prize_id,prize_name,image_url&order=prize_name.asc').catch(() => []),
        sbGet('suppliers', 'select=supplier_id,supplier_name&is_active=eq.true&order=supplier_name').catch(() => [])
      );
    }
    const results = await Promise.all(fetches);

    DATA = results[0];
    if (!_masterLoaded) {
      PRIZES = results[1] || [];
      PRIZE_MAP = Object.fromEntries(PRIZES.map(p => [String(p.prize_id), p.prize_name]));
      IMG_MAP = Object.fromEntries(PRIZES.filter(p => p.image_url).map(p => [String(p.prize_id), p.image_url]));
      SUPPLIERS_LIST = results[2] || [];
      SUP_NAME = Object.fromEntries(SUPPLIERS_LIST.map(s => [s.supplier_id, s.supplier_name]));
      _masterLoaded = true;
    }

    // 仕入先フィルター選択肢を日本語名で生成
    const supIds = [...new Set([...SUPPLIERS_LIST.map(s => s.supplier_id), ...DATA.map(o => o.supplier_id).filter(Boolean)])].sort();
    const sf = document.getElementById('supplierFilter');
    sf.innerHTML = '<option value="">仕入先：全て</option>' + supIds.map(id => `<option value="${id}">${esc(supName(id))}</option>`).join('');

    render();
    if (selOrderId || isNewMode) renderDetail();
  } catch(e) {
    document.getElementById('listPane').innerHTML =
      `<div class="empty-pane">⚠️ データ読み込みに失敗しました<br><small>${esc(e.message)}</small></div>`;
    document.getElementById('countBadge').textContent = 'エラー';
  } finally {
    hideLoading();
  }
}

// ─── FILTER / SORT ────────────────────────────────────────────────────────────
function getFiltered() {
  let list = DATA.filter(o => {
    if (filterStatus && o.status !== filterStatus) return false;
    if (filterSupplier && o.supplier_id !== filterSupplier) return false;
    if (filterDest && o.destination !== filterDest) return false;
    if (filterDateFrom && (o.expected_date || '') < filterDateFrom) return false;
    if (filterDateTo   && (o.expected_date || '') > filterDateTo)   return false;
    const q = curSearch.toLowerCase();
    if (q) {
      const nm = prizeName(o).toLowerCase();
      if (!nm.includes(q)) return false;
    }
    return true;
  });

  const dir = sortDir === 'asc' ? 1 : -1;
  const numKeys = ['case_quantity','unit_cost','case_cost','case_count'];
  list = list.slice().sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (numKeys.includes(sortKey)) {
      av = Number(av) || 0; bv = Number(bv) || 0;
      return dir * (av - bv);
    }
    const nil = dir === 1 ? '\uffff' : '';
    if (av == null) av = nil;
    if (bv == null) bv = nil;
    if (typeof av === 'string' || typeof bv === 'string')
      return dir * String(av).localeCompare(String(bv), 'ja');
    return dir * (av - bv);
  });
  return list;
}

function buildSortBar() {
  const cols = [
    {key:'expected_date',label:'入荷予定日'},
    {key:'prize_name_raw',label:'景品名'},
    {key:'supplier_id',label:'仕入先'},
    {key:'case_quantity',label:'数量'},
    {key:'unit_cost',label:'単価'},
    {key:'case_cost',label:'ケース金額'},
    {key:'destination',label:'入荷先'},
    {key:'status',label:'状態'}
  ];
  const bar = document.getElementById('sortBar');
  if (!bar) return;
  bar.innerHTML = cols.map(c => {
    const active = sortKey === c.key;
    const arrow = active ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    return `<button class="sort-btn${active?' active':''}" onclick="toggleSort('${c.key}')">${c.label}${arrow}</button>`;
  }).join('');
}
function toggleSort(key) {
  if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = key; sortDir = key === 'expected_date' ? 'desc' : 'asc'; }
  render();
}

function markDirty() {
  isDirty = true;
  const btn = document.getElementById('btnSave');
  if (btn) btn.textContent = '● 保存';

  if (title && !title.querySelector('.detail-dirty')) {
    title.insertAdjacentHTML('afterbegin', '<span class="detail-dirty"></span>');
  }
}

function revertChanges() {
  isDirty = false;
  if (isNewMode) {
    isNewMode = false;
    selOrderId = null;
    render();

// ─── SAVE ──────────────────────────────────────────────────────────────────────
async function saveOrder() {
  const prizeNameVal = (document.getElementById('fPrizeName').value || '').trim();
  const supplierId = (document.getElementById('fSupplierId').value || '').trim();
  const orderDate  = document.getElementById('fOrderDate').value || null;
  const expDate    = document.getElementById('fExpectedDate').value || null;
  const caseQtyStr = document.getElementById('fCaseQty').value;
  const unitCostStr= document.getElementById('fUnitCost').value;
  const caseCount  = document.getElementById('fCaseCount').value;
  const status     = document.getElementById('fStatus').value;
  const destination= (document.getElementById('fDestination').value || '').trim();
  const notes      = (document.getElementById('fNotes').value || '').trim();
  const prizeId    = document.getElementById('fPrizeId').value || null;

  if (!prizeNameVal) { showToast('景品名が空です', false); return; }
  if (caseQtyStr === '') { showToast('数量が入っていません', false); return; }
  if (unitCostStr === '') { showToast('単価が入っていません', false); return; }

  const caseQty  = parseInt(caseQtyStr, 10);
  const unitCost = parseInt(unitCostStr, 10);
  if (isNaN(caseQty) || caseQty < 0)  { showToast('数量は0以上の整数を入力してください', false); return; }
  if (isNaN(unitCost) || unitCost < 0) { showToast('単価は0以上の整数を入力してください', false); return; }

  const caseCost = caseQty * unitCost;

  const payload = {
    prize_name_raw: prizeNameVal,
    supplier_id:    supplierId || null,
    order_date:     orderDate,
    expected_date:  expDate,
    case_quantity:  caseQty,
    case_count:     caseCount ? parseInt(caseCount, 10) : null,
    unit_cost:      unitCost,
    case_cost:      caseCost,
    destination:    destination || null,
    status,
    notes:          notes || null,
    prize_id:       prizeId,
    updated_by:     getStaffId()
  };

  const saveBtn = document.getElementById('btnSave');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
  showLoading();

  try {
    if (isNewMode) {
      const result = await sbPost('prize_orders', payload);
      const newId = Array.isArray(result) ? result[0]?.order_id : result?.order_id;
      showToast('保存しました');
      isDirty = false;
      isNewMode = false;
      await loadDestData(filterDest || sessionStorage.getItem('clawops_selected_destination') || '');
      if (newId) selOrderId = newId;
      render();
      renderDetail();
    } else {
      await sbPatch('prize_orders', selOrderId, 'order_id', payload);
      showToast('保存しました');
      isDirty = false;
      await loadDestData(filterDest || sessionStorage.getItem('clawops_selected_destination') || '');
      render();
      renderDetail();
    }
  } catch(e) {
    showToast('エラー: ' + e.message, false);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
  } finally {
    hideLoading();
  }
}

// ─── STEPPER ──────────────────────────────────────────────────────────────────
function stepVal(inputId, delta) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const min = el.hasAttribute('min') ? parseInt(el.min) : -Infinity;
  const max = el.hasAttribute('max') ? parseInt(el.max) : Infinity;
  const cur = parseInt(el.value) || 0;
  const next = Math.min(max, Math.max(min, cur + delta));
  el.value = next;
  el.dispatchEvent(new Event('input', {bubbles:true}));
}
