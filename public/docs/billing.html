<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集金帳票 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#1a1a23;--surface2:#22222e;--border:#2e2e3e;--text:#e8e8f0;--text2:#9090a8;--accent:#7c6aff;--green:#2ecc71;--red:#e74c3c;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px}
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px}
.header h1{font-size:16px;flex:1}
.btn{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:700;border:none;cursor:pointer}
.container{max-width:700px;margin:0 auto;padding:12px}
.filters{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.filters select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:13px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:5px 6px;color:var(--text2);font-weight:600;background:var(--surface2);white-space:nowrap}
td{padding:5px 6px;border-bottom:1px solid var(--border)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.machine-block{margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;break-inside:avoid}
.machine-header{padding:8px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.machine-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.machine-footer input,.machine-footer textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:13px}
.machine-footer .amt{width:120px;font-weight:700;font-size:15px}
.machine-footer .note{flex:1;font-size:12px}
.subtotal td{font-weight:700;background:var(--surface2)}
.total-box{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center}
.total-box .big{font-size:28px;font-weight:800;color:var(--accent)}
.total-box .label{font-size:11px;color:var(--text2)}
.sign-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;justify-content:space-between}
.sign-box{text-align:center;width:45%}
.sign-box .line{border-bottom:1px solid var(--text);margin-top:40px;margin-bottom:4px}
.sign-box .label{font-size:10px;color:var(--text2)}
.history-section{margin-top:16px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:6px}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text2)}
.spinner{width:24px;height:24px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{
  body{background:#fff;color:#000;font-size:10px}
  .no-print{display:none!important}
  .container{max-width:100%;padding:8px}
  .machine-block{border-color:#999;break-inside:avoid}
  .machine-header{background:#eee}
  th{background:#eee;color:#333}
  td{border-color:#ccc}
  .subtotal td{background:#eee}
  .total-box{border-color:#333}
  .total-box .big{color:#000}
  .sign-area{border-color:#999}
  .sign-box .line{border-color:#000}
  :root{--surface:#fff;--surface2:#f5f5f5;--border:#ccc;--text:#000;--text2:#666}
  .machine-footer input,.machine-footer textarea{border-color:#999;background:#fff;color:#000}
}
</style>
</head>
<body>
<div class="header no-print">
  <a href="index.html" style="color:var(--text2);font-size:12px">← 戻る</a>
  <h1>💰 集金帳票</h1>
  <button class="btn" style="background:var(--green);color:#fff" onclick="window.print()">🖨️ PDF</button>
  <button class="btn" style="background:#00b4d8;color:#fff" onclick="generateReport()">📤 報告</button>
</div>
<div class="container">
  <div class="filters no-print">
    <select id="storeFilter" onchange="render()"></select>
    <span style="font-size:12px;color:var(--text2)" id="prevInfo"></span>
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
</div>

<script>
const SB_URL='https://gedxzunoyzmvbqgwjalx.supabase.co/rest/v1';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZHh6dW5veXptdmJxZ3dqYWx4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE0ODA1OCwiZXhwIjoyMDg5NzI0MDU4fQ.ATjGmg5kdm-cs_663ddOUvwTZ8vbn24aSjz6uUYm4Fs';
async function sbGet(t,p=''){let a=[],o=0;while(true){const r=await fetch(SB_URL+'/'+t+'?'+p+'&limit=1000&offset='+o,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(await r.text());const d=await r.json();a=a.concat(d);if(d.length<1000)break;o+=1000}return a}
async function sbPost(t,b){const r=await fetch(SB_URL+'/'+t,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbPatch(t,col,val,b){const r=await fetch(SB_URL+'/'+t+'?'+col+'=eq.'+encodeURIComponent(val),{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text())}
async function sbDelete(t,col,val){const r=await fetch(SB_URL+'/'+t+'?'+col+'=eq.'+encodeURIComponent(val),{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)throw new Error(await r.text())}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt(n){return n!=null?Number(n).toLocaleString():'—'}
function fmtYen(n){return n!=null?'¥'+Number(n).toLocaleString():'—'}

let allReadings=[], storeMap={}, machineMap={}, billingEvents=[], allSnapshots=[];

async function loadAll(){
  const [readings, stores, machines, events, snapshots] = await Promise.all([
    sbGet('meter_readings','select=booth_id,read_time,in_meter,out_meter,prize_name&order=read_time.asc'),
    sbGet('stores','select=store_code,store_name&is_active=eq.true&order=store_name'),
    sbGet('machines','select=machine_code,store_code,machine_name&is_active=eq.true'),
    sbGet('billing_events','select=*&order=billing_date.desc'),
    sbGet('billing_snapshots','select=*'),
  ]);
  billingEvents=events; allSnapshots=snapshots;
  allReadings=readings;
  storeMap=Object.fromEntries(stores.map(s=>[s.store_code,s.store_name]));
  machineMap=Object.fromEntries(machines.map(m=>[m.machine_code,m.machine_name||m.machine_code]));
  const storeCodes=[...new Set(machines.map(m=>m.store_code))].sort();
  const sel=document.getElementById('storeFilter');
  storeCodes.forEach(sc=>{const o=document.createElement('option');o.value=sc;o.textContent=storeMap[sc]||sc;sel.appendChild(o)});
  render();
}

function render(){
  const store=document.getElementById('storeFilter').value;
  if(!store){document.getElementById('content').innerHTML='<p style="color:var(--text2);text-align:center;padding:40px">店舗を選択してください</p>';return}

  // 前回集金snapshot
  const storeEvents=billingEvents.filter(e=>e.store_code===store).sort((a,b)=>(b.billing_date||'').localeCompare(a.billing_date||''));
  const prevEvent=storeEvents[0]||null;
  const prevSnapMap={};
  if(prevEvent) allSnapshots.filter(s=>s.billing_id===prevEvent.billing_id).forEach(s=>{
    prevSnapMap[s.booth_id]={in_meter:Number(s.in_meter)||0,out_meter:Number(s.out_meter)||0};
  });
  document.getElementById('prevInfo').textContent=prevEvent?`前回: ${prevEvent.billing_date}`:'初回集金';

  // 最新meter_reading
  const storeReadings=allReadings.filter(r=>(r.booth_id||'').startsWith(store)&&r.in_meter!=null);
  const latestByBooth={};
  storeReadings.forEach(r=>{if(!latestByBooth[r.booth_id]||(r.read_time||'')>(latestByBooth[r.booth_id].read_time||''))latestByBooth[r.booth_id]=r});

  // ブース集計
  const boothStats=[];
  for(const [bid,cur] of Object.entries(latestByBooth)){
    const prev=prevSnapMap[bid]||{in_meter:0,out_meter:0};
    const mc=bid.split('-').slice(0,2).join('-');
    boothStats.push({bid,mc,prevIn:prev.in_meter,curIn:Number(cur.in_meter)||0,prizeName:cur.prize_name||''});
  }

  // 機械別グループ
  const byMachine={};
  boothStats.forEach(b=>{if(!byMachine[b.mc])byMachine[b.mc]=[];byMachine[b.mc].push(b)});
  window._billingMCs=Object.keys(byMachine);
  window._billingLatest=latestByBooth;
  window._billingPrevSnap=prevSnapMap;

  const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  const storeName=storeMap[store]||store;

  // 機械ブロック
  const machineBlocks=Object.entries(byMachine).sort((a,b)=>a[0].localeCompare(b[0])).map(([mc,booths])=>{
    booths.sort((a,b)=>a.bid.localeCompare(b.bid));
    const mName=machineMap[mc]||mc;
    const rows=booths.map(b=>`<tr>
      <td>${esc(b.bid.split('-').pop())}</td>
      <td class="num">${fmt(b.prevIn)}</td>
      <td class="num">${fmt(b.curIn)}</td>
      <td class="num" style="font-weight:700">${fmt(b.curIn-b.prevIn)}</td>
      <td style="font-size:10px">${esc((b.prizeName||'').slice(0,12))}</td>
    </tr>`).join('');

    return `<div class="machine-block" data-mc="${esc(mc)}">
      <div class="machine-header"><span>${esc(mName)}</span></div>
      <table>
        <tr><th>ブース</th><th class="num">前回IN</th><th class="num">今回IN</th><th class="num">差分</th><th>景品</th></tr>
        ${rows}
      </table>
      <div class="machine-footer">
        <input type="number" inputmode="numeric" class="amt" id="amt_${mc}" placeholder="集金額" oninput="updateTotal()">
        <input type="text" class="note" id="note_${mc}" placeholder="備考">
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800">${esc(storeName)} 集金帳票</div>
      <div style="font-size:12px;color:var(--text2)">${today}</div>
    </div>

    ${machineBlocks||'<p style="text-align:center;color:var(--text2);padding:40px">データなし</p>'}

    <div class="total-box">
      <div class="label">集金合計</div>
      <div class="big" id="grandTotal">¥0</div>
    </div>

    <div class="sign-area">
      <div class="sign-box">
        <div class="line"></div>
        <div class="label">集金担当者</div>
      </div>
      <div class="sign-box">
        <div class="line"></div>
        <div class="label">店舗確認者</div>
      </div>
    </div>

    <div class="no-print" style="margin-bottom:16px">
      <button onclick="confirmBilling()" class="btn" style="width:100%;padding:12px;font-size:14px;background:var(--accent);color:#fff">💰 集金確定</button>
    </div>

    ${renderHistory(store)}
  `;
}

function updateTotal(){
  const mcs=window._billingMCs||[];
  let total=0;
  mcs.forEach(mc=>{total+=parseInt(document.getElementById('amt_'+mc)?.value||'0')||0});
  document.getElementById('grandTotal').textContent=fmtYen(total);
}

async function confirmBilling(){
  const store=document.getElementById('storeFilter').value;
  if(!store) return;
  const mcs=window._billingMCs||[];
  const details=mcs.map(mc=>({
    machine_code:mc,machine_name:machineMap[mc]||mc,
    collected_amount:parseInt(document.getElementById('amt_'+mc)?.value||'0')||0,
    note:document.getElementById('note_'+mc)?.value||''
  }));
  const total=details.reduce((s,d)=>s+d.collected_amount,0);
  if(total<=0){alert('集金額を入力してください');return}
  if(!confirm(`${storeMap[store]||store}: 合計${fmtYen(total)}で確定？`)) return;

  const latestByBooth=window._billingLatest||{};
  const prevSnapMap=window._billingPrevSnap||{};
  let totalIn=0,totalOut=0;
  const snapshots=[];
  for(const [bid,cur] of Object.entries(latestByBooth)){
    const prev=prevSnapMap[bid]||{in_meter:0,out_meter:0};
    totalIn+=(Number(cur.in_meter)||0)-prev.in_meter;
    totalOut+=(Number(cur.out_meter)||0)-prev.out_meter;
    snapshots.push({booth_id:bid,in_meter:Number(cur.in_meter)||0,out_meter:Number(cur.out_meter)||0,prize_name:cur.prize_name||''});
  }
  const today=new Date().toISOString().slice(0,10);
  const storeEvents=billingEvents.filter(e=>e.store_code===store).sort((a,b)=>(b.billing_date||'').localeCompare(a.billing_date||''));
  const prevEvent=storeEvents[0]||null;
  const staff=sessionStorage.getItem('clawops_staff_name')||'';

  try{
    const evtRes=await sbPost('billing_events',[{
      store_code:store,billing_date:today,
      period_from:prevEvent?prevEvent.period_to:today,period_to:today,
      total_in_diff:totalIn,total_out_diff:totalOut,total_sales:totalIn*100,
      collected_amount:total,machine_details:details,
      status:'confirmed',created_by:staff,confirmed_at:new Date().toISOString(),confirmed_by:staff
    }]);
    const billingId=evtRes[0]?.billing_id;
    if(billingId&&snapshots.length>0){
      for(let i=0;i<snapshots.length;i+=50) await sbPost('billing_snapshots',snapshots.slice(i,i+50).map(s=>({...s,billing_id:billingId})));
    }
    billingEvents=await sbGet('billing_events','select=*&order=billing_date.desc');
    allSnapshots=await sbGet('billing_snapshots','select=*');
    alert(`集金確定: ${fmtYen(total)}`);
    render();
  }catch(e){alert('エラー: '+e.message)}
}

function generateReport(){
  const store=document.getElementById('storeFilter').value;
  if(!store){alert('店舗を選択');return}
  const mcs=window._billingMCs||[];
  const today=new Date().toISOString().slice(0,10);
  const storeName=storeMap[store]||store;

  // 入力中のデータ or 最新確定データ
  const latest=billingEvents.find(e=>e.store_code===store&&e.status==='confirmed');
  let details,total;
  if(latest&&!mcs.some(mc=>parseInt(document.getElementById('amt_'+mc)?.value||'0')>0)){
    details=latest.machine_details||[];
    total=Number(latest.collected_amount)||0;
  }else{
    details=mcs.map(mc=>({machine_name:machineMap[mc]||mc,collected_amount:parseInt(document.getElementById('amt_'+mc)?.value||'0')||0,note:document.getElementById('note_'+mc)?.value||''}));
    total=details.reduce((s,d)=>s+d.collected_amount,0);
  }

  let text=`【集金報告】${storeName} ${today}\n`;
  details.filter(d=>d.collected_amount>0).forEach(d=>{
    text+=`${d.machine_name}: ¥${(d.collected_amount||0).toLocaleString()}`;
    if(d.note) text+=`（${d.note}）`;
    text+='\n';
  });
  text+=`合計: ¥${total.toLocaleString()}`;

  navigator.clipboard.writeText(text).then(()=>alert('コピーしました')).catch(()=>prompt('コピー:',text));
}

function renderHistory(store){
  const events=billingEvents.filter(e=>e.store_code===store);
  if(!events.length) return '';
  return `<div class="history-section no-print">
    <div style="font-weight:700;font-size:13px;color:var(--text2);margin-bottom:8px">集金履歴</div>
    ${events.map(e=>{
      const details=e.machine_details||[];
      return `<div class="history-item">
        <div style="display:flex;justify-content:space-between">
          <span style="font-weight:700">${e.billing_date}</span>
          <span style="font-weight:800;color:var(--accent)">${fmtYen(e.collected_amount)}</span>
        </div>
        <div style="font-size:11px;color:var(--text2)">${details.map(d=>`${d.machine_name}:${fmtYen(d.collected_amount)}${d.note?' ('+d.note+')':''}`).join(' / ')}</div>
        <button onclick="sbDelete('billing_events','billing_id','${e.billing_id}').then(()=>{billingEvents=billingEvents.filter(x=>x.billing_id!=='${e.billing_id}');render()})" style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;margin-top:4px">削除</button>
      </div>`;
    }).join('')}
  </div>`;
}

loadAll().catch(e=>{document.getElementById('content').innerHTML=`<div style="color:var(--red);padding:20px">エラー: ${esc(e.message)}</div>`});
</script>
</body>
</html>
