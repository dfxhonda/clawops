<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棚卸し移行表 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#1a1a23;--surface2:#22222e;--border:#2e2e3e;--text:#e8e8f0;--text2:#9090a8;--accent:#7c6aff;--green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--cyan:#00b4d8;--orange:#e67e22;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:14px;padding-bottom:60px}
header{background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
header h1{font-size:17px;font-weight:700}
.tabs{display:flex;gap:4px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:9;overflow-x:auto}
.tab{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{display:flex;gap:8px;padding:12px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;text-align:center;flex:1;min-width:80px}
.stat .num{font-size:22px;font-weight:700}
.stat .label{font-size:11px;color:var(--text2)}
.filters{padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px}
.filters input{flex:1;min-width:120px}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer}
.table-wrap{overflow-x:auto;padding:0 4px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
th{background:var(--surface);padding:8px 6px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);position:sticky;top:93px;z-index:5;cursor:pointer;white-space:nowrap;font-size:11px}
th:hover{color:var(--text)}
td{padding:5px 6px;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-match{background:rgba(46,204,113,.15);color:var(--green)}
.b-review{background:rgba(243,156,18,.15);color:var(--yellow)}
.b-unknown{background:rgba(231,76,60,.15);color:var(--red)}
.b-high{color:var(--green)}
.b-medium{color:var(--yellow)}
.b-low{color:var(--red)}
.expand-row{display:none;background:var(--surface)}
.expand-row.open{display:table-row}
.expand-cell{padding:12px;font-size:13px}
.expand-cell .field{margin-bottom:6px}
.expand-cell .field label{color:var(--text2);font-size:11px}
.page-info{padding:8px 12px;font-size:12px;color:var(--text2);text-align:center}
</style>
</head>
<body>
<header><h1>📋 棚卸し移行表</h1></header>
<div class="tabs" id="tabs">
  <div class="tab active" onclick="showTab('draft')">移行表 <span id="draftCount"></span></div>
  <div class="tab" onclick="showTab('review')">要確認 <span id="reviewCount"></span></div>
  <div class="tab" onclick="showTab('dict')">対応辞書 <span id="dictCount"></span></div>
</div>
<div id="statsBar" class="stats"></div>
<div class="filters" id="filtersBar">
  <input type="text" id="searchInput" placeholder="景品名で検索..." oninput="renderTable()">
  <select id="filterStatus" onchange="renderTable()"><option value="">状態：全て</option><option value="一致">一致</option><option value="要確認">要確認</option><option value="不明">不明</option></select>
  <select id="filterSheet" onchange="renderTable()"><option value="">拠点：全て</option></select>
  <button class="btn-sm" onclick="clearFilters()">クリア</button>
</div>
<div class="table-wrap" id="tableWrap"></div>
<div class="page-info" id="pageInfo"></div>

let currentPage = 0;

function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showTab(tab){
  currentTab = tab;
  currentPage = 0;
  sortKey = null;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['draft','review','dict'][i]===tab));
  document.getElementById('filtersBar').style.display = tab==='dict'?'none':'flex';
  renderStats();
  renderTable();
}

function renderStats(){
  const s = DATA.stats;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--text)">${s.total}</div><div class="label">総行数</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${s.matched}</div><div class="label">一致</div></div>
    <div class="stat"><div class="num" style="color:var(--yellow)">${s.review}</div><div class="label">要確認</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${s.unknown}</div><div class="label">不明</div></div>
    <div class="stat"><div class="num" style="color:var(--orange)">${s.gacha}</div><div class="label">高額ガチャ</div></div>`;
  document.getElementById('draftCount').textContent = '('+s.total+')';
  document.getElementById('reviewCount').textContent = '('+DATA.rev_rows.length+')';
  document.getElementById('dictCount').textContent = '('+DATA.dict_rows.length+')';
}

function getRows(){
  if(currentTab==='review') return {headers:DATA.rev_headers, rows:DATA.rev_rows};
  if(currentTab==='dict') return {headers:DATA.dict_headers, rows:DATA.dict_rows};
  return {headers:DATA.headers, rows:DATA.rows};
}

function getFiltered(){
  const {headers, rows} = getRows();
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const st = document.getElementById('filterStatus').value;
  const sh = document.getElementById('filterSheet').value;
  let list = rows;
  if(q) list = list.filter(r => r.some(v => v && String(v).toLowerCase().includes(q)));
  if(st){
    const si = headers.indexOf('確認状態');
    if(si>=0) list = list.filter(r => r[si]===st);
  }
  if(sh){
    const ri = headers.indexOf('拠点') >= 0 ? headers.indexOf('拠点') : 0;
    list = list.filter(r => r[ri]===sh);
  }
  if(sortKey!==null){
    const dir = sortDir==='asc'?1:-1;
    list = list.slice().sort((a,b)=>{
      let av=a[sortKey],bv=b[sortKey];
      if(av==null)av='';if(bv==null)bv='';
      const na=Number(av),nb=Number(bv);
      if(!isNaN(na)&&!isNaN(nb)&&av!==''&&bv!=='') return dir*(na-nb);
      return dir*String(av).localeCompare(String(bv),'ja');
    });
  }
  return {headers, list};
}

function renderTable(){
  const {headers, list} = getFiltered();
  const start = currentPage * PAGE_SIZE;
  const page = list.slice(start, start + PAGE_SIZE);
  const statusIdx = headers.indexOf('確認状態');
  const levelIdx = headers.indexOf('一致度');

  let html = '<table><thead><tr>';
  headers.forEach((h,i) => {
    const arrow = sortKey===i ? (sortDir==='asc'?' ↑':' ↓') : '';
    html += `<th onclick="doSort(${i})">${esc(h)}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';
  page.forEach((r,ri) => {
    html += '<tr onclick="toggleExpand(this)">';
    r.forEach((v,ci) => {
      let cls = '';
      if(ci===statusIdx){
        const badge = v==='一致'?'b-match':v==='要確認'?'b-review':'b-unknown';
        html += `<td><span class="badge ${badge}">${esc(v)}</span></td>`;
      } else if(ci===levelIdx && v){
        const lc = v==='High'?'b-high':v==='Medium'?'b-medium':'b-low';
        html += `<td class="${lc}">${esc(v)}</td>`;
      } else {
        html += `<td title="${esc(v)}">${esc(v)}</td>`;
      }
    });
    html += '</tr>';
    // 展開行
    html += `<tr class="expand-row"><td colspan="${headers.length}" class="expand-cell">`;
    headers.forEach((h,ci) => {
      if(r[ci]) html += `<div class="field"><label>${esc(h)}:</label> ${esc(r[ci])}</div>`;
    });
    html += '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
  document.getElementById('pageInfo').textContent = `${start+1}〜${Math.min(start+PAGE_SIZE, list.length)} / ${list.length}件` +
    (list.length > PAGE_SIZE ? ` | ページ: ${Array.from({length:Math.ceil(list.length/PAGE_SIZE)},(_, i)=>
      `<a href="#" onclick="goPage(${i});return false" style="color:${i===currentPage?'var(--accent)':'var(--text2)'};margin:0 4px">${i+1}</a>`).join('')}` : '');
}

function doSort(col){
  if(sortKey===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortKey=col; sortDir='asc'; }
  renderTable();
}
function goPage(p){currentPage=p;renderTable();window.scrollTo(0,0)}
function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('filterStatus').value='';
  document.getElementById('filterSheet').value='';
  sortKey=null;currentPage=0;renderTable();
}
function toggleExpand(tr){
  const next = tr.nextElementSibling;
  if(next && next.classList.contains('expand-row')) next.classList.toggle('open');
}

const sf = document.getElementById('filterSheet');
sheets.forEach(s => { const o=document.createElement('option');o.value=s;o.textContent=s;sf.appendChild(o) });

</script>
