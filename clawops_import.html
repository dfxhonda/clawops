function log(msg, cls='') {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = new Date().toLocaleTimeString() + ' ' + msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = '<div class="status ' + type + '">' + msg + '</div>';
}

async function doAuth() {
  log('Google OAuth 認証開始...');
  const redirectUri = window.location.origin + window.location.pathname;
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
    'client_id=' + CLIENT_ID +
    '&redirect_uri=' + encodeURIComponent(redirectUri) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(SCOPES);

  // Check if token is in URL hash
  if (window.location.hash) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const t = params.get('access_token');
    if (t) {
      token = t;
      setStatus('auth-status', '✅ 認証済み', 'ok');
      log('OAuth トークン取得成功');
      enableButtons();
      return;
    }
  }

  window.location.href = authUrl;
}

function enableButtons() {
  document.getElementById('btn-check').disabled = false;
  document.getElementById('btn-write-stores').disabled = false;
  document.getElementById('btn-write-machines').disabled = false;
  document.getElementById('btn-write-booths').disabled = false;
  document.getElementById('btn-write-prizes').disabled = false;
  document.getElementById('btn-write-all').disabled = false;
}

async function sheetsGet(range) {
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error('API error: ' + res.status);
  return (await res.json()).values || [];
}

async function sheetsClear(range) {
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`,
    { method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({}) }
  );
  if (!res.ok) throw new Error('Clear error: ' + res.status);
}

async function sheetsPut(range, values) {
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
    { method: 'PUT', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values }) }
  );
  if (!res.ok) {
    const txt = await res.text();
    throw new Error('PUT error: ' + res.status + ' ' + txt);
  }
}

async function checkSheets() {
  log('シート状態を確認中...');
  try {
    const sheets = ['stores', 'machines', 'booths', 'prizes'];
    let html = '<table><tr><th>シート</th><th>現在行数</th><th>インポート行数</th><th>状態</th></tr>';
    for (const s of sheets) {
      const rows = await sheetsGet(s + '!A:A');
      const current = Math.max(0, rows.length - 1); // ヘッダー除く
      const target = DATA[s].length;
      const status = current === 0 ? '🟢 空' : '🟡 データあり (' + current + '行)';
      html += `<tr><td>${s}</td><td>${current}</td><td>${target}</td><td>${status}</td></tr>`;
      log(`${s}: 現在${current}行 → ${target}行にインポート予定`);
    }
    html += '</table>';
    setStatus('check-status', html, 'info');
  } catch(e) {
    log('エラー: ' + e.message, 'warn');
    setStatus('check-status', '❌ ' + e.message, 'error');
  }
}

async function writeSheet(name) {
  const btn = document.getElementById('btn-write-' + name);
  btn.disabled = true;
  btn.textContent = name + ' 書込中...';
  log(`${name} シートに書込中...`);

  try {
    // データクリア（ヘッダー以降）
    await sheetsClear(name + '!A2:Z');
    log(`${name}: 既存データクリア完了`);

    // データ書き込み（バッチ）
    const rows = DATA[name];
    const BATCH = 500;
    for (let i = 0; i < rows.length; i += BATCH) {
      const batch = rows.slice(i, i + BATCH);
      const startRow = i + 2;
      const endRow = startRow + batch.length - 1;
      const range = `${name}!A${startRow}:Z${endRow}`;
      await sheetsPut(range, batch);
      log(`${name}: ${Math.min(i + BATCH, rows.length)}/${rows.length} 行書込完了`);
    }

    btn.textContent = name + ' ✅ 完了';
    btn.className = 'success';
    log(`✅ ${name}: ${rows.length}行の書込完了`);
    setStatus('write-status',
      (document.getElementById('write-status').innerHTML || '') +
      `<div class="status ok">✅ ${name}: ${rows.length}行完了</div>`, '');
  } catch(e) {
    log('❌ エラー: ' + e.message, 'warn');
    btn.textContent = name + ' ❌ エラー';
    btn.disabled = false;
    setStatus('write-status',
      (document.getElementById('write-status').innerHTML || '') +
      `<div class="status error">❌ ${name}: ${e.message}</div>`, '');
  }
}

async function writeAll() {
  const btn = document.getElementById('btn-write-all');
  btn.disabled = true;
  btn.textContent = '一括書込中...';
  log('=== 全シート一括書込開始 ===');

  for (const name of ['stores', 'machines', 'booths', 'prizes']) {
    await writeSheet(name);
  }

  btn.textContent = '✅ 全シート完了';
  btn.className = 'success';
  log('=== 全シート一括書込完了 ===');
}

// ページ読み込み時にハッシュからトークン取得を試みる
window.addEventListener('load', () => {
  if (window.location.hash) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const t = params.get('access_token');
    if (t) {
      token = t;
      setStatus('auth-status', '✅ 認証済み', 'ok');
      log('OAuth トークン自動取得成功');
      enableButtons();
      // ハッシュをクリア
      history.replaceState(null, '', window.location.pathname);
    }
  }
});
