<h2>画像管理 — 利用シーンの確認</h2>
<p class="subtitle">想定する使い方をすべて選んでください（複数OK）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>現調写真の記録</h3>
      <p>新規設置・レイアウト変更前に現場を撮影 → 後で参照・共有</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>設置希望リストのスキャン取込</h3>
      <p>紙の設置希望リストをスマホで撮影 → Claude Code に読ませてデータ化</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>景品パッケージ写真</h3>
      <p>景品の外箱・中身を撮影 → 景品マスタや案内に紐付け</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>Claude Code への画像指示</h3>
      <p>スクショやデザインカンプを添付して「この通りに作って」と指示</p>
    </div>
  </div>
  <div class="option" data-choice="e" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>その他（ターミナルで教えてください）</h3>
      <p>上記以外の使い方がある場合</p>
    </div>
  </div>
</div>
