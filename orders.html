<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawOps - 発注履歴</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Hiragino Sans',sans-serif; background:#1a1a2e; color:#eee; }
.app { display:flex; flex-direction:column; height:100vh; }
.header { background:#16213e; padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #0f3460; }
.header h1 { font-size:18px; color:#00d2ff; white-space:nowrap; }
.header .count { font-size:13px; color:#aaa; }
.main { display:flex; flex:1; overflow:hidden; }
.list-pane { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.detail-pane { width:400px; background:#16213e; border-left:1px solid #0f3460; overflow-y:auto; display:none; }
.detail-pane.open { display:block; }
.search-bar { padding:10px 12px; background:#16213e; display:flex; gap:8px; flex-wrap:wrap; align-items:center; border-bottom:1px solid #0f3460; }
.search-bar input[type=text] { flex:1; min-width:140px; padding:8px 12px; border-radius:6px; border:1px solid #333; background:#0a0a1a; color:#eee; font-size:14px; }
.search-bar input[type=date] { padding:7px 10px; border-radius:6px; border:1px solid #333; background:#0a0a1a; color:#eee; font-size:13px; }
.search-bar select { padding:8px 10px; border-radius:6px; border:1px solid #333; background:#0a0a1a; color:#eee; font-size:13px; }
.btn { border:none; padding:7px 14px; border-radius:6px; font-size:13px; cursor:pointer; white-space:nowrap; }
.btn-primary { background:#e94560; color:#fff; }
.btn-primary:hover { background:#c62a4a; }
.btn-success { background:#00b894; color:#fff; }
.btn-success:hover { background:#009b7d; }
.btn-ghost { background:transparent; color:#aaa; border:1px solid #444; }
.btn-ghost:hover { background:#333; color:#eee; }
.btn-warn { background:#e17055; color:#fff; }
.btn-warn:hover { background:#c0392b; }
.btn-blue { background:#0984e3; color:#fff; }
.btn-blue:hover { background:#0770c0; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.table-wrap { flex:1; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead { position:sticky; top:0; z-index:1; }
th { background:#0f3460; padding:8px 8px; text-align:left; font-weight:600; cursor:pointer; user-select:none; font-size:12px; }
th:hover { background:#1a4a8a; }
td { padding:5px 8px; border-bottom:1px solid #1e1e3a; }
tr:hover { background:#1e1e3a; }
tr.selected { background:#0f3460; }
.cost { text-align:right; font-variant-numeric:tabular-nums; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; }
.badge-arrived { background:#00b89433; color:#00b894; }
.badge-ordered { background:#0984e333; color:#74b9ff; }
.badge-shipped { background:#fdcb6e33; color:#fdcb6e; }
.badge-cancelled { background:#e9456033; color:#e94560; }
.badge-warn { background:#e17055; color:#fff; font-size:10px; }
.detail-pane h2 { padding:14px 16px; font-size:16px; color:#00d2ff; border-bottom:1px solid #0f3460; display:flex; justify-content:space-between; align-items:center; }
.detail-pane h2 .close-btn { cursor:pointer; font-size:20px; color:#aaa; background:none; border:none; }
.detail-pane h2 .close-btn:hover { color:#fff; }
.field { padding:6px 16px; }
.field label { display:block; font-size:11px; color:#888; margin-bottom:3px; }
.field input, .field select, .field textarea { width:100%; padding:8px 10px; border-radius:6px; border:1px solid #333; background:#0a0a1a; color:#eee; font-size:14px; }
.field textarea { min-height:50px; resize:vertical; }
.field input:focus, .field select:focus { border-color:#00d2ff; outline:none; }
.field .error { font-size:11px; color:#e94560; margin-top:2px; }
.field-row { display:flex; gap:8px; }
.field-row .field { flex:1; padding-left:0; padding-right:0; }
.field-row { padding:6px 16px; }
.detail-actions { padding:12px 16px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid #0f3460; }
.summary-bar { display:flex; gap:16px; padding:8px 16px; background:#0f3460; flex-wrap:wrap; }
.summary-bar .item { text-align:center; }
.summary-bar .num { font-size:20px; color:#e94560; font-weight:bold; }
.summary-bar .label { font-size:11px; color:#aaa; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 24px; border-radius:8px; font-size:14px; z-index:100; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast-ok { background:#00b894; color:#fff; }
.toast-err { background:#e94560; color:#fff; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:none; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#16213e; border-radius:12px; padding:20px; max-width:360px; width:90%; }
.modal h3 { color:#00d2ff; margin-bottom:12px; }
.modal p { font-size:14px; margin-bottom:16px; color:#ccc; }
.modal .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid #333; border-top:2px solid #00d2ff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
@media(max-width:768px) {
  .main { flex-direction:column; }
  .detail-pane { width:100%; border-left:none; border-top:1px solid #0f3460; max-height:50vh; }
  .header h1 { font-size:15px; }
  .field-row { flex-direction:column; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>発注履歴</h1>
    <span class="count" id="totalCount">読込中...</span>
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="startAdd()">+ 発注を追加</button>
  </div>

  <div class="summary-bar">
    <div class="item"><div class="num" id="sumTotal">-</div><div class="label">総件数</div></div>
    <div class="item"><div class="num" id="sumArrived">-</div><div class="label">入荷済</div></div>
    <div class="item"><div class="num" id="sumOrdered">-</div><div class="label">発注中</div></div>
    <div class="item"><div class="num" id="sumNoLink">-</div><div class="label">未紐付</div></div>
  </div>

  <div class="main">
    <div class="list-pane">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="景品名・発注IDで検索..." oninput="doSearch()">
        <select id="filterSupplier" onchange="doSearch()">
          <option value="">全仕入先</option>
        </select>
        <select id="filterStatus" onchange="doSearch()">
          <option value="">全状態</option>
          <option value="ordered">発注済み</option>
          <option value="shipped">発送済み</option>
          <option value="arrived">入荷済み</option>
          <option value="cancelled">取消</option>
        </select>
        <input type="date" id="filterDateFrom" onchange="doSearch()" title="発注日From">
        <input type="date" id="filterDateTo" onchange="doSearch()" title="発注日To">
        <button class="btn btn-ghost" onclick="clearSearch()">クリア</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('order_date')" style="width:85px">発注日</th>
              <th onclick="sortBy('prize_name')">景品名</th>
              <th onclick="sortBy('supplier_id')" style="width:80px">仕入先</th>
              <th onclick="sortBy('case_quantity')" style="width:55px">入数</th>
              <th onclick="sortBy('case_count')" style="width:45px">箱数</th>
              <th onclick="sortBy('unit_cost')" style="width:70px">個単価</th>
              <th onclick="sortBy('status')" style="width:65px">状態</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="detail-pane" id="detailPane">
      <h2>
        <span id="detailTitle">発注詳細</span>
        <button class="close-btn" onclick="closeDetail()">&times;</button>
      </h2>
      <div class="field">
        <label>発注ID</label>
        <input type="text" id="fOrderId" readonly style="color:#888">
      </div>
      <div class="field-row">
        <div class="field">
          <label>発注日</label>
          <input type="date" id="fOrderDate" onchange="markDirty()">
        </div>
        <div class="field">
          <label>納期</label>
          <input type="date" id="fExpectedDate" onchange="markDirty()">
        </div>
      </div>
      <div class="field">
        <label>仕入先</label>
        <select id="fSupplier" onchange="markDirty()"></select>
      </div>
      <div class="field">
        <label>景品名</label>
        <div id="linkedPrize" style="font-size:14px;padding:8px 10px;background:#0a0a1a;border-radius:6px;border:1px solid #333;min-height:36px"></div>
        <input type="hidden" id="fPrizeId">
        <details style="margin-top:6px">
          <summary style="font-size:11px;color:#666;cursor:pointer">景品を変更する / 元データ名を見る</summary>
          <div style="margin-top:6px">
            <input type="text" id="fPrizeSearch" placeholder="景品名で検索..." oninput="searchPrize(this.value)" style="font-size:13px">
            <div id="prizeResults" style="max-height:120px;overflow-y:auto;margin-top:4px"></div>
          </div>
          <div style="margin-top:6px">
            <label style="font-size:11px;color:#888">元データ名</label>
            <input type="text" id="fPrizeNameRaw" oninput="markDirty()" style="font-size:12px;color:#888">
          </div>
        </details>
      </div>
      <div class="field-row">
        <div class="field">
          <label>入数</label>
          <input type="number" id="fCaseQty" min="1" oninput="calcUnit(); markDirty()">
        </div>
        <div class="field">
          <label>箱数</label>
          <input type="number" id="fCaseCount" min="1" oninput="markDirty()">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>箱単価</label>
          <input type="number" id="fCaseCost" min="0" oninput="calcUnit(); markDirty()">
        </div>
        <div class="field">
          <label>個単価</label>
          <input type="number" id="fUnitCost" min="0" oninput="markDirty()">
          <div class="error" id="errCost"></div>
        </div>
      </div>
      <div class="field">
        <label>入荷先</label>
        <input type="text" id="fDestination" oninput="markDirty()">
      </div>
      <div class="field">
        <label>状態</label>
        <select id="fOrderStatus" onchange="markDirty()">
          <option value="ordered">発注済み</option>
          <option value="shipped">発送済み</option>
          <option value="arrived">入荷済み</option>
          <option value="cancelled">取消</option>
        </select>
      </div>
      <div class="field">
        <label>メモ</label>
        <textarea id="fNotes" oninput="markDirty()"></textarea>
      </div>
      <div class="detail-actions">
        <button class="btn btn-success" id="btnSave" onclick="saveOrder()" disabled>保存</button>
        <button class="btn btn-blue" id="btnArrive" onclick="markArrived()">入荷済みにする</button>
        <button class="btn btn-warn" id="btnCancel" onclick="markCancelled()">取消にする</button>
        <button class="btn btn-ghost" id="btnRevert" onclick="revertChanges()" disabled>取り消す</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">確認</h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalOk">OK</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gedxzunoyzmvbqgwjalx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZHh6dW5veXptdmJxZ3dqYWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDgwNTgsImV4cCI6MjA4OTcyNDA1OH0.J2rH4L6zXStwdNikIUIzPRnyKTVPhy0J5lGtqN1QCHI';

let allOrders = [];
let prizes = [];
let suppliers = [];
let filtered = [];
let selectedId = null;
let original = null;
let isDirty = false;
let isNewMode = false;
let sortCol = 'order_date';
let sortAsc = false;

// supplier_id→名前のフォールバック（API失敗時用）
const SUPPLIER_NAMES = {
  SGP: '景品フォーム', PCH: 'ピーチトイ', SDY: 'エスディーワイ',
  INF: 'インフィニティ', AXS: 'アクシズ', LNS: 'LINE仕入先', MCR: 'メルカリ'
};
function supplierName(id) {
  const s = suppliers.find(x => x.supplier_id === id);
  return s ? s.supplier_name : (SUPPLIER_NAMES[id] || id || '');
}

async function api(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
    },
    ...opts,
  });
  if (!res.ok) throw new Error(`API error ${res.status}: ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function init() {
  try {
    const [orders, pz, sups] = await Promise.all([
      api('prize_orders?select=*&order=order_date.desc'),
      api('prize_masters?select=prize_id,prize_name,original_cost,supplier_id,aliases&order=prize_name'),
      api('suppliers?select=supplier_id,supplier_name&order=supplier_name'),
    ]);
    allOrders = orders;
    prizes = pz;
    suppliers = sups;
    populateFilters();
    doSearch();
    updateSummary();
  } catch (e) {
    showToast('データ読込失敗: ' + e.message, true);
  }
}

function populateFilters() {
  const sf = document.getElementById('filterSupplier');
  const fd = document.getElementById('fSupplier');
  fd.innerHTML = '<option value="">未設定</option>';
  const supList = suppliers.length > 0 ? suppliers
    : Object.entries(SUPPLIER_NAMES).map(([id, name]) => ({ supplier_id: id, supplier_name: name }));
  supList.forEach(s => {
    sf.innerHTML += `<option value="${s.supplier_id}">${s.supplier_name}</option>`;
    fd.innerHTML += `<option value="${s.supplier_id}">${s.supplier_name}</option>`;
  });
}

function updateSummary() {
  document.getElementById('sumTotal').textContent = allOrders.length;
  document.getElementById('sumArrived').textContent = allOrders.filter(o => o.status === 'arrived').length;
  document.getElementById('sumOrdered').textContent = allOrders.filter(o => o.status === 'ordered' || o.status === 'shipped').length;
  document.getElementById('sumNoLink').textContent = allOrders.filter(o => !o.prize_id).length;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sup = document.getElementById('filterSupplier').value;
  const st = document.getElementById('filterStatus').value;
  const df = document.getElementById('filterDateFrom').value;
  const dt = document.getElementById('filterDateTo').value;

  filtered = allOrders.filter(o => {
    if (sup && o.supplier_id !== sup) return false;
    if (st && o.status !== st) return false;
    if (df && o.order_date < df) return false;
    if (dt && o.order_date > dt) return false;
    if (q) {
      const pz = prizes.find(p => p.prize_id === o.prize_id);
      const pname = pz ? pz.prize_name : (o.prize_name_raw || '');
      const nm = pname.toLowerCase().includes(q);
      const raw = (o.prize_name_raw || '').toLowerCase().includes(q);
      const id = (o.order_id || '').toLowerCase().includes(q);
      const pid = (o.prize_id || '').toLowerCase().includes(q);
      if (!nm && !raw && !id && !pid) return false;
    }
    return true;
  });

  sortList();
  renderTable();
  document.getElementById('totalCount').textContent = `${filtered.length} / ${allOrders.length}件`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterSupplier').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  doSearch();
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col === 'order_date' ? false : true; }
  sortList();
  renderTable();
}

function sortList() {
  filtered.sort((a, b) => {
    let va, vb;
    if (sortCol === 'prize_name') {
      va = prizeName(a); vb = prizeName(b);
    } else if (sortCol === 'supplier_id') {
      va = supplierName(a.supplier_id); vb = supplierName(b.supplier_id);
    } else {
      va = a[sortCol]; vb = b[sortCol];
    }
    if (['case_quantity','case_count','unit_cost','case_cost'].includes(sortCol)) {
      va = Number(va) || 0; vb = Number(vb) || 0;
    } else { va = (va || '').toString().toLowerCase(); vb = (vb || '').toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#666">該当する発注がありません</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(o => {
    const statusCls = { arrived:'badge-arrived', ordered:'badge-ordered', shipped:'badge-shipped', cancelled:'badge-cancelled' }[o.status] || '';
    const statusLabel = { arrived:'入荷済', ordered:'発注済', shipped:'発送済', cancelled:'取消' }[o.status] || o.status;
    const noLink = !o.prize_id ? ' <span class="badge badge-warn">未紐付</span>' : '';
    const date = o.order_date ? formatDate(o.order_date) : '';
    return `<tr class="${o.order_id === selectedId ? 'selected' : ''}" onclick="selectOrder('${o.order_id}')">
      <td style="font-size:12px">${date}</td>
      <td>${esc(prizeName(o))}${noLink}</td>
      <td style="font-size:12px">${esc(supplierName(o.supplier_id))}</td>
      <td class="cost">${o.case_quantity || ''}</td>
      <td class="cost">${o.case_count || ''}</td>
      <td class="cost">&yen;${Number(o.unit_cost || 0).toLocaleString()}</td>
      <td><span class="badge ${statusCls}">${statusLabel}</span></td>
    </tr>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, dd] = d.split('-');
  return `${y.slice(2)}.${m}.${dd}`;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function prizeName(o) {
  const pz = prizes.find(p => p.prize_id === o.prize_id);
  return pz ? pz.prize_name : (o.prize_name_raw || '');
}

// --- Select ---
function selectOrder(id) {
  if (isDirty && selectedId !== id) {
    showConfirm('未保存の変更', '変更を破棄しますか？', () => { isDirty = false; doSelect(id); });
    return;
  }
  doSelect(id);
}

function doSelect(id) {
  isNewMode = false;
  selectedId = id;
  const o = allOrders.find(x => x.order_id === id);
  if (!o) return;
  original = JSON.parse(JSON.stringify(o));
  fillDetail(o);
  document.getElementById('detailPane').classList.add('open');
  document.getElementById('detailTitle').textContent = '発注詳細';
  isDirty = false;
  updateSaveBtn();
  renderTable();
}

function fillDetail(o) {
  document.getElementById('fOrderId').value = o.order_id || '';
  document.getElementById('fOrderDate').value = o.order_date || '';
  document.getElementById('fExpectedDate').value = o.expected_date || '';
  document.getElementById('fSupplier').value = o.supplier_id || '';
  document.getElementById('fPrizeId').value = o.prize_id || '';
  document.getElementById('fPrizeNameRaw').value = o.prize_name_raw || '';
  document.getElementById('fCaseQty').value = o.case_quantity || '';
  document.getElementById('fCaseCount').value = o.case_count || '';
  document.getElementById('fCaseCost').value = o.case_cost || '';
  document.getElementById('fUnitCost').value = o.unit_cost || '';
  document.getElementById('fDestination').value = o.destination || '';
  document.getElementById('fOrderStatus').value = o.status || 'ordered';
  document.getElementById('fNotes').value = o.notes || '';
  document.getElementById('fPrizeSearch').value = '';
  document.getElementById('prizeResults').innerHTML = '';
  document.getElementById('errCost').textContent = '';

  const pz = prizes.find(p => p.prize_id === o.prize_id);
  document.getElementById('linkedPrize').innerHTML = pz
    ? `${esc(pz.prize_name)} <span style="color:#888;font-size:12px">${o.prize_id}</span>`
    : (o.prize_name_raw ? esc(o.prize_name_raw) + ' <span style="color:#e94560;font-size:11px">未紐付け</span>' : '<span style="color:#e94560">未紐付け</span>');
}

function searchPrize(q) {
  const container = document.getElementById('prizeResults');
  if (!q || q.length < 2) { container.innerHTML = ''; return; }
  q = q.toLowerCase();
  const hits = prizes.filter(p =>
    p.prize_name.toLowerCase().includes(q) || p.prize_id.toLowerCase().includes(q)
  ).slice(0, 10);
  container.innerHTML = hits.map(p =>
    `<div style="padding:4px 8px;cursor:pointer;font-size:12px;border-bottom:1px solid #1e1e3a"
      onmouseover="this.style.background='#0f3460'" onmouseout="this.style.background=''"
      onclick="linkPrize('${p.prize_id}')">
      ${esc(p.prize_name)} <span style="color:#888">${p.prize_id} &yen;${Number(p.original_cost||0).toLocaleString()}</span>
    </div>`
  ).join('');
}

function linkPrize(pid) {
  document.getElementById('fPrizeId').value = pid;
  const pz = prizes.find(p => p.prize_id === pid);
  document.getElementById('linkedPrize').innerHTML = pz
    ? `${esc(pz.prize_name)} <span style="color:#888;font-size:12px">${pid}</span>`
    : '';
  document.getElementById('prizeResults').innerHTML = '';
  document.getElementById('fPrizeSearch').value = '';
  markDirty();
}

function calcUnit() {
  const caseCost = Number(document.getElementById('fCaseCost').value) || 0;
  const caseQty = Number(document.getElementById('fCaseQty').value) || 0;
  if (caseCost > 0 && caseQty > 0) {
    document.getElementById('fUnitCost').value = Math.round(caseCost / caseQty);
  }
}

// --- New ---
function startAdd() {
  if (isDirty) {
    showConfirm('未保存の変更', '破棄して新規追加しますか？', () => { isDirty = false; doStartAdd(); });
    return;
  }
  doStartAdd();
}

function doStartAdd() {
  isNewMode = true;
  const newId = 'ORD-' + Date.now();
  selectedId = newId;
  const o = {
    order_id: newId, prize_id: null, prize_name_raw: '', supplier_id: '',
    order_date: new Date().toISOString().slice(0,10), expected_date: null,
    case_quantity: null, case_count: 1, case_cost: null, unit_cost: null,
    destination: '', status: 'ordered', notes: ''
  };
  allOrders.unshift(o);
  original = JSON.parse(JSON.stringify(o));
  fillDetail(o);
  document.getElementById('detailPane').classList.add('open');
  document.getElementById('detailTitle').textContent = '発注を追加';
  isDirty = true;
  updateSaveBtn();
}

// --- Save ---
async function saveOrder() {
  document.getElementById('errCost').textContent = '';
  const unitCost = document.getElementById('fUnitCost').value;
  if (!unitCost && unitCost !== 0) {
    document.getElementById('errCost').textContent = '単価が入っていません';
    return;
  }

  const body = {
    prize_id: document.getElementById('fPrizeId').value || null,
    prize_name_raw: document.getElementById('fPrizeNameRaw').value.trim() || null,
    supplier_id: document.getElementById('fSupplier').value || null,
    order_date: document.getElementById('fOrderDate').value || null,
    expected_date: document.getElementById('fExpectedDate').value || null,
    case_quantity: Number(document.getElementById('fCaseQty').value) || null,
    case_count: Number(document.getElementById('fCaseCount').value) || null,
    case_cost: Number(document.getElementById('fCaseCost').value) || null,
    unit_cost: Number(unitCost),
    destination: document.getElementById('fDestination').value.trim() || null,
    status: document.getElementById('fOrderStatus').value,
    notes: document.getElementById('fNotes').value.trim() || null,
    updated_at: new Date().toISOString(),
  };

  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').innerHTML = '<span class="spinner"></span>';

  try {
    if (isNewMode) {
      body.order_id = selectedId;
      body.created_at = new Date().toISOString();
      const [created] = await api('prize_orders', { method: 'POST', body: JSON.stringify(body) });
      const o = allOrders.find(x => x.order_id === selectedId);
      if (o) Object.assign(o, created);
      showToast('発注を追加しました');
    } else {
      const [updated] = await api(`prize_orders?order_id=eq.${selectedId}`, { method: 'PATCH', body: JSON.stringify(body) });
      const o = allOrders.find(x => x.order_id === selectedId);
      if (o) Object.assign(o, updated);
      showToast('保存しました');
    }
    isNewMode = false;
    isDirty = false;
    original = JSON.parse(JSON.stringify(allOrders.find(x => x.order_id === selectedId)));
    doSearch();
    updateSummary();
    updateSaveBtn();
  } catch (e) {
    showToast('保存失敗: ' + e.message, true);
  }
  document.getElementById('btnSave').textContent = '保存';
}

function markArrived() {
  showConfirm('入荷確認', 'この発注を入荷済みにしますか？', async () => {
    try {
      await api(`prize_orders?order_id=eq.${selectedId}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'arrived', arrived_at: new Date().toISOString(), updated_at: new Date().toISOString() }),
      });
      const o = allOrders.find(x => x.order_id === selectedId);
      if (o) { o.status = 'arrived'; o.arrived_at = new Date().toISOString(); }
      document.getElementById('fOrderStatus').value = 'arrived';
      doSearch(); updateSummary();
      showToast('入荷済みにしました');
    } catch (e) { showToast('操作失敗: ' + e.message, true); }
  });
}

function markCancelled() {
  showConfirm('取消確認', 'この発注を取消にしますか？', async () => {
    try {
      await api(`prize_orders?order_id=eq.${selectedId}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'cancelled', updated_at: new Date().toISOString() }),
      });
      const o = allOrders.find(x => x.order_id === selectedId);
      if (o) o.status = 'cancelled';
      document.getElementById('fOrderStatus').value = 'cancelled';
      doSearch(); updateSummary();
      showToast('取消にしました');
    } catch (e) { showToast('操作失敗: ' + e.message, true); }
  });
}

function revertChanges() {
  if (isNewMode) {
    allOrders = allOrders.filter(o => o.order_id !== selectedId);
    doCloseDetail(); doSearch(); return;
  }
  const o = allOrders.find(x => x.order_id === selectedId);
  if (o && original) Object.assign(o, JSON.parse(JSON.stringify(original)));
  fillDetail(o);
  isDirty = false;
  updateSaveBtn();
}

function closeDetail() {
  if (isDirty) { showConfirm('未保存の変更', '変更を破棄しますか？', () => { isDirty = false; doCloseDetail(); }); return; }
  doCloseDetail();
}

function doCloseDetail() {
  document.getElementById('detailPane').classList.remove('open');
  selectedId = null; isNewMode = false; isDirty = false;
  renderTable();
}

function markDirty() { isDirty = true; updateSaveBtn(); }
function updateSaveBtn() {
  document.getElementById('btnSave').disabled = !isDirty;
  document.getElementById('btnRevert').disabled = !isDirty;
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${isErr ? 'toast-err' : 'toast-ok'}`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

let modalCallback = null;
function showConfirm(title, msg, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('open');
  modalCallback = cb;
  document.getElementById('modalOk').onclick = () => { closeModal(); if (modalCallback) modalCallback(); };
}
function closeModal() { document.getElementById('confirmModal').classList.remove('open'); modalCallback = null; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmModal').classList.contains('open')) closeModal();
    else if (document.getElementById('detailPane').classList.contains('open')) closeDetail();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (isDirty) saveOrder(); }
});

init();
</script>
</body>
</html>
