<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>マスタ管理 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --radius:10px;
  --nav-h:58px;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h)+env(safe-area-inset-bottom))}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header-title{font-size:18px;font-weight:700;letter-spacing:.5px;flex:1}
.header-badge{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:20px}

/* Tabs */
.tabs{display:flex;gap:4px}
.tab-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;font-weight:600;padding:8px 4px;cursor:pointer;transition:all .15s;text-align:center}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Main content */
main{padding:14px}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;cursor:pointer}
.filter-row select:focus{border-color:var(--accent)}

/* Add button */
.btn-add{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s}
.btn-add:hover{background:var(--accent2)}

/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,106,255,.06)}

/* Sortable header */
.th-sort{cursor:pointer;user-select:none;transition:color .15s}
.th-sort:hover{color:var(--text)}
.sort-arrow{margin-left:4px;font-size:10px}

.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-green{background:rgba(46,204,113,.15);color:var(--green)}
.badge-yellow{background:rgba(243,156,18,.15);color:var(--yellow)}
.badge-blue{background:rgba(124,106,255,.15);color:var(--accent)}
.badge-cyan{background:rgba(0,180,216,.15);color:var(--cyan)}

/* Action buttons */
.btn-row{display:flex;gap:6px}
.btn-edit,.btn-del{border:1px solid var(--border);border-radius:6px;font-size:12px;padding:4px 10px;cursor:pointer;transition:all .15s}
.btn-edit{background:var(--surface2);color:var(--text2)}
.btn-edit:hover{border-color:var(--accent);color:var(--accent)}
.btn-del{background:var(--surface2);color:var(--text2)}
.btn-del:hover{border-color:var(--red);color:var(--red)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;padding:20px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-save{flex:1;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;padding:11px;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent2)}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;padding:11px;cursor:pointer}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}

/* Count */
.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.count-text{font-size:12px;color:var(--text2)}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}

/* Bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);text-decoration:none;font-size:10px;padding:4px 8px;border-radius:8px;cursor:pointer;transition:color .15s;background:none;border:none}
.nav-item.active,.nav-item:hover{color:var(--accent)}
.nav-icon{font-size:20px}

@media(min-width:768px){
  main{max-width:900px;margin:0 auto}
  .modal{max-width:520px}
  table{min-width:600px}
}
</style>
</head>

function machineName(id){ const m=machines.find(x=>x.id===id); return m?m.machine_name:id; }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function genId(prefix){ return prefix+Date.now().toString(36).toUpperCase(); }
function regionBadge(r){
  const map={'熊本':'badge-green','鹿児島':'badge-blue','長崎':'badge-cyan','宮崎':'badge-yellow'};

  return `<span class="badge ${cls}">${esc(r||'—')}</span>`;
}

  const s = tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col===col) s.dir=s.dir==='desc'?'asc':'desc';
  else { s.col=col; s.dir='desc'; }
  render();
}
function sortArrow(tab, col){
  const s = tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col!==col) return `<span class="sort-arrow" style="opacity:.3">⇅</span>`;
  return s.dir==='desc'
    ? `<span class="sort-arrow" style="color:var(--accent)">↓</span>`
    : `<span class="sort-arrow" style="color:var(--accent)">↑</span>`;
}
function cmp(av,bv,dir){
  if(av==null) av='';
  if(bv==null) bv='';
  let r = (typeof av==='number'&&typeof bv==='number') ? av-bv : String(av).localeCompare(String(bv),'ja');
  return dir==='desc'?-r:r;
}
function applySortStores(list){
  const s=storeSort;
  if(!s.col) return [...list].sort((a,b)=>a.sort_order-b.sort_order);
  return [...list].sort((a,b)=>{
    if(s.col==='machine_count') return cmp(machines.filter(m=>m.store_id===a.id).length, machines.filter(m=>m.store_id===b.id).length, s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortMachines(list){
  const s=machineSort;
  if(!s.col) return [...list].sort((a,b)=>a.machine_code.localeCompare(b.machine_code));
  return [...list].sort((a,b)=>{
    if(s.col==='booth_count') return cmp(booths.filter(x=>x.machine_id===a.id).length, booths.filter(x=>x.machine_id===b.id).length, s.dir);
    if(s.col==='store_name') return cmp(storeName(a.store_id),storeName(b.store_id),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortBooths(list){
  const s=boothSort;
  if(!s.col) return [...list].sort((a,b)=>a.booth_code.localeCompare(b.booth_code));
  return [...list].sort((a,b)=>{
    if(s.col==='store_name') return cmp(storeName(machineStore(a.machine_id)),storeName(machineStore(b.machine_id)),s.dir);
    if(s.col==='machine_name') return cmp(machineName(a.machine_id),machineName(b.machine_id),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('mainContent');
  if(currentTab==='stores') el.innerHTML=renderStores();
  else if(currentTab==='machines') el.innerHTML=renderMachines();
  else el.innerHTML=renderBooths();
}

function th(tab,col,label){
  return `<th class="th-sort" onclick="toggleSort('${tab}','${col}')">${label}${sortArrow(tab,col)}</th>`;
}

function renderStores(){
  const sorted=applySortStores(stores);
  document.getElementById('headerBadge').textContent=stores.length+'店舗';
  let rows=sorted.map(s=>`
<tr data-id="${s.id}">
  <td><strong>${esc(s.store_name)}</strong></td>
  <td>${regionBadge(s.region)}</td>
  <td><code style="font-size:11px;color:var(--text2)">${esc(s.store_code)}</code></td>
  <td style="font-size:12px;color:var(--text2)">${esc(s.opened_at||'—')}</td>
  <td>${esc(s.manager||'—')}</td>
  <td>${machines.filter(m=>m.store_id===s.id).length}台</td>
  <td><div class="btn-row"><button class="btn-edit" onclick="editStore('${s.id}')">編集</button><button class="btn-del" onclick="delStore('${s.id}')">削除</button></div></td>
</tr>`).join('');
  return `
<div class="count-row">
  <span class="count-text">${stores.length}店舗</span>
  <button class="btn-add" onclick="addStore()">＋ 店舗追加</button>
</div>
<div class="table-wrap">
<table>
<thead><tr>
  ${th('stores','store_name','店舗名')}
  ${th('stores','region','地域')}
  ${th('stores','store_code','コード')}
  ${th('stores','opened_at','営業開始日')}
  ${th('stores','manager','担当者')}
  ${th('stores','machine_count','機械数')}
  <th>操作</th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="7"><div class="empty">店舗がありません</div></td></tr>'}</tbody>
</table>
</div>`;
}

function renderMachines(){
  let list=machines;
  if(filterStore) list=list.filter(m=>m.store_id===filterStore);
  document.getElementById('headerBadge').textContent=list.length+'台';
  const storeOpts=stores.sort((a,b)=>a.sort_order-b.sort_order).map(s=>`<option value="${s.id}"${filterStore===s.id?'selected':''}>${esc(s.store_name)}</option>`).join('');
  const sorted=applySortMachines(list);
  let rows=sorted.map(m=>`
<tr data-id="${m.id}">
  <td style="color:var(--text2);font-size:12px">${m.billing_order!=null?m.billing_order:'—'}</td>
  <td><strong>${esc(m.machine_name)}</strong></td>
  <td>${esc(storeName(m.store_id))}</td>
  <td><code style="font-size:11px;color:var(--text2)">${esc(m.rental_no||'—')}</code></td>
  <td>${booths.filter(b=>b.machine_id===m.id).length}台</td>
  <td><div class="btn-row"><button class="btn-edit" onclick="editMachine('${m.id}')">編集</button><button class="btn-del" onclick="delMachine('${m.id}')">削除</button></div></td>
</tr>`).join('');
  return `
<div class="filter-row">
  <select onchange="filterStore=this.value;render()">
    <option value="">全店舗</option>${storeOpts}
  </select>
  <button class="btn-add" onclick="addMachine()">＋ 機械追加</button>
</div>
<div class="count-row"><span class="count-text">${list.length}台</span></div>
<div class="table-wrap">
<table>
<thead><tr>
  ${th('machines','billing_order','集金順')}
  ${th('machines','machine_name','機械名')}
  ${th('machines','store_name','店舗')}
  ${th('machines','rental_no','レンタルNo.')}
  ${th('machines','booth_count','ブース数')}
  <th>操作</th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="6"><div class="empty">機械がありません</div></td></tr>'}</tbody>
</table>
</div>`;
}

function renderBooths(){
  let list=booths;
  const machList=filterStore?machines.filter(m=>m.store_id===filterStore):machines;
  if(filterStore) list=list.filter(b=>machList.some(m=>m.id===b.machine_id));
  if(filterMachine) list=list.filter(b=>b.machine_id===filterMachine);
  document.getElementById('headerBadge').textContent=list.length+'ブース';
  const storeOpts=stores.sort((a,b)=>a.sort_order-b.sort_order).map(s=>`<option value="${s.id}"${filterStore===s.id?'selected':''}>${esc(s.store_name)}</option>`).join('');
  const machOpts=machList.sort((a,b)=>a.machine_code.localeCompare(b.machine_code)).map(m=>`<option value="${m.id}"${filterMachine===m.id?'selected':''}>${esc(m.machine_name)}</option>`).join('');
  const sorted=applySortBooths(list);
  let rows=sorted.map(b=>`
<tr data-id="${b.id}">
  <td><code style="font-size:11px;color:var(--text2)">${esc(b.booth_code)}</code></td>
  <td>${esc(storeName(machineStore(b.machine_id)))}</td>
  <td>${esc(machineName(b.machine_id))}</td>
  <td><span class="badge badge-cyan">S${b.satellite_no}</span></td>
  <td><div class="btn-row"><button class="btn-edit" onclick="editBooth('${b.id}')">編集</button><button class="btn-del" onclick="delBooth('${b.id}')">削除</button></div></td>
</tr>`).join('');
  return `
<div class="filter-row">
  <select onchange="filterStore=this.value;filterMachine='';render()">
    <option value="">全店舗</option>${storeOpts}
  </select>
  <select onchange="filterMachine=this.value;render()">
    <option value="">全機械</option>${machOpts}
  </select>
  <button class="btn-add" onclick="addBooth()">＋ ブース追加</button>
</div>
<div class="count-row"><span class="count-text">${list.length}ブース</span></div>
<div class="table-wrap">
<table>
<thead><tr>
  ${th('booths','booth_code','コード')}
  ${th('booths','store_name','店舗')}
  ${th('booths','machine_name','機械')}
  ${th('booths','satellite_no','サテライト')}
  <th>操作</th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="5"><div class="empty">ブースがありません</div></td></tr>'}</tbody>
</table>
</div>`;
}

// ─── TAB SWITCH ──────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  filterStore='';filterMachine='';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['stores','machines','booths'][i]===tab);
  });
  render();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('modalBg').style.display='flex'; }
function closeModal(){ document.getElementById('modalBg').style.display='none'; }
function closeModalBg(e){ if(e.target===document.getElementById('modalBg')) closeModal(); }

// ─── STORES CRUD ─────────────────────────────────────────────────────────────
function addStore(){
  showModal(`<div class="modal-title">店舗追加</div>
<div class="form-group"><label>店舗名</label><input id="f_name" placeholder="例：合志" autofocus></div>
<div class="form-group"><label>地域</label><select id="f_region"><option>熊本</option><option>鹿児島</option><option>長崎</option><option>宮崎</option><option>福岡</option></select></div>
<div class="form-group"><label>店舗コード</label><input id="f_code" placeholder="例：S012"></div>
<div class="form-group"><label>営業開始日</label><input id="f_opened" type="date"></div>
<div class="form-group"><label>担当者</label><input id="f_manager" placeholder="例：坂本"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveNewStore()">追加</button>
</div>`);
}
function saveNewStore(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ alert('店舗名を入力してください'); return; }
  const maxOrder=stores.length?Math.max(...stores.map(s=>s.sort_order)):0;
  const code=document.getElementById('f_code').value.trim()||genId('S');
  stores.push({
    id:code,store_code:code,store_name:name,
    region:document.getElementById('f_region').value,
    sort_order:maxOrder+1,
    opened_at:document.getElementById('f_opened').value||'',
    manager:document.getElementById('f_manager').value.trim()
  });
  closeModal(); render();
}
function editStore(id){
  const s=stores.find(x=>x.id===id); if(!s) return;
  const rOpts=['熊本','鹿児島','長崎','宮崎','福岡'].map(r=>`<option${r===s.region?' selected':''}>${r}</option>`).join('');
  showModal(`<div class="modal-title">店舗編集</div>
<div class="form-group"><label>店舗名</label><input id="f_name" value="${esc(s.store_name)}" autofocus></div>
<div class="form-group"><label>地域</label><select id="f_region">${rOpts}</select></div>
<div class="form-group"><label>店舗コード</label><input id="f_code" value="${esc(s.store_code)}"></div>
<div class="form-group"><label>営業開始日</label><input id="f_opened" type="date" value="${esc(s.opened_at||'')}"></div>
<div class="form-group"><label>担当者</label><input id="f_manager" value="${esc(s.manager||'')}"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveEditStore('${id}')">保存</button>
</div>`);
}
function saveEditStore(id){
  const s=stores.find(x=>x.id===id); if(!s) return;
  s.store_name=document.getElementById('f_name').value.trim()||s.store_name;
  s.region=document.getElementById('f_region').value;
  s.store_code=document.getElementById('f_code').value.trim()||s.store_code;
  s.opened_at=document.getElementById('f_opened').value||s.opened_at;
  s.manager=document.getElementById('f_manager').value.trim();
  closeModal(); render();
}
function delStore(id){
  if(!confirm('この店舗を削除しますか？\n関連する機械・ブースも削除されます。')) return;
  const mids=machines.filter(m=>m.store_id===id).map(m=>m.id);
  booths=booths.filter(b=>!mids.includes(b.machine_id));
  machines=machines.filter(m=>m.store_id!==id);
  stores=stores.filter(s=>s.id!==id);
  stores.sort((a,b)=>a.sort_order-b.sort_order).forEach((s,i)=>s.sort_order=i+1);
  render();
}

// ─── MACHINES CRUD ───────────────────────────────────────────────────────────
function addMachine(){
  const storeOpts=stores.sort((a,b)=>a.sort_order-b.sort_order).map(s=>`<option value="${s.id}"${filterStore===s.id?' selected':''}>${esc(s.store_name)}</option>`).join('');
  const models=['BUZZクレーン','BUZZクレーンミニ','BUZZクレーンスリム','セサミ','ジャリクレーン','クリスタル','その他'];
  showModal(`<div class="modal-title">機械追加</div>
<div class="form-group"><label>店舗</label><select id="f_store">${storeOpts}</select></div>
<div class="form-group"><label>機械名</label><input id="f_name" placeholder="例：BUZZ＃１" autofocus></div>
<div class="form-group"><label>モデル</label><select id="f_model">${models.map(m=>`<option>${m}</option>`).join('')}</select></div>
<div class="form-group"><label>レンタルNo.</label><input id="f_rental" placeholder="例：R2014"></div>
<div class="form-group"><label>集金順番</label><input id="f_billing" type="number" min="1" placeholder="例：1"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveNewMachine()">追加</button>
</div>`);
}
function saveNewMachine(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ alert('機械名を入力してください'); return; }
  const code=genId('M');
  machines.push({
    id:code,machine_code:code,
    store_id:document.getElementById('f_store').value,
    machine_name:name,
    rental_no:document.getElementById('f_rental').value.trim(),
    model:document.getElementById('f_model').value,
    billing_order:parseInt(document.getElementById('f_billing').value)||null
  });
  closeModal(); render();
}
function editMachine(id){
  const m=machines.find(x=>x.id===id); if(!m) return;
  const storeOpts=stores.sort((a,b)=>a.sort_order-b.sort_order).map(s=>`<option value="${s.id}"${s.id===m.store_id?' selected':''}>${esc(s.store_name)}</option>`).join('');
  const models=['BUZZクレーン','BUZZクレーンミニ','BUZZクレーンスリム','セサミ','ジャリクレーン','クリスタル','その他'];
  const modelOpts=models.map(x=>`<option${x===m.model?' selected':''}>${x}</option>`).join('');
  showModal(`<div class="modal-title">機械編集</div>
<div class="form-group"><label>店舗</label><select id="f_store">${storeOpts}</select></div>
<div class="form-group"><label>機械名</label><input id="f_name" value="${esc(m.machine_name)}" autofocus></div>
<div class="form-group"><label>モデル</label><select id="f_model">${modelOpts}</select></div>
<div class="form-group"><label>レンタルNo.</label><input id="f_rental" value="${esc(m.rental_no)}"></div>
<div class="form-group"><label>集金順番</label><input id="f_billing" type="number" min="1" value="${m.billing_order!=null?m.billing_order:''}"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveEditMachine('${id}')">保存</button>
</div>`);
}
function saveEditMachine(id){
  const m=machines.find(x=>x.id===id); if(!m) return;
  m.store_id=document.getElementById('f_store').value;
  m.machine_name=document.getElementById('f_name').value.trim()||m.machine_name;
  m.model=document.getElementById('f_model').value;
  m.rental_no=document.getElementById('f_rental').value.trim();
  const b=parseInt(document.getElementById('f_billing').value);
  m.billing_order=isNaN(b)?null:b;
  closeModal(); render();
}
function delMachine(id){
  if(!confirm('この機械を削除しますか？\n関連するブースも削除されます。')) return;
  booths=booths.filter(b=>b.machine_id!==id);
  machines=machines.filter(m=>m.id!==id);
  render();
}

// ─── BOOTHS CRUD ─────────────────────────────────────────────────────────────
function addBooth(){
  const machOpts=machines.map(m=>`<option value="${m.id}">${esc(storeName(m.store_id))} - ${esc(m.machine_name)}</option>`).join('');
  showModal(`<div class="modal-title">ブース追加</div>
<div class="form-group"><label>機械</label><select id="f_machine">${machOpts}</select></div>
<div class="form-group"><label>サテライトNo.</label><input id="f_sat" type="number" min="1" max="9" value="1" autofocus></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveNewBooth()">追加</button>
</div>`);
}
function saveNewBooth(){
  const sat=parseInt(document.getElementById('f_sat').value)||1;
  const mid=document.getElementById('f_machine').value;
  const code=genId('B');
  booths.push({id:code,booth_code:code,machine_id:mid,booth_number:sat,satellite_no:sat});
  closeModal(); render();
}
function editBooth(id){
  const b=booths.find(x=>x.id===id); if(!b) return;
  const machOpts=machines.map(m=>`<option value="${m.id}"${m.id===b.machine_id?' selected':''}>${esc(storeName(m.store_id))} - ${esc(m.machine_name)}</option>`).join('');
  showModal(`<div class="modal-title">ブース編集</div>
<div class="form-group"><label>機械</label><select id="f_machine">${machOpts}</select></div>
<div class="form-group"><label>サテライトNo.</label><input id="f_sat" type="number" min="1" max="9" value="${b.satellite_no}" autofocus></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveEditBooth('${id}')">保存</button>
</div>`);
}
function saveEditBooth(id){
  const b=booths.find(x=>x.id===id); if(!b) return;
  b.machine_id=document.getElementById('f_machine').value;
  b.satellite_no=parseInt(document.getElementById('f_sat').value)||b.satellite_no;
  b.booth_number=b.satellite_no;
  closeModal(); render();
}
function delBooth(id){
  if(!confirm('このブースを削除しますか？')) return;
  booths=booths.filter(b=>b.id!==id);
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
