var colors=['#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#009688','#4caf50','#ff9800','#ff5722','#795548','#607d8b'];
function hc(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length]}

function sw(m,el){mode=m;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});el.classList.add('on');ren()}

function ren(){
var q=(document.getElementById('q').value||'').toLowerCase();
var el=document.getElementById('ls');
var h='';
if(mode===0){
  var d=S.filter(function(s){return !q||s.store_name.toLowerCase().indexOf(q)>=0||s.store_short.toLowerCase().indexOf(q)>=0});
  var areas={};d.forEach(function(s){if(!areas[s.area])areas[s.area]=[];areas[s.area].push(s)});
  for(var a in areas){
    h+='<div class="grp">📍 '+a+' ('+areas[a].length+'店舗)</div>';
    areas[a].forEach(function(s){
      var mc=M.filter(function(m){return m.store_code===s.store_code}).length;
      h+='<div class="it" onclick="opnS(\''+s.store_code+'\')"><div class="ic" style="background:'+hc(s.store_short)+'">'+s.store_short.charAt(0)+'</div><div class="info"><div class="nm">'+s.store_name+'</div><div class="sub">'+s.store_code+' | 機械'+mc+'台</div></div><span class="badge bg-blue">'+s.area+'</span></div>';
    });
  }
  document.getElementById('cnt').textContent=d.length+'店舗';
}else if(mode===1){
  var d=M.filter(function(m){return !q||m.machine_name.toLowerCase().indexOf(q)>=0||m.machine_code.toLowerCase().indexOf(q)>=0||m.store_short.toLowerCase().indexOf(q)>=0});
  var stores={};d.forEach(function(m){if(!stores[m.store_short])stores[m.store_short]=[];stores[m.store_short].push(m)});
  for(var s in stores){
    h+='<div class="grp">🏪 '+s+' ('+stores[s].length+'台)</div>';

function opnS(code){
  var s=S.find(function(x){return x.store_code===code});if(!s)return;
  var mc=M.filter(function(m){return m.store_code===code}).length;
  document.getElementById('mdl').innerHTML='<h2>🏪 '+s.store_name+'</h2><div class="f"><label>店舗コード</label><input value="'+s.store_code+'" readonly></div><div class="f"><label>店舗名</label><input value="'+s.store_name+'"></div><div class="f"><label>略称</label><input value="'+s.store_short+'"></div><div class="f"><label>エリア</label><input value="'+s.area+'"></div><div class="f"><label>機械数</label><input value="'+mc+'台" readonly></div><div class="ac"><button class="bt bc" onclick="cls()">閉じる</button><button class="bt bs" onclick="cls();alert(\'✅ 保存（テスト）\')">💾 保存</button></div>';
  document.getElementById('mbg').style.display='block';document.getElementById('mdl').style.display='block';
}

function opnM(code){
  var m=M.find(function(x){return x.machine_code===code});if(!m)return;

  document.getElementById('mbg').style.display='block';document.getElementById('mdl').style.display='block';
}
