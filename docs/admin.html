<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>マスタ管理 | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --radius:10px;
  --nav-h:58px;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h)+env(safe-area-inset-bottom))}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header-title{font-size:18px;font-weight:700;letter-spacing:.5px;flex:1}
.header-badge{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:20px}

/* Tabs */
.tabs{display:flex;gap:4px}
.tab-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;font-weight:600;padding:8px 4px;cursor:pointer;transition:all .15s;text-align:center}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Main content */
main{padding:14px}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row select{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;cursor:pointer}
.filter-row select:focus{border-color:var(--accent)}

/* Add button */
.btn-add{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s}
.btn-add:hover{background:var(--accent2)}

/* Table */
.table-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,106,255,.06)}

/* Sortable header */
.th-sort{cursor:pointer;user-select:none;transition:color .15s}
.th-sort:hover{color:var(--text)}
.sort-arrow{margin-left:4px;font-size:10px}

.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-green{background:rgba(46,204,113,.15);color:var(--green)}
.badge-yellow{background:rgba(243,156,18,.15);color:var(--yellow)}
.badge-blue{background:rgba(124,106,255,.15);color:var(--accent)}
.badge-cyan{background:rgba(0,180,216,.15);color:var(--cyan)}

/* Action buttons */
.btn-edit{border:1px solid var(--border);border-radius:6px;font-size:11px;padding:4px 8px;cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--text2);white-space:nowrap}
.btn-edit:hover{border-color:var(--accent);color:var(--accent)}
/* Delete button in modal */
.btn-del-modal{width:100%;background:transparent;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;padding:9px;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-del-modal:hover{background:var(--red);color:#fff}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;padding:20px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-save{flex:1;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;padding:11px;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent2)}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;padding:11px;cursor:pointer}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}

/* Count */
.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.count-text{font-size:12px;color:var(--text2)}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}

/* Bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);text-decoration:none;font-size:10px;padding:4px 8px;border-radius:8px;cursor:pointer;transition:color .15s;background:none;border:none}
.nav-item.active,.nav-item:hover{color:var(--accent)}
.nav-icon{font-size:20px}

@media(min-width:768px){
  main{max-width:960px;margin:0 auto}
  .modal{max-width:520px}
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <span class="header-title">マスタ管理</span>
    <span class="header-badge" id="headerBadge">0件</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('stores')">🏪 店舗</button>
    <button class="tab-btn" onclick="switchTab('machines')">🎮 機械</button>
    <button class="tab-btn" onclick="switchTab('booths')">🎯 ブース</button>
  </div>
</header>

<main id="mainContent"></main>

<nav>
  <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span>ホーム</a>
  <a class="nav-item" href="prizes.html"><span class="nav-icon">🎁</span>景品</a>
  <button class="nav-item active"><span class="nav-icon">⚙️</span>管理</button>
</nav>

<!-- Modal -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModalBg(event)">
  <div class="modal" id="modalBody"></div>
</div>

<script>
// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const SB_URL='https://gedxzunoyzmvbqgwjalx.supabase.co/rest/v1';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZHh6dW5veXptdmJxZ3dqYWx4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE0ODA1OCwiZXhwIjoyMDg5NzI0MDU4fQ.ATjGmg5kdm-cs_663ddOUvwTZ8vbn24aSjz6uUYm4Fs';

async function sbFetch(method, path, body){
  const opts={
    method,
    headers:{
      'apikey':SB_KEY,
      'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
    }
  };
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+path, opts);
  if(!r.ok){const t=await r.text(); throw new Error(t);}
  return r.status===204?null:r.json();
}

// ─── DATA ────────────────────────────────────────────────────────────────────
let stores=[], machines=[], booths=[];

async function loadData(){
  document.getElementById('mainContent').innerHTML='<div class="empty">読み込み中...</div>';
  try{
    const [sr,mr,br]=await Promise.all([
      sbFetch('GET','/stores?select=*&order=store_name&limit=500'),
      sbFetch('GET','/machines?select=*&order=machine_code&limit=1000'),
      sbFetch('GET','/booths?select=*&order=booth_code&limit=2000'),
    ]);
    stores=sr.map(s=>({
      id:s.store_code,
      store_code:s.store_code,
      store_name:s.store_name||s.store_code,
      region:s.region||'',
      opened_at:s.opened_at||'',
      is_active:s.is_active!==false,
    }));
    machines=mr.map(m=>({
      id:m.machine_code,
      machine_code:m.machine_code,
      store_id:m.store_code,
      machine_name:m.machine_name||m.machine_code,
      model:m.model_id||'',
      billing_order:m.machine_number!=null?m.machine_number:null,
      is_active:m.is_active!==false,
    }));
    booths=br.map(b=>({
      id:b.booth_code,
      booth_code:b.booth_code,
      machine_id:b.machine_code,
      satellite_no:b.booth_number||1,
      booth_number:b.booth_number||1,
      is_active:b.is_active!==false,
    }));
    render();
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      '<div class="empty">読み込みエラー: '+e.message+'</div>';
  }
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab='stores';
let filterStore='';
let filterMachine='';
let storeSort={col:null,dir:'desc'};
let machineSort={col:null,dir:'desc'};
let boothSort={col:null,dir:'desc'};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function storeName(id){const s=stores.find(x=>x.id===id);return s?s.store_name:id;}
function machineName(id){const m=machines.find(x=>x.id===id);return m?m.machine_name:id;}
function machineStore(id){const m=machines.find(x=>x.id===id);return m?m.store_id:'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function genId(prefix){return prefix+Date.now().toString(36).toUpperCase();}
function regionBadge(r){
  const map={熊本:'badge-green',鹿児島:'badge-blue',長崎:'badge-cyan',宮崎:'badge-yellow',
             福岡:'badge-yellow',大分:'badge-green',沖縄:'badge-cyan',佐賀:'badge-blue',
             山口:'badge-blue'};
  const cls=map[r]||'badge-blue';
  return '<span class="badge '+cls+'">'+esc(r||'—')+'</span>';
}

// ─── SORT HELPERS ────────────────────────────────────────────────────────────
function toggleSort(tab,col){
  const s=tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col===col)s.dir=s.dir==='desc'?'asc':'desc';
  else{s.col=col;s.dir='desc';}
  render();
}
function sortArrow(tab,col){
  const s=tab==='stores'?storeSort:tab==='machines'?machineSort:boothSort;
  if(s.col!==col)return'<span class="sort-arrow" style="opacity:.3">⇅</span>';
  return s.dir==='desc'
    ?'<span class="sort-arrow" style="color:var(--accent)">↓</span>'
    :'<span class="sort-arrow" style="color:var(--accent)">↑</span>';
}
function cmp(av,bv,dir){
  if(av==null)av='';if(bv==null)bv='';
  let r=(typeof av==='number'&&typeof bv==='number')?av-bv:String(av).localeCompare(String(bv),'ja');
  return dir==='desc'?-r:r;
}
function applySortStores(list){
  const s=storeSort;
  if(!s.col)return [...list].sort((a,b)=>a.store_name.localeCompare(b.store_name,'ja'));
  return [...list].sort((a,b)=>{
    if(s.col==='machine_count')return cmp(machines.filter(m=>m.store_id===a.id).length,machines.filter(m=>m.store_id===b.id).length,s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortMachines(list){
  const s=machineSort;
  if(!s.col)return [...list].sort((a,b)=>a.machine_code.localeCompare(b.machine_code));
  return [...list].sort((a,b)=>{
    if(s.col==='booth_count')return cmp(booths.filter(x=>x.machine_id===a.id).length,booths.filter(x=>x.machine_id===b.id).length,s.dir);
    if(s.col==='store_name')return cmp(storeName(a.store_id),storeName(b.store_id),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}
function applySortBooths(list){
  const s=boothSort;
  if(!s.col)return [...list].sort((a,b)=>a.booth_code.localeCompare(b.booth_code));
  return [...list].sort((a,b)=>{
    if(s.col==='store_name')return cmp(storeName(machineStore(a.machine_id)),storeName(machineStore(b.machine_id)),s.dir);
    if(s.col==='machine_name')return cmp(machineName(a.machine_id),machineName(b.machine_id),s.dir);
    return cmp(a[s.col],b[s.col],s.dir);
  });
}

// ─── TAB ─────────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;filterStore='';filterMachine='';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['stores','machines','booths'][i]===tab));
  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  if(currentTab==='stores')renderStores();
  else if(currentTab==='machines')renderMachines();
  else renderBooths();
}

function renderStores(){
  const sorted=applySortStores(stores);
  document.getElementById('headerBadge').textContent=stores.length+'件';
  let rows=sorted.map(s=>`
<tr data-id="${s.id}">
  <td><strong>${esc(s.store_name)}</strong></td>
  <td><code style="font-size:11px;color:var(--text2)">${esc(s.store_code)}</code></td>
  <td>${regionBadge(s.region)}</td>
  <td>${machines.filter(m=>m.store_id===s.id).length}台</td>
  <td>${esc(s.opened_at?s.opened_at.slice(0,10):'—')}</td>
  <td><button class="btn-edit" onclick="editStore('${s.id}')">編集</button></td>
</tr>`).join('');
  document.getElementById('mainContent').innerHTML=`
<div class="count-row">
  <span class="count-text">全${stores.length}店舗</span>
  <button class="btn-add" onclick="addStore()">＋ 店舗追加</button>
</div>
<div class="table-wrap"><table><thead><tr>
  <th class="th-sort" onclick="toggleSort('stores','store_name')">店舗名 ${sortArrow('stores','store_name')}</th>
  <th style="width:80px">コード</th>
  <th class="th-sort" onclick="toggleSort('stores','region')">地域 ${sortArrow('stores','region')}</th>
  <th class="th-sort" style="width:60px" onclick="toggleSort('stores','machine_count')">機械数 ${sortArrow('stores','machine_count')}</th>
  <th class="th-sort" onclick="toggleSort('stores','opened_at')">開店日 ${sortArrow('stores','opened_at')}</th>
  <th style="width:70px"></th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="6"><div class="empty">店舗がありません</div></td></tr>'}</tbody>
</table></div>`;
}

function renderMachines(){
  let list=machines;
  if(filterStore)list=list.filter(m=>m.store_id===filterStore);
  document.getElementById('headerBadge').textContent=list.length+'台';
  const storeOpts=stores.slice().sort((a,b)=>a.store_name.localeCompare(b.store_name,'ja'))
    .map(s=>`<option value="${s.id}"${filterStore===s.id?'selected':''}>${esc(s.store_name)}</option>`).join('');
  const sorted=applySortMachines(list);
  let rows=sorted.map(m=>`
<tr data-id="${m.id}">
  <td style="color:var(--text2);font-size:12px">${m.billing_order!=null?m.billing_order:'—'}</td>
  <td><strong>${esc(m.machine_name)}</strong></td>
  <td>${esc(storeName(m.store_id))}</td>
  <td><code style="font-size:11px;color:var(--text2)">${esc(m.machine_code)}</code></td>
  <td>${booths.filter(b=>b.machine_id===m.id).length}台</td>
  <td><button class="btn-edit" onclick="editMachine('${m.id}')">編集</button></td>
</tr>`).join('');
  document.getElementById('mainContent').innerHTML=`
<div class="filter-row">
  <select onchange="filterStore=this.value;render()"><option value="">全店舗</option>${storeOpts}</select>
  <button class="btn-add" onclick="addMachine()">＋ 機械追加</button>
</div>
<div class="table-wrap"><table><thead><tr>
  <th style="width:50px" class="th-sort" onclick="toggleSort('machines','billing_order')">集金順 ${sortArrow('machines','billing_order')}</th>
  <th class="th-sort" onclick="toggleSort('machines','machine_name')">機械名 ${sortArrow('machines','machine_name')}</th>
  <th class="th-sort" onclick="toggleSort('machines','store_name')">店舗 ${sortArrow('machines','store_name')}</th>
  <th style="width:70px">コード</th>
  <th class="th-sort" style="width:60px" onclick="toggleSort('machines','booth_count')">ブース ${sortArrow('machines','booth_count')}</th>
  <th style="width:70px"></th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="6"><div class="empty">機械がありません</div></td></tr>'}</tbody>
</table></div>`;
}

function renderBooths(){
  let list=booths;
  const machList=filterStore?machines.filter(m=>m.store_id===filterStore):machines;
  if(filterStore)list=list.filter(b=>machList.some(m=>m.id===b.machine_id));
  if(filterMachine)list=list.filter(b=>b.machine_id===filterMachine);
  document.getElementById('headerBadge').textContent=list.length+'ブース';
  const storeOpts=stores.slice().sort((a,b)=>a.store_name.localeCompare(b.store_name,'ja'))
    .map(s=>`<option value="${s.id}"${filterStore===s.id?'selected':''}>${esc(s.store_name)}</option>`).join('');
  const machOpts=machList.slice().sort((a,b)=>a.machine_code.localeCompare(b.machine_code))
    .map(m=>`<option value="${m.id}"${filterMachine===m.id?'selected':''}>${esc(m.machine_name)}</option>`).join('');
  const sorted=applySortBooths(list);
  let rows=sorted.map(b=>`
<tr data-id="${b.id}">
  <td><code style="font-size:11px;color:var(--text2)">${esc(b.booth_code)}</code></td>
  <td>${esc(storeName(machineStore(b.machine_id)))}</td>
  <td>${esc(machineName(b.machine_id))}</td>
  <td><span class="badge badge-cyan">S${b.satellite_no}</span></td>
  <td><button class="btn-edit" onclick="editBooth('${b.id}')">編集</button></td>
</tr>`).join('');
  document.getElementById('mainContent').innerHTML=`
<div class="filter-row">
  <select onchange="filterStore=this.value;filterMachine='';render()"><option value="">全店舗</option>${storeOpts}</select>
  <select onchange="filterMachine=this.value;render()"><option value="">全機械</option>${machOpts}</select>
  <button class="btn-add" onclick="addBooth()">＋ ブース追加</button>
</div>
<div class="table-wrap"><table><thead><tr>
  <th>コード</th>
  <th class="th-sort" onclick="toggleSort('booths','store_name')">店舗 ${sortArrow('booths','store_name')}</th>
  <th class="th-sort" onclick="toggleSort('booths','machine_name')">機械 ${sortArrow('booths','machine_name')}</th>
  <th style="width:70px">サテライト</th>
  <th style="width:70px"></th>
</tr></thead>
<tbody>${rows||'<tr><td colspan="5"><div class="empty">ブースがありません</div></td></tr>'}</tbody>
</table></div>`;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').style.display='flex';}
function closeModal(){document.getElementById('modalBg').style.display='none';}
function closeModalBg(e){if(e.target===document.getElementById('modalBg'))closeModal();}

// ─── STORES CRUD ─────────────────────────────────────────────────────────────
function addStore(){
  showModal(`<div class="modal-title">店舗追加</div>
<div class="form-group"><label>店舗名</label><input id="f_name" placeholder="例：ドン・キホーテ 合志店" autofocus></div>
<div class="form-group"><label>地域</label><select id="f_region"><option>熊本</option><option>鹿児島</option><option>長崎</option><option>宮崎</option><option>福岡</option><option>大分</option><option>沖縄</option><option>佐賀</option><option>山口</option></select></div>
<div class="form-group"><label>店舗コード（必須・例：KOS01）</label><input id="f_code" placeholder="例：KOS01"></div>
<div class="form-group"><label>営業開始日</label><input id="f_opened" type="date"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveNewStore()">追加</button>
</div>`);
}
async function saveNewStore(){
  const name=document.getElementById('f_name').value.trim();
  const code=document.getElementById('f_code').value.trim();
  if(!name){alert('店舗名を入力してください');return;}
  if(!code){alert('店舗コードを入力してください');return;}
  const region=document.getElementById('f_region').value;
  const opened=document.getElementById('f_opened').value||null;
  try{
    await sbFetch('POST','/stores',{
      store_code:code,store_name:name,store_name_official:name,
      region,opened_at:opened,store_type:'donki_tenant',is_active:true
    });
    stores.push({id:code,store_code:code,store_name:name,region,opened_at:opened||'',is_active:true});
    closeModal();render();
  }catch(e){alert('保存エラー: '+e.message);}
}
function editStore(id){
  const s=stores.find(x=>x.id===id);if(!s)return;
  const regions=['熊本','鹿児島','長崎','宮崎','福岡','大分','沖縄','佐賀','山口'];
  const rOpts=regions.map(r=>`<option${r===s.region?' selected':''}>${r}</option>`).join('');
  showModal(`<div class="modal-title">店舗編集</div>
<div class="form-group"><label>店舗名</label><input id="f_name" value="${esc(s.store_name)}" autofocus></div>
<div class="form-group"><label>地域</label><select id="f_region">${rOpts}</select></div>
<div class="form-group"><label>店舗コード</label><input id="f_code" value="${esc(s.store_code)}" readonly style="opacity:.5"></div>
<div class="form-group"><label>営業開始日</label><input id="f_opened" type="date" value="${esc(s.opened_at?s.opened_at.slice(0,10):'')}" ></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn-save" onclick="saveEditStore('${id}')">保存</button>
</div>
<button class="btn-del-modal" onclick="delStore('${id}')">削除</button>`);
}
async function saveEditStore(id){
  const s=stores.find(x=>x.id===id);if(!s)return;
  const name=document.getElementById('f_name').value.trim()||s.store_name;
  const region=document.getElementById('f_region').value;
  const opened=document.getElementById('f_opened').value||null;
  try{
    await sbFetch('PATCH','/stores?store_code=eq.'+encodeURIComponent(id),{
      store_name:name,store_name_official:name,region,opened_at:opened
    });
    s.store_name=name;s.region=region;s.opened_at=opened||'';
    closeModal();render();
  }catch(e){alert('保存エラー: '+e.message);}
}
async function delStore(id){
  if(!confirm('この店舗を削除しますか？\n関連する機械・ブースも削除されます。'))return;
  try{
    const mids=machines.filter(m=>m.store_id===id).map(m=>m.id);
    if(mids.length){
      await sbFetch('DELETE','/booths?machine_code=in.('+mids.map(x=>encodeURIComponent(x)).join(',')+')');
      await sbFetch('DELETE','/machines?store_code=eq.'+encodeURIComponent(id));
    }
    await sbFetch('DELETE','/stores?store_code=eq.'+encodeURIComponent(id));
    booths=booths.filter(b=>!mids.includes(b.machine_id));
    machines=machines.filter(m=>m.store_id!==id);
    stores=stores.filter(s=>s.id!==id);
    closeModal();render();
  }catch(e){alert('削除エラー: '+e.message);}
}

// ─── MACHINES CRUD ───────────────────────────────────────────────────────────
function addMachine(){
  const storeOpts=stores.slice().sort((a,b)=>a.store_name.localeCompare(b.store_name,'ja'))
    .map(s=>`<option value="${s.id}"${filterStore===s.id?' selected':''}>${esc(s.store_name)}</option>`).join('');

async function saveNewMachine(){

  const code=document.getElementById('f_code').value.trim()||genId('M');

  const billing=parseInt(document.getElementById('f_billing').value);
  try{
    await sbFetch('POST','/machines',{

}
function editMachine(id){

<div class="form-group"><label>店舗</label><select id="f_store">${storeOpts}</select></div>
<div class="form-group"><label>機械名</label><input id="f_name" value="${esc(m.machine_name)}" autofocus></div>
<div class="form-group"><label>機械コード</label><input id="f_code" value="${esc(m.machine_code)}" readonly style="opacity:.5"></div>

<button class="btn-del-modal" onclick="delMachine('${id}')">削除</button>`);

async function saveEditMachine(id){
  const m=machines.find(x=>x.id===id);if(!m)return;
  const name=document.getElementById('f_name').value.trim()||m.machine_name;
  const storeCode=document.getElementById('f_store').value;
  const billing=parseInt(document.getElementById('f_billing').value);
  try{
    await sbFetch('PATCH','/machines?machine_code=eq.'+encodeURIComponent(id),{

    });

}
async function delMachine(id){
  if(!confirm('この機械を削除しますか？\n関連するブースも削除されます。'))return;
  try{
    await sbFetch('DELETE','/booths?machine_code=eq.'+encodeURIComponent(id));

    closeModal();render();

}
