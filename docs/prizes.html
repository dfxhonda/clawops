<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>景品マスタ | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --radius:10px;
  --nav-h:58px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}
/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.header-title{font-size:17px;font-weight:700;letter-spacing:.5px;flex:1}
.header-count{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:20px;white-space:nowrap}
.sort-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;padding:5px 10px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;transition:all .15s}
.sort-btn.active{border-color:var(--accent);color:var(--accent)}
/* search */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px 9px 34px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none}
/* tabs */
.tabs{display:flex;gap:5px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;text-align:center;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab-loc.active{background:var(--cyan);border-color:var(--cyan);color:#fff}
/* sort dropdown */
.sort-panel{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px;margin-bottom:6px}
.sort-panel.open{display:flex;gap:5px;flex-wrap:wrap}
.sort-opt{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.sort-opt.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* ── Cards ── */
.list-container{padding:10px 12px 16px}
.prize-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;gap:10px;align-items:stretch}
.prize-card:active{transform:scale(0.98);background:var(--surface2)}
/* photo thumb */
.card-photo{width:44px;min-width:44px;height:44px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);cursor:pointer;transition:background .15s;flex-shrink:0}
.card-photo:hover{background:var(--border)}
.card-photo.has-photo{border-color:var(--accent);color:var(--accent)}
/* card body */
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.prize-id{font-size:10px;color:var(--text2);font-family:monospace;white-space:nowrap;padding-top:2px;flex-shrink:0}
.prize-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;word-break:break-all}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-active{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-provisional{background:rgba(243,156,18,.12);color:var(--yellow);border:1px solid rgba(243,156,18,.3)}
.card-bottom{display:flex;align-items:center;gap:10px}
.cost-area{display:flex;align-items:baseline;gap:2px}
.cost-label{font-size:10px;color:var(--text2)}
.cost-value{font-size:14px;font-weight:700;color:var(--text)}
.cost-yen{font-size:11px;margin-right:1px}
.stock-area{margin-left:auto;display:flex;align-items:center;gap:4px}
.stock-label{font-size:10px;color:var(--text2)}
.stock-value{font-size:13px;font-weight:700;color:var(--cyan)}
.stock-unit{font-size:10px;color:var(--text2)}
.loc-chip{font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin-left:4px;white-space:nowrap}
/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-photo-area{width:100%;height:120px;border-radius:var(--radius);background:var(--surface2);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;margin-bottom:14px;transition:border-color .2s}
.modal-photo-area:hover{border-color:var(--accent)}
.modal-photo-icon{font-size:28px}
.modal-photo-hint{font-size:11px;color:var(--text2)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;letter-spacing:.3px}
.modal-field input,.modal-field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;outline:none}
.modal-field input:focus,.modal-field select:focus{border-color:var(--accent)}
.modal-field select option{background:var(--surface)}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-save{background:var(--accent);color:#fff}
.btn-save:active{background:var(--accent2)}
.note{font-size:11px;color:var(--text2);text-align:center;margin-top:12px;padding:9px;background:var(--surface2);border-radius:8px;line-height:1.6}
/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:150;backdrop-filter:blur(10px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;transition:color .15s;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
</style>
</head>

  </div>
  <div class="sort-panel" id="sortPanel">

    <div class="sort-opt" data-sort="cost_asc">原価↑</div>
    <div class="sort-opt" data-sort="cost_desc">原価↓</div>
    <div class="sort-opt" data-sort="stock_asc">在庫少↑</div>
    <div class="sort-opt" data-sort="stock_desc">在庫多↓</div>
    <div class="sort-opt" data-sort="name">名前順</div>
  </div>
</header>

<div class="list-container" id="listContainer"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-photo-area" onclick="alert('写真機能は実装予定です')">
      <div class="modal-photo-icon">📷</div>
      <div class="modal-photo-hint">タップして写真を追加</div>
    </div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-field">
      <label>景品ID</label>
      <input type="text" id="editId" readonly style="opacity:.5">
    </div>
    <div class="modal-field">
      <label>景品名</label>
      <input type="text" id="editName" placeholder="景品名を入力">
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>原価（円）</label>
        <input type="number" id="editCost" placeholder="0" min="0">
      </div>
      <div class="modal-field">
        <label>在庫数</label>
        <input type="number" id="editStock" placeholder="0" min="0">
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>ステータス</label>
        <select id="editStatus">
          <option value="active">Active（運用中）</option>
          <option value="provisional">仮登録</option>
        </select>
      </div>
      <div class="modal-field">
        <label>拠点</label>
        <select id="editLoc">
          <option value="本店">本店</option>
          <option value="東店">東店</option>
          <option value="北店">北店</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModalBtn()">キャンセル</button>
      <button class="btn btn-save" onclick="saveEdit()">保存（デモ）</button>
    </div>
    <div class="note">※ これはデモ画面です。保存してもデータは変更されません。</div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'">
    <div class="nav-icon">🏠</div>
    <div>ホーム</div>
  </div>

  </div>
</nav>

// Augment with stock and location (deterministic from ID number)
var D = RAW.map(function(p) {
  var n = parseInt(p.id.slice(-3));
  var stock = (n * 17 + 3) % 40 + 1;
  var loc = LOCS[(n + 1) % 3];
  return Object.assign({}, p, {stock: stock, loc: loc});
});

var curFilter = 'all';
var curLoc = 'all';
var curSearch = '';
var curSort = 'id';
var editingIdx = -1;

function fmt(n){return n.toLocaleString('ja-JP')}
function statusLabel(s){return s==='active'?'Active':'仮登録'}
function statusClass(s){return s==='active'?'badge-active':'badge-provisional'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function getFiltered() {
  var list = D.filter(function(p) {
    var mf = curFilter==='all' || p.status===curFilter;
    var ml = curLoc==='all' || p.loc===curLoc;
    var q = curSearch.toLowerCase();
    var ms = !q || p.name.toLowerCase().indexOf(q)>=0 || p.id.toLowerCase().indexOf(q)>=0;
    return mf && ml && ms;
  });
  list = list.slice();
  if(curSort==='cost_asc') list.sort(function(a,b){return a.cost-b.cost});
  else if(curSort==='cost_desc') list.sort(function(a,b){return b.cost-a.cost});
  else if(curSort==='stock_asc') list.sort(function(a,b){return a.stock-b.stock});
  else if(curSort==='stock_desc') list.sort(function(a,b){return b.stock-a.stock});
  else if(curSort==='name') list.sort(function(a,b){return a.name.localeCompare(b.name,'ja')});
  return list;
}

function render() {
  var list = getFiltered();
  document.getElementById('countBadge').textContent = list.length+'件';
  var c = document.getElementById('listContainer');
  if(!list.length) {
    c.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>該当する景品がありません</div></div>';
    return;
  }
  c.innerHTML = list.map(function(p) {
    var idx = D.indexOf(p);
    var stockColor = p.stock<=5 ? 'color:var(--red)' : p.stock<=10 ? 'color:var(--yellow)' : '';
    return '<div class="prize-card" onclick="openModal('+idx+')">'
      +'<div class="card-photo" onclick="event.stopPropagation();alert(\'写真機能は実装予定です\')">📷</div>'
      +'<div class="card-body">'
      +'<div class="card-top">'
      +'<span class="prize-id">'+p.id+'</span>'
      +'<span class="prize-name">'+esc(p.name)+'</span>'
      +'<span class="badge '+statusClass(p.status)+'">'+statusLabel(p.status)+'</span>'
      +'</div>'
      +'<div class="card-bottom">'
      +'<span class="cost-area"><span class="cost-label">原価</span>&nbsp;<span class="cost-value"><span class="cost-yen">¥</span>'+fmt(p.cost)+'</span></span>'
      +'<span class="stock-area"><span class="stock-label">在庫</span>&nbsp;<span class="stock-value" style="'+stockColor+'">'+p.stock+'</span><span class="stock-unit">個</span></span>'
      +'<span class="loc-chip">'+p.loc+'</span>'
      +'</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

function toggleSort() {
  var p = document.getElementById('sortPanel');
  var b = document.getElementById('sortToggle');
  var open = p.classList.toggle('open');
  b.classList.toggle('active', open);
}

function openModal(idx) {
  editingIdx = idx;
  var p = D[idx];
  document.getElementById('modalTitle').textContent = '✏️ '+p.id;
  document.getElementById('editId').value = p.id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editCost').value = p.cost;
  document.getElementById('editStock').value = p.stock;
  document.getElementById('editStatus').value = p.status;
  document.getElementById('editLoc').value = p.loc;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if(e.target===document.getElementById('modalOverlay')) closeModalBtn();
}

function saveEdit() {
  if(editingIdx<0) return;
  var p = D[editingIdx];
  p.name = document.getElementById('editName').value || p.name;
  p.cost = parseInt(document.getElementById('editCost').value) || p.cost;
  p.stock = parseInt(document.getElementById('editStock').value) || 0;
  p.status = document.getElementById('editStatus').value;
  p.loc = document.getElementById('editLoc').value;
  closeModalBtn();
  render();
}

// Status tabs
document.querySelectorAll('#statusTabs .tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('#statusTabs .tab').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curFilter = this.dataset.filter;
    render();
  });
});

// Location tabs
document.querySelectorAll('#locTabs .tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('#locTabs .tab').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curLoc = this.dataset.loc;
    render();
  });
});

// Sort options
document.querySelectorAll('.sort-opt').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.sort-opt').forEach(function(x){x.classList.remove('active')});
    this.classList.add('active');
    curSort = this.dataset.sort;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  curSearch = this.value;
  render();
});

render();
</script>
