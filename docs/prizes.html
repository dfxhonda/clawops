<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>景品マスタ | ClawOps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;
  --surface:#1a1a23;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#e8e8f0;
  --text2:#9090a8;
  --accent:#7c6aff;
  --accent2:#5a4fcf;
  --green:#2ecc71;
  --yellow:#f39c12;
  --red:#e74c3c;
  --cyan:#00b4d8;
  --orange:#e67e22;
  --radius:10px;
  --nav-h:58px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px 8px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.header-title{font-size:16px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.header-count{font-size:11px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:20px;white-space:nowrap;margin-left:auto}

.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px 9px 34px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none}

.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:3px;margin-bottom:7px;flex-wrap:nowrap;align-items:center}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.provisional-chip.on{background:var(--yellow);border-color:var(--yellow);color:#000}
.chip-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px}

.sort-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;align-items:center}
.sort-row::-webkit-scrollbar{display:none}
.srt-btn{flex:0 0 auto;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent}
.srt-btn.active{border-color:var(--accent);color:var(--accent)}
.srt-arrow{font-size:11px}

.list-container{padding:10px 12px 16px}
.prize-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;gap:10px;align-items:flex-start}
.prize-card:active{transform:scale(0.98);background:var(--surface2)}

.card-icon{width:38px;min-width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;gap:5px;margin-bottom:5px}
.prize-name{font-size:13px;font-weight:600;line-height:1.35;flex:1;word-break:break-all}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.badge-active{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-provisional{background:rgba(243,156,18,.12);color:var(--yellow);border:1px solid rgba(243,156,18,.3)}
.badge-inactive{background:rgba(144,144,168,.12);color:var(--text2);border:1px solid var(--border)}

.card-mid{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.cost-val{font-size:14px;font-weight:700;white-space:nowrap}
.cost-yen{font-size:11px;margin-right:1px}
.stock-val{font-size:12px;color:var(--text2);white-space:nowrap}
.stock-zero{color:var(--red)}

.card-bot{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meta-chip{font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;white-space:nowrap}

.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--accent);word-break:break-all}
.modal-subtitle{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.modal-info{font-size:12px;color:var(--text2);background:var(--surface2);border-radius:6px;padding:8px 10px;margin-bottom:12px;line-height:1.7}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;letter-spacing:.3px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent)}
.modal-field select option{background:var(--surface)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-save{background:var(--accent);color:#fff}
.btn-save:active{background:var(--accent2)}
.btn-del{width:100%;padding:10px;border-radius:10px;font-size:14px;font-weight:700;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer;margin-top:8px;transition:all .15s}
.btn-del:hover{background:var(--red);color:#fff}
.btn-add-float{position:fixed;bottom:calc(var(--nav-h)+16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(124,106,255,.5);z-index:90;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-add-float:hover{background:var(--accent2)}

/* Spinner */
.spinner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:150;backdrop-filter:blur(10px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--text2);font-size:10px;font-weight:600;transition:color .15s;-webkit-tap-highlight-color:transparent;text-decoration:none}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <span class="header-title">🏆 景品マスタ</span>
    <span class="header-count" id="countBadge">読込中…</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="景品名で検索..." autocomplete="off" autocorrect="off">
  </div>
  <div class="chips" id="filterChips">
    <div class="chip" data-type="status" data-val="active">Active</div>
    <div class="chip provisional-chip" data-type="status" data-val="provisional">仮登録</div>
    <div class="chip-sep"></div>
    <div id="catChips"></div>
  </div>
  <div class="sort-row" id="sortRow">
    <button class="srt-btn active" data-key="name">景品名 <span class="srt-arrow">↑</span></button>
    <button class="srt-btn" data-key="cost">単価 <span class="srt-arrow">↓</span></button>
    <button class="srt-btn" data-key="stock">在庫 <span class="srt-arrow">↓</span></button>
  </div>
</header>

<div class="list-container" id="listContainer">
  <div class="empty"><div class="empty-icon">⏳</div><div>読み込み中...</div></div>
</div>

<button class="btn-add-float" onclick="addPrize()" title="景品追加">＋</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div id="spinnerOverlay" style="display:none" class="spinner-overlay"><div class="spinner"></div></div>
<div id="toastEl" style="display:none" class="toast"></div>

<nav class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">🏆</div>
    <div>景品</div>
  </div>
  <a class="nav-item" href="admin.html">
    <div class="nav-icon">⚙️</div>
    <div>管理</div>
  </a>
  <div class="nav-item" onclick="showToast('在庫ページは準備中です',false)">
    <div class="nav-icon">📦</div>
    <div>在庫</div>
  </div>
  <div class="nav-item" onclick="showToast('設定ページは準備中です',false)">
    <div class="nav-icon">⚙️</div>
    <div>設定</div>
  </div>
</nav>

<script>
const SB_URL='https://gedxzunoyzmvbqgwjalx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZHh6dW5veXptdmJxZ3dqYWx4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE0ODA1OCwiZXhwIjoyMDg5NzI0MDU4fQ.ATjGmg5kdm-cs_663ddOUvwTZ8vbn24aSjz6uUYm4Fs';

async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table,id,idCol,body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error(await r.text());
}
async function sbPost(table,body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table,id,idCol){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${idCol}=eq.${encodeURIComponent(id)}`,{
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok)throw new Error(await r.text());
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let DATA=[];
let curSearch='';
let curSortKey='name';
let sortDirs={name:'asc',cost:'desc',stock:'desc'};
let selStatuses=[];
let selCats=[];
let editingId=null;
let _loadingCount=0;
let _toastTimer=null;
const ICON_COLORS=['#7c6aff','#e74c3c','#2ecc71','#f39c12','#00b4d8','#e67e22','#9b59b6','#3498db'];

// ─── LOADING / TOAST ─────────────────────────────────────────────────────────
function showLoading(){
  _loadingCount++;
  document.getElementById('spinnerOverlay').style.display='flex';
}
function hideLoading(){
  _loadingCount=Math.max(0,_loadingCount-1);
  if(!_loadingCount)document.getElementById('spinnerOverlay').style.display='none';
}
function showToast(msg,ok=true){
  const el=document.getElementById('toastEl');
  el.textContent=msg;
  el.className='toast '+(ok?'ok':'err');
  el.style.display='block';
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.style.display='none',3000);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n){return Number(n).toLocaleString('ja-JP')}
function iconColor(p){
  // hash from id or name
  const str=String(p.id||p.name||'');
  let h=0;for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))&0xffff;
  return ICON_COLORS[h%ICON_COLORS.length];
}
function iconChar(p){
  const s=String(p.name||'');
  return s.replace(/[^\u3040-\u9FFF\uFF00-\uFFEFa-zA-Z]/,'').slice(0,1)||s.slice(0,1)||'?';
}
function statusBadge(status){
  if(status==='active')return'<span class="badge badge-active">Active</span>';
  if(status==='provisional')return'<span class="badge badge-provisional">仮登録</span>';
  return'<span class="badge badge-inactive">'+esc(status||'—')+'</span>';
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadData(){
  showLoading();
  try{
    const data=await sbGet('prizes','select=*&order=name.asc');
    DATA=data;
    buildCatChips();
    render();
  }catch(e){
    document.getElementById('listContainer').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div>データ読み込みに失敗しました<br><small>${esc(e.message)}</small></div></div>`;
    document.getElementById('countBadge').textContent='エラー';
  }finally{
    hideLoading();
  }
}

function buildCatChips(){
  const cats=[...new Set(DATA.map(p=>p.category).filter(Boolean))].sort();
  const el=document.getElementById('catChips');
  el.style.display='contents';
  if(!cats.length){el.innerHTML='';return;}
  el.innerHTML=cats.map(c=>`<div class="chip" data-type="cat" data-val="${esc(c)}">${esc(c)}</div>`).join('');
  el.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',function(){
      const val=this.dataset.val;
      const i=selCats.indexOf(val);
      if(i>=0){selCats.splice(i,1);this.classList.remove('on');}
      else{selCats.push(val);this.classList.add('on');}
      render();
    });
  });
}

// ─── FILTER / SORT ────────────────────────────────────────────────────────────
function getFiltered(){
  let list=DATA.filter(p=>{
    if(selStatuses.length>0&&!selStatuses.includes(p.status))return false;
    if(selCats.length>0&&!selCats.includes(p.category))return false;
    const q=curSearch.toLowerCase();
    if(q&&!String(p.name||'').toLowerCase().includes(q))return false;
    return true;
  });
  const key=curSortKey;
  const dir=sortDirs[key]||'asc';
  list=list.slice().sort((a,b)=>{
    let av=a[key],bv=b[key];
    if(av==null)av=dir==='asc'?Infinity:-Infinity;
    if(bv==null)bv=dir==='asc'?Infinity:-Infinity;
    if(typeof av==='string')return dir==='asc'?av.localeCompare(bv,'ja'):bv.localeCompare(av,'ja');
    return dir==='asc'?av-bv:bv-av;
  });
  return list;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const list=getFiltered();
  document.getElementById('countBadge').textContent=list.length+'件';
  const c=document.getElementById('listContainer');
  if(!list.length){
    c.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>該当する景品がありません</div></div>';
    return;
  }
  c.innerHTML=list.map(p=>{
    const stock=p.stock!=null?p.stock:null;
    const stockHtml=stock!=null
      ?`<span class="stock-val${stock===0?' stock-zero':''}">在庫: <b>${stock}</b></span>`
      :'';
    const catHtml=p.category?`<span class="meta-chip">${esc(p.category)}</span>`:'';
    const notesHtml=p.notes?`<span class="meta-chip">📝</span>`:'';
    return`<div class="prize-card" onclick="openModal('${esc(p.id)}')">
<div class="card-icon" style="background:${iconColor(p)}">${esc(iconChar(p))}</div>
<div class="card-body">
<div class="card-top">
<span class="prize-name">${esc(p.name)}</span>
${statusBadge(p.status)}
</div>
<div class="card-mid">
<span class="cost-val"><span class="cost-yen">¥</span>${fmt(p.cost||0)}</span>
${stockHtml}
</div>
<div class="card-bot">${catHtml}${notesHtml}</div>
</div>
</div>`;
  }).join('');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id){
  const p=DATA.find(x=>String(x.id)===String(id));if(!p)return;
  editingId=id;
  const statusOpts=['active','provisional','inactive'].map(v=>`<option value="${v}"${p.status===v?' selected':''}>${v==='active'?'Active（運用中）':v==='provisional'?'仮登録':'非アクティブ'}</option>`).join('');
  document.getElementById('modalContent').innerHTML=`
<div class="modal-title">✏️ ${esc(p.name)}</div>
<div class="modal-subtitle">ID: ${esc(p.id)}</div>
${p.notes?`<div class="modal-info">${esc(p.notes)}</div>`:''}
<div class="modal-row">
  <div class="modal-field">
    <label>原価（円）</label>
    <input type="number" id="editCost" value="${p.cost!=null?p.cost:''}" min="0">
  </div>
  <div class="modal-field">
    <label>在庫数</label>
    <input type="number" id="editStock" value="${p.stock!=null?p.stock:''}" min="0">
  </div>
</div>
<div class="modal-row">
  <div class="modal-field">
    <label>ステータス</label>
    <select id="editStatus">${statusOpts}</select>
  </div>
  <div class="modal-field">
    <label>カテゴリ</label>
    <input type="text" id="editCat" value="${esc(p.category||'')}">
  </div>
</div>
<div class="modal-field">
  <label>備考</label>
  <textarea id="editNotes">${esc(p.notes||'')}</textarea>
</div>
<div class="modal-actions">
  <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
  <button class="btn btn-save" onclick="saveEdit()">保存</button>
</div>
<button class="btn-del" onclick="delPrize('${esc(p.id)}')">削除</button>`;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
  editingId=null;
}
function closeModalBg(e){
  if(e.target===document.getElementById('modalOverlay'))closeModal();
}

async function saveEdit(){
  if(!editingId)return;
  const cost=document.getElementById('editCost').value;
  const stock=document.getElementById('editStock').value;
  const status=document.getElementById('editStatus').value;
  const cat=document.getElementById('editCat').value.trim();
  const notes=document.getElementById('editNotes').value.trim();
  const payload={
    status,
    category:cat||null,
    notes:notes||null
  };
  if(cost!=='')payload.cost=parseInt(cost);
  if(stock!=='')payload.stock=parseInt(stock);
  closeModal();showLoading();
  try{
    await sbPatch('prizes',editingId,'id',payload);
    showToast('保存しました');
    await loadData();
  }catch(e){showToast('エラー: '+e.message,false);}
  finally{hideLoading();}
}

async function delPrize(id){
  if(!confirm('この景品を削除しますか？'))return;
  closeModal();showLoading();
  try{
    await sbDelete('prizes',id,'id');
    showToast('削除しました');
    await loadData();
  }catch(e){showToast('エラー: '+e.message,false);}
  finally{hideLoading();}
}

  document.getElementById('modalContent').innerHTML=`

async function saveNewPrize(){
  const name=document.getElementById('editName').value.trim();
  if(!name){alert('景品名を入力してください');return;}
  const cost=document.getElementById('editCost').value;
  const stock=document.getElementById('editStock').value;
  const payload={
    name,
    status:document.getElementById('editStatus').value,
    category:document.getElementById('editCat').value.trim()||null,
    notes:document.getElementById('editNotes').value.trim()||null
  };
  if(cost!=='')payload.cost=parseInt(cost);
  if(stock!=='')payload.stock=parseInt(stock);
  closeModal();showLoading();
  try{
    await sbPost('prizes',payload);
    showToast('景品を追加しました');
    await loadData();
  }catch(e){showToast('エラー: '+e.message,false);}
  finally{hideLoading();}
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('#filterChips .chip[data-type="status"]').forEach(chip=>{
  chip.addEventListener('click',function(){
    const val=this.dataset.val;
    const i=selStatuses.indexOf(val);
    if(i>=0){selStatuses.splice(i,1);this.classList.remove('on');}
    else{selStatuses.push(val);this.classList.add('on');}
    render();
  });
});

document.querySelectorAll('#sortRow .srt-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    const key=this.dataset.key;
    if(curSortKey===key){
      sortDirs[key]=sortDirs[key]==='desc'?'asc':'desc';
    } else {
      curSortKey=key;
    }
    updateSortUI();
    render();
  });
});

function updateSortUI(){
  document.querySelectorAll('#sortRow .srt-btn').forEach(btn=>{
    const key=btn.dataset.key;
    btn.classList.toggle('active',key===curSortKey);
    btn.querySelector('.srt-arrow').textContent=sortDirs[key]==='asc'?'↑':'↓';
  });
}

document.getElementById('searchInput').addEventListener('input',function(){
  curSearch=this.value;
  render();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateSortUI();
loadData();
</script>
