name: Claude Code Chase-up

on:
  issues:
    types: [labeled]

jobs:
  chase-up:
    if: contains(github.event.label.name, 'claude-code')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-opus-4-7'
          direct_prompt: |
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            READ ORDER:
            1. CLAUDE.md (root)
            2. Notion v5.0 NOW: https://www.notion.so/3586440a374b815db98dff8b8e0a4493
            3. Notion specs (extract spec_id from body)
            4. Notion modules CLAUDE
            5. Notion memory incidents

            RULES:
            - Stay within scope.write
            - FORBIDDEN: test.skip, test.only, ts-nocheck, console.log
            - All acceptance green
            - Main push only
            - Full commit message

            DONE:
            - vitest pass
            - playwright green
            - test.skip count 0
            - main pushed
            - ntfy sent
