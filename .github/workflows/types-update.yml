name: Supabase Types Update

on:
  # schedule:
  #   - cron: '0 22 * * *'
  # schedule disabled 2026-07-08 pending SUPABASE_ACCESS_TOKEN re-issue (D-050)
  workflow_dispatch:

jobs:
  update-types:
    name: Generate and diff Supabase types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeScript types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run gen-types
        # exits 0 with warning when token not set (see scripts/gen-supabase-types.sh)

      - name: Check for type changes
        id: diff
        run: |
          if git diff --quiet src/types/supabase.d.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if types changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: regenerate supabase types'
          title: 'chore: auto-update Supabase TypeScript types'
          body: |
            Supabase schema has changed. This PR updates `src/types/supabase.d.ts`.

            Generated by the nightly `Supabase Types Update` workflow.
          branch: chore/auto-update-supabase-types
          delete-branch: true
          labels: 'auto-generated,types'
