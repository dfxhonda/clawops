name: Chase-up Task
description: Spec-driven chase-up for Claude Code
title: "[spec_id] acceptance_id 要約"
labels: [claude-code]
body:
  - type: input
    id: spec_id
    attributes:
      label: spec_id
      description: M1-patrol or M2-stocktake or LAUNCHER
      placeholder: M1-patrol
    validations:
      required: true
  - type: input
    id: acceptance_id
    attributes:
      label: acceptance_id
      placeholder: J-PATROL-05
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: requirements
      placeholder: given when then
    validations:
      required: true
